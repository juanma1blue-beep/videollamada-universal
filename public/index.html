<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VideoChat Pro - Misión Útil</title>
    <style>
        /* CSS Universal y Responsive: Maximiza espacio sin romper lógica */
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .status-header { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; background: #1e1e1e; padding: 15px; border-radius: 12px; gap: 10px; flex-shrink: 0; }
        
        .wrapper { display: flex; flex-direction: row; gap: 10px; flex-grow: 1; min-height: 0; width: 100%; justify-content: center; align-items: center; }
        .video-box { flex: 1; height: 100%; max-width: 48%; background: #000; border-radius: 12px; overflow: hidden; display: flex; align-items: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .control-bar { padding: 15px; display: flex; justify-content: center; gap: 20px; background: #1e1e1e; border-radius: 12px; margin-top: 5px; flex-shrink: 0; }
        button { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="status-header">
        <div id="timer" style="color: #00ff00; font-family: monospace;">00:00:00</div>
        <input type="text" id="roomInput" readonly style="width: 80px; text-align: center; background: #333; color: white; border: none; padding: 5px;">
        <div id="statusIndicator" style="font-weight: bold; font-size: 0.8em; color: #00ff00;">AUTO: ESTABLE</div>
        <select id="videoSource" style="background:#333; color:white; border:none; padding:5px;"></select>
        <button id="btnConnect" onclick="safeExecute(joinRoom)" style="background:#0084ff; color:white;">Conectar</button>
    </div>

    <div class="wrapper">
        <div class="video-box"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="video-box"><video id="remoteVideo" autoplay playsinline></video></div>
    </div>

    <div class="control-bar">
        <button onclick="toggleAudio()">🎙️</button>
        <button onclick="toggleVideo()">📷</button>
        <button onclick="endCall()" style="background:#ff3b30; color:white;">❌</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // MANTENEMOS TU LÓGICA DE EVENTOS ORIGINAL
        const socket = io();
        const state = { localStream: null, timerInterval: null, isConnecting: false, seconds: 0, minutes: 0, hours: 0 };

        async function safeExecute(func) { 
            if (state.isConnecting) return;
            state.isConnecting = true;
            try { await func(); } catch (err) { console.error(err); } 
            finally { state.isConnecting = false; }
        }

        async function startCamera() {
            const videoSource = document.getElementById('videoSource').value;
            state.localStream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: videoSource ? { exact: videoSource } : undefined }, 
                audio: true
            });
            document.getElementById('localVideo').srcObject = state.localStream;
            // Eventos originales intactos
            state.timerInterval = setInterval(() => {
                state.seconds++; 
                if (state.seconds === 60) { state.seconds = 0; state.minutes++; }
                document.getElementById('timer').innerText = `${state.hours.toString().padStart(2,'0')}:${state.minutes.toString().padStart(2,'0')}:${state.seconds.toString().padStart(2,'0')}`;
            }, 1000);
        }

        // TUS FUNCIONES PERSISTENTES
        async function joinRoom() { socket.emit('join-room', document.getElementById('roomInput').value); await startCamera(); document.getElementById('btnConnect').disabled = true; }
        function toggleAudio() { if (state.localStream?.getAudioTracks()[0]) state.localStream.getAudioTracks()[0].enabled = !state.localStream.getAudioTracks()[0].enabled; }
        function toggleVideo() { if (state.localStream?.getVideoTracks()[0]) state.localStream.getVideoTracks()[0].enabled = !state.localStream.getVideoTracks()[0].enabled; }
        function endCall() { clearInterval(state.timerInterval); window.location.reload(); }
        
        window.onload = () => { document.getElementById('roomInput').value = Math.random().toString(36).substring(2, 9); };
    </script>
</body>
</html>
