<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base44 - Sistema Unificado de Transmisión</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #f0f4f8;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .main-layout {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .container {
            flex: 2;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
        }

        /* Panel de Chat a la Derecha */
        .chat-panel {
            flex: 1;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        h1 {
            color: #004d98;
            text-align: center;
            margin-bottom: 20px;
            font-size: 26px;
        }

        .section {
            background: #fafafa;
            border: 1px solid #e1e8ed;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        h3 {
            color: #004d98;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            background-color: #004d98;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background-color: #003366;
        }

        .btn-success {
            background-color: #28a745;
        }

        .btn-success:hover {
            background-color: #218838;
        }

        /* Perfil emisor arriba a la derecha del recuadro blanco */
        .perfil-emisor {
            position: absolute;
            top: 25px;
            right: 25px;
            text-align: right;
            font-size: 12px;
            background: rgba(0, 77, 152, 0.05);
            padding: 6px 12px;
            border-radius: 6px;
            border-right: 3px solid #004d98;
            z-index: 10;
        }

        .perfil-emisor span {
            color: #777;
            display: block;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .perfil-emisor strong {
            color: #333;
        }

        .perfil-emisor small {
            color: #004d98;
            cursor: pointer;
            display: inline-block;
            margin-top: 2px;
            text-decoration: underline;
        }

        /* Input de código de sala */
        .room-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Área de visualización de videollamada */
        .video-placeholder {
            width: 100%;
            height: 350px;
            background: #222;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 16px;
            margin-top: 15px;
        }

        /* Componentes del Chat Interno */
        .chat-messages {
            flex: 1;
            border: 1px solid #e1e8ed;
            border-radius: 6px;
            padding: 10px;
            background: #fafafa;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .chat-input-area {
            display: flex;
            gap: 5px;
        }

        .chat-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        @media (max-width: 768px) {
            .main-layout {
                flex-direction: column;
            }
            .perfil-emisor {
                position: static;
                text-align: left;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="container">
        <div class="perfil-emisor">
            <span>Emisor Oficial</span>
            <strong>Juanma</strong>
            <br>
            <small id="miTelefonoDisplay" onclick="configurarMiTelefono()">⚙️ Configurar</small>
        </div>

        <h1>Base44 - Transmisión Unificada</h1>

        <div class="section">
            <h3>Control de Conexión Nativa</h3>
            
            <input type="text" id="roomCode" class="room-input" placeholder="CÓDIGO DE SALA" readonly>

            <div class="btn-group">
                <button onclick="generarCodigoTransmision()">Generar Código Aleatorio</button>
                <button class="btn-success" onclick="conectarTransmision()">Iniciar Conexión Segura</button>
            </div>
        </div>

        <div class="video-placeholder" id="videoScreen">
            🎥 Transmisión lista. Genera un código para conectar la videollamada.
        </div>
    </div>

    <div class="chat-panel">
        <h3>Chat de Comunicación</h3>
        <div class="chat-messages" id="chatBox">
            <p style="color: #888; font-style: italic;">Sistema de mensajería listo...</p>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatMsg" class="chat-input" placeholder="Escribe un mensaje...">
            <button onclick="enviarMensajeChat()">Enviar</button>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        cargarMiPerfil();
    });

    // --- GENERACIÓN DE CÓDIGOS ALEATORIOS ORIGINALES ---
    function generarCodigoTransmision() {
        const caracteres = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let resultado = 'B44-';
        for (let i = 0; i < 6; i++) {
            resultado += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
        }
        document.getElementById('roomCode').value = resultado;
        
        const chat = document.getElementById('chatBox');
        chat.innerHTML += `<p style="color: #004d98;"><b>Sistema:</b> Código generado: ${resultado}. Listo para conectar.</p>`;
        chat.scrollTop = chat.scrollHeight;
    }

    function conectarTransmision() {
        const codigo = document.getElementById('roomCode').value;
        if (!codigo) {
            alert("Por favor, genera primero un código aleatorio de transmisión.");
            return;
        }
        const pantalla = document.getElementById('videoScreen');
        pantalla.style.background = "#004d98";
        pantalla.innerHTML = `🌐 Conectado con éxito a la sala comercial nativa: <b>${codigo}</b>`;
        
        const chat = document.getElementById('chatBox');
        chat.innerHTML += `<p style="color: #28a745;"><b>Sistema:</b> Conexión establecida correctamente en la sala ${codigo}.</p>`;
        chat.scrollTop = chat.scrollHeight;
    }

    // --- COMUNICACIÓN DEL CHAT DE LA DERECHA ---
    function enviarMensajeChat() {
        const input = document.getElementById('chatMsg');
        const chat = document.getElementById('chatBox');
        if (input.value.trim() === "") return;

        chat.innerHTML += `<p><b>Juanma:</b> ${input.value.trim()}</p>`;
        input.value = "";
        chat.scrollTop = chat.scrollHeight;
    }

    // --- GESTIÓN DE MI PERFIL EMISOR ---
    function cargarMiPerfil() {
        const telGuardado = localStorage.getItem('miTelefonoPropio');
        const display = document.getElementById('miTelefonoDisplay');
        if (display) {
            if (telGuardado && telGuardado.trim() !== "") {
                display.innerText = "📞 " + telGuardado;
            } else {
                display.innerText = "⚙️ Configurar";
            }
        }
    }

    function configurarMiTelefono() {
        const nuevoTel = prompt("Introduce tu número de móvil o el teléfono fijo de casa:");
        if (nuevoTel !== null) {
            if (nuevoTel.trim() !== "") {
                localStorage.setItem('miTelefonoPropio', nuevoTel.trim());
            } else {
                localStorage.removeItem('miTelefonoPropio');
            }
            cargarMiPerfil();
        }
    }

    // Permitir enviar mensajes de chat pulsando la tecla Enter
    document.getElementById('chatMsg').addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            enviarMensajeChat();
        }
    });
</script>

</body>
</html>
