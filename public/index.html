<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base44 - Transmisión Real Unificada</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #f0f4f8;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .main-layout {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .container {
            flex: 2;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* CABECERA ALINEADA CON BOTÓN DE DONACIONES */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #e1e8ed;
            padding-bottom: 15px;
        }

        h1 {
            color: #004d98;
            font-size: 26px;
        }

        /* BOTÓN DE DONACIONES PAYPAL EN CSS PURO (SEGURO Y LEGAL) */
        .paypal-donation-btn {
            display: inline-flex;
            align-items: center;
            background-color: #ffc439;
            color: #003087;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background 0.2s ease, transform 0.1s ease;
            border: 1px solid #e5b228;
            cursor: pointer;
        }

        .paypal-donation-btn:hover {
            background-color: #f5b425;
            transform: translateY(-1px);
        }

        .paypal-logo-text {
            font-style: italic;
            font-weight: 900;
            margin-right: 6px;
            letter-spacing: -1px;
            font-size: 16px;
        }

        .paypal-logo-text .p1 { color: #003087; }
        .paypal-logo-text .p2 { color: #0079c1; margin-left: -1px; }

        /* Panel de Chat Lateral Derecho - Interactivo */
        .chat-panel {
            flex: 1;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            height: 520px;
        }

        /* REJILLA SIMÉTRICA DE DOS COLUMNAS ALINEADAS */
        .video-grid {
            display: flex;
            gap: 20px;
        }

        .video-column {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Campos de control superiores alineados entre líneas con la misma altura exacta */
        .control-top {
            height: 95px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        /* Input Text estirado al 100% de la anchura */
        .room-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
            background-color: #fff;
            height: 43px;
            margin-bottom: 10px;
        }

        /* BOTÓN DE YOUTUBE EN CSS PURO (ESTIRADO AL 100% EN LA COLUMNA DERECHA) */
        .youtube-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #ff0000;
            color: #ffffff;
            text-decoration: none;
            width: 100%;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background 0.2s ease, transform 0.1s ease;
            height: 43px;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .youtube-btn:hover {
            background-color: #cc0000;
            transform: translateY(-1px);
        }

        /* Icono de Play de YouTube en CSS puro */
        .youtube-icon {
            width: 20px;
            height: 14px;
            background-color: #ffffff;
            border-radius: 4px;
            margin-right: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .youtube-icon::before {
            content: '';
            width: 0;
            height: 0;
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
            border-left: 6px solid #ff0000;
            position: absolute;
            left: 8px;
        }

        button {
            width: 100%;
            color: white;
            border: none;
            padding: 11px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease;
            text-align: center;
            height: 43px;
        }

        .btn-primary {
            background-color: #004d98;
        }

        .btn-primary:hover {
            background-color: #003366;
        }

        .btn-success {
            background-color: #28a745;
        }

        .btn-success:hover {
            background-color: #218838;
        }

        /* Contenedores de las Cámaras Nativas */
        .video-box {
            width: 100%;
            height: 280px;
            background: #222;
            border-radius: 8px;
            position: relative;
            border: 2px solid #333;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #222;
        }

        .video-placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 13px;
            text-align: center;
            width: 90%;
            z-index: 2;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #fff;
            z-index: 3;
        }

        /* Estructura del Chat */
        .chat-messages {
            flex: 1;
            border: 1px solid #e1e8ed;
            border-radius: 6px;
            padding: 12px;
            background: #fdfdfd;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .msg-line {
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .msg-system-blue {
            color: #004d98;
            background: #e6f0fa;
            padding: 6px 10px;
            border-radius: 6px;
            border-left: 3px solid #004d98;
        }

        .msg-system-green {
            color: #155724;
            background: #d4edda;
            padding: 6px 10px;
            border-radius: 6px;
            border-left: 3px solid #28a745;
        }

        .msg-user {
            background: #f1f0f0;
            padding: 6px 10px;
            border-radius: 6px;
            display: inline-block;
        }

        .chat-input-area {
            display: flex;
            gap: 5px;
        }

        .chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .main-layout {
                flex-direction: column;
            }
            .video-grid {
                flex-direction: column;
            }
            .control-top {
                height: auto;
            }
            .header-area {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="container">
        
        <div class="header-area">
            <h1>Base44 - Transmisión Unificada</h1>
            
            <a href="https://PayPal.me/MarketEvolution" target="_blank" class="paypal-donation-btn">
                <span class="paypal-logo-text"><span class="p1">Pay</span><span class="p2">Pal</span></span> 
                💛 Donaciones / Propinas
            </a>
        </div>

        <div class="video-grid">
            <div class="video-column">
                <div class="control-top">
                    <input type="text" id="roomCode" class="room-input" placeholder="INTRODUCE O GENERA CÓDIGO">
                    <button class="btn-primary" onclick="generarCodigoTransmision()">Generar Código Aleatorio</button>
                </div>
                
                <div class="video-box">
                    <div class="video-placeholder-text" id="localPlaceholder">📷 Cámara Local Apagada</div>
                    <video id="localVideo" autoplay playsinline muted></video>
                    <div class="video-label">TRANSMISIÓN LOCAL (TÚ)</div>
                </div>
            </div>

            <div class="video-column">
                <div class="control-top">
                    <a href="https://www.youtube.com/@JuanmaEntertainment" target="_blank" class="youtube-btn">
                        <span class="youtube-icon"></span> YouTube
                    </a>
                    <button class="btn-success" onclick="conectarTransmisionReal()">Iniciar Conexión Segura</button>
                </div>
                
                <div class="video-box" id="remoteVideoBox">
                    <div class="video-placeholder-text" id="remotePlaceholder">💤 Esperando Conexión Remota...</div>
                    <div class="video-label">TRANSMISIÓN REMOTA</div>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-panel">
        <h3>Chat de Comunicación</h3>
        <div class="chat-messages" id="chatBox">
            <div class="msg-line" style="color: #888; font-style: italic;" id="chatPlaceholder">Sistema de mensajería listo...</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatMsg" class="chat-input" placeholder="Escribe un mensaje...">
            <button class="btn-primary" style="width: auto; height: 43px;" onclick="enviarMensajeChat()">Enviar</button>
        </div>
    </div>
</div>

<script>
    let localStream = null;

    // --- GENERAR CÓDIGO EDITABLE ---
    function generarCodigoTransmision() {
        const caracteres = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let resultado = 'B44-';
        for (let i = 0; i < 6; i++) {
            resultado += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
        }
        document.getElementById('roomCode').value = resultado;
        
        const placeholder = document.getElementById('chatPlaceholder');
        if (placeholder) placeholder.remove();

        const chat = document.getElementById('chatBox');
        chat.innerHTML += `<div class="msg-line msg-system-blue"><b>⚙️ Sistema:</b> Código de sala listo: <b>${resultado}</b>. Puedes compartirlo o editarlo.</div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    // --- BOTÓN: INICIAR CONEXIÓN CON CÁMARA REAL NATIVA ---
    async function conectarTransmisionReal() {
        const codigo = document.getElementById('roomCode').value;
        if (!codigo || codigo.trim() === "") {
            alert("Por favor, introduce el código de tu pareja o genera uno aleatorio primero.");
            return;
        }
        
        const chat = document.getElementById('chatBox');
        const placeholder = document.getElementById('chatPlaceholder');
        if (placeholder) placeholder.remove();

        // Activación de la lente real del dispositivo
        try {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }

            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            
            const videoElement = document.getElementById('localVideo');
            videoElement.srcObject = localStream;
            
            document.getElementById('localPlaceholder').style.display = 'none';
            
            chat.innerHTML += `<div class="msg-line msg-system-green"><b>🟢 Cámara:</b> Acceso concedido. Transmitiendo video local en directo.</div>`;
        } catch (error) {
            console.error("Error al acceder a la cámara nativa:", error);
            alert("No se pudo abrir la cámara. Asegúrate de dar los permisos correspondientes.");
            chat.innerHTML += `<div class="msg-line" style="color: red;"><b>⚠️ Error:</b> Permiso de cámara denegado.</div>`;
        }

        // Simulación del canal para recibir WebRTC del interlocutor
        document.getElementById('remoteVideoBox').style.background = "#004d98";
        document.getElementById('remotePlaceholder').innerHTML = `🌐 Canal enlazado a la sala: <b>${codigo.trim()}</b><br>🎥 Listo para recibir datos WebRTC de tu pareja`;
        
        chat.innerHTML += `<div class="msg-line msg-system-green"><b>🔒 Conexión:</b> Canal comercial enlazado de forma fiable a la sala <b>${codigo.trim()}</b>.</div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    // --- MENSAJERÍA ---
    function enviarMensajeChat() {
        const input = document.getElementById('chatMsg');
        const chat = document.getElementById('chatBox');
        if (input.value.trim() === "") return;

        const placeholder = document.getElementById('chatPlaceholder');
        if (placeholder) placeholder.remove();

        chat.innerHTML += `<div class="msg-line"><b>Juanma:</b> <span class="msg-user">${input.value.trim()}</span></div>`;
        input.value = "";
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('chatMsg').addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            enviarMensajeChat();
        }
    });
</script>

</body>
</html>
