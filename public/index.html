<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <title>Proyecto Sanguino - Base Pura</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; flex-grow: 1; gap: 2px; }
        .video-box { flex: 1; position: relative; border: 1px solid #333; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .chat-box { position: absolute; bottom: 10px; left: 10px; width: 250px; background: rgba(0,0,0,0.7); border: 1px solid #444; padding: 5px; z-index: 10; font-size: 0.8em; }
        .chat-input { width: 100%; background: #111; border: 1px solid #555; color: #ffd100; font-family: inherit; }
        .status { position: absolute; top: 5px; left: 5px; z-index: 10; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="video-box">
            <div class="status" id="dotLocal">●</div>
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="chat-box">
                <div id="histLocal" style="height:50px; overflow-y:auto;"></div>
                <input type="text" class="chat-input" id="inputLocal" onkeypress="enviar(event, true)">
            </div>
        </div>
        <div class="video-box">
            <div class="status" id="dotRemote">●</div>
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="chat-box">
                <div id="histRemote" style="height:50px; overflow-y:auto;"></div>
                <input type="text" class="chat-input" id="inputRemote" onkeypress="enviar(event, false)">
            </div>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let conn, localStream;

        peer.on('connection', c => { conn = c; setupChat(); });
        peer.on('call', call => {
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
                localStream = s;
                document.getElementById('localVideo').srcObject = s;
                call.answer(s);
                call.on('stream', remoteS => document.getElementById('remoteVideo').srcObject = remoteS);
            });
        });

        function setupChat() {
            conn.on('data', data => log("Pareja", data));
        }

        function log(quien, msg) {
            const hL = document.getElementById('histLocal');
            const hR = document.getElementById('histRemote');
            const entry = `<div><b>${quien}:</b> ${msg}</div>`;
            hL.innerHTML += entry; hR.innerHTML += entry;
            hL.scrollTop = hL.scrollHeight; hR.scrollTop = hR.scrollHeight;
        }

        function enviar(e, esLocal) {
            if (e.key === 'Enter') {
                const val = e.target.value;
                if (conn && conn.open) {
                    conn.send(val);
                    log("Tú", val);
                    e.target.value = '';
                }
            }
        }
    </script>
</body>
</html>
