<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Sanguino v3.0 [Estabilidad Recuperada]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .camera-layer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; height: 40vh; }
        .cam-box { border: 2px solid #002244; background: #000; border-radius: 8px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        video { width: 100%; height: 85%; object-fit: cover; }
        .interface-layer { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 20px; padding: 20px; flex-grow: 1; }
        .panel { border: 2px solid #002244; background: #0a0a0a; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Ajuste de Espaciado del ID */
        #myIDDisplay { 
            font-size: 1.3em; 
            font-weight: bold; 
            border: 2px solid #228B22; 
            padding: 20px; 
            text-align: center; 
            cursor: pointer; 
            margin-bottom: 20px; /* Aquí recuperamos la separación */
            background: #001122;
        }

        button { background: #002244; color: #fff; border: 2px solid #228B22; padding: 15px; cursor: pointer; width: 100%; font-weight: bold; border-radius: 8px; transition: 0.2s; }
        button:hover { background: #003366; }
        
        .btn-call { background: #228B22; border: 2px solid #fff; }
        .btn-tip { background: #ffc439; color: #000; border: 2px solid #fff; }
        .btn-red { background: #8B0000; border: 2px solid #FF4500; }
        
        #helpPanel { background: #001a33; color: #fff; padding: 15px; border-radius: 8px; font-size: 0.9em; border: 2px solid #228B22; line-height: 1.5; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="camera-layer">
        <div class="cam-box"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="cam-box"><video id="remoteVideo" autoplay playsinline></video></div>
    </div>

    <div class="interface-layer">
        <div class="panel">
            <h3>LOG</h3>
            <div id="chatLog" style="height: 120px; overflow-y: auto; font-size: 0.8em; border: 1px solid #333; padding: 5px;"></div>
        </div>
        
        <div class="panel">
            <h3>CENTRO DE CONTROL</h3>
            <div id="myIDDisplay" onclick="copyID()">CARGANDO...</div>
            
            <input type="text" id="peerID" placeholder="Pega aquí el ID de tu pareja" style="padding: 10px; width: 100%; box-sizing: border-box;">
            
            <button class="btn-call" onclick="App.llamar()">LLAMAR</button>

            <div id="helpPanel">
                <strong>¿CÓMO CONECTAR?</strong><br>
                1. Comparte tu ID con tu pareja.<br>
                2. Pega el ID de tu pareja arriba.<br>
                3. Pulsa <b>LLAMAR</b> y espera a que acepte.
            </div>
        </div>

        <div class="panel">
            <h3>ACCIONES</h3>
            <button class="btn-tip" onclick="window.open('https://paypal.me/MarketEvolution', '_blank')">DEJAR PROPINA</button>
            <button class="btn-red" onclick="window.location.reload()">FINALIZAR</button>
        </div>
    </div>

    <script>
        const App = {
            peer: new Peer(),
            llamar: () => {
                const targetID = document.getElementById('peerID').value;
                if(!targetID) { alert("¡Pide el ID de tu pareja primero!"); return; }
                const conn = App.peer.connect(targetID);
                conn.on('open', () => {
                    conn.send({tipo: 'LLAMADA', de: App.peer.id});
                    App.log("Llamando a: " + targetID);
                });
            },
            conectar: async (id) => {
                const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('localVideo').srcObject = stream;
                const call = App.peer.call(id, stream);
                call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; });
            },
            log: (msg) => { document.getElementById('chatLog').innerHTML += `<div>> ${msg}</div>`; }
        };

        App.peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if(data.tipo === 'LLAMADA') {
                    if(confirm("Llamada entrante de: " + data.de + ". ¿Aceptar?")) {
                        App.conectar(data.de);
                    }
                }
            });
        });

        App.peer.on('open', id => { document.getElementById('myIDDisplay').innerText = id; });
        function copyID() { navigator.clipboard.writeText(document.getElementById('myIDDisplay').innerText); App.log("ID copiado."); }
    </script>
</body>
</html>
