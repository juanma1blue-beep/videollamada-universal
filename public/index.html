<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V87.0 [EDICIÓN TÁCTICA]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #panel { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .box { background: #050a1a; padding: 20px; width: 320px; border: 2px solid #002277; border-radius: 15px; box-shadow: 0 0 15px rgba(0, 34, 119, 0.5); }
        h3 { font-size: 14px; color: #f2f2f2; margin: 15px 0 8px 0; border-bottom: 1px solid #002277; padding-bottom: 4px; }
        input { width: 100%; height: 40px; padding: 0 10px; margin-bottom: 10px; background: #0a1122; border: 1px solid #00d2ff; color: #00d2ff; border-radius: 5px; font-size: 14px; }
        
        button { width: 100%; padding: 10px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 5px; border-radius: 5px; transition: 0.1s; border-bottom: 3px solid rgba(0,0,0,0.5); }
        button:active { transform: translateY(2px); }
        
        .btn-video { background: #002277; border: 1px solid #00d2ff; color: #fff; }
        .btn-save  { background: #910023; border: 1px solid #ff4444; color: #fff; }
        
        /* BOLITA DE EDICIÓN (LÁPIZ) */
        .btn-edit { 
            width: 35px; height: 35px; border-radius: 50%; background: #910023; border: 2px solid #ff4444;
            color: white; font-size: 16px; display: flex; align-items: center; justify-content: center;
            padding: 0; margin-left: 10px; flex-shrink: 0;
        }

        .amigo-item { 
            background: #0a1122; padding: 10px; margin-bottom: 8px; border-radius: 8px; 
            border-left: 3px solid #002277; display: flex; align-items: center; justify-content: space-between;
        }
        .info-area { flex-grow: 1; }
        
        .btn-end { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: #3d0000; border: 2px solid #ff0000; color: #ffcccc; padding: 15px 40px; border-radius: 30px; cursor: pointer; font-weight: 900; font-size: 16px; }
        
        .live-grid { display: grid; grid-template-rows: 1fr 1fr; width: 100vw; height: 100vh; display: none; }
        .cam-box { position: relative; border-bottom: 1px solid #002277; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3>ID DE CONEXIÓN</h3>
            <input type="text" id="myID" readonly>
            
            <h3>PANEL DE GESTIÓN TÁCTICA</h3>
            <input type="text" id="targetID" placeholder="Pega el ID aquí...">
            <button class="btn-video" onclick="conectar()">Iniciar Videollamada</button>
            
            <h3>AGENDA</h3>
            <div id="listaAmigos"></div>
            <input type="text" id="nombre" placeholder="Nombre...">
            <input type="text" id="telefono" placeholder="Número...">
            <button class="btn-save" onclick="guardar()">Guardar Contacto</button>
        </div>
    </div>

    <div class="live-grid" id="videoArea">
        <div class="cam-box"><video id="remoteVideo" autoplay playsinline></video></div>
        <div class="cam-box">
            <video id="localVideo" autoplay playsinline muted></video>
            <button class="btn-end" onclick="finalizarConexion()">FINALIZAR</button>
        </div>
    </div>

    <script>
        const randomID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = randomID;
        document.body.addEventListener('click', () => { navigator.clipboard.writeText(randomID).catch(() => {}); }, { once: true });

        const peer = new Peer(randomID);
        let localStream;

        function finalizarConexion() {
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            peer.destroy();
            window.location.reload();
        }

        function editar(index) {
            let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');
            let n = prompt("Nuevo nombre:", agenda[index].nombre);
            let t = prompt("Nuevo número:", agenda[index].telefono);
            if(n && t) { agenda[index] = {nombre: n, telefono: t}; localStorage.setItem('agenda', JSON.stringify(agenda)); render(); }
        }

        function guardar() {
            const nombre = document.getElementById('nombre').value;
            const telefono = document.getElementById('telefono').value;
            if(!nombre || !telefono) return alert("Rellena nombre y número");
            let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');
            agenda.push({nombre, telefono});
            localStorage.setItem('agenda', JSON.stringify(agenda));
            render();
        }

        function render() {
            const lista = document.getElementById('listaAmigos');
            let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');
            lista.innerHTML = agenda.map((a, i) => `
                <div class="amigo-item">
                    <div class="info-area"><b>${a.nombre}</b><br>${a.telefono}</div>
                    <button class="btn-edit" onclick="editar(${i})">✎</button>
                </div>`).join('');
        }

        async function conectar() {
            const target = document.getElementById('targetID').value.trim();
            if(!target) return alert("Pega un ID");
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVideo').srcObject = localStream;
            peer.on('call', call => { call.answer(localStream); call.on('stream', st => document.getElementById('remoteVideo').srcObject = st); });
            const call = peer.call(target, localStream);
            call.on('stream', st => document.getElementById('remoteVideo').srcObject = st);
            document.getElementById('panel').style.display = 'none';
            document.getElementById('videoArea').style.display = 'grid';
        }
        render();
    </script>
</body>
</html>
