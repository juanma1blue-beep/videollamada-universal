<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <title>Dashboard de Comunicación - Sanguino</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100%; gap: 2px; }
        .video-box { flex: 1; position: relative; border: 1px solid #333; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* El Chat ahora es fijo e inmutable en la segunda cámara */
        .chat-container { position: absolute; bottom: 10px; left: 10px; width: 90%; z-index: 10; }
        .chat-log { background: rgba(0,0,0,0.7); height: 80px; overflow-y: auto; padding: 5px; font-size: 0.9em; border: 1px solid #444; border-radius: 4px; }
        .chat-input-area { margin-top: 5px; }
        .chat-input { width: 100%; background: #111; border: 1px solid #555; color: #ffd100; padding: 8px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="video-box">
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="chat-container">
                <div id="chatLog" class="chat-log"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Susurrar..." onkeypress="manejarEnvio(event)">
                </div>
            </div>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let conn;

        // Lógica de conexión P2P
        peer.on('connection', c => { conn = c; setupChat(); });
        peer.on('call', call => {
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
                call.answer(s);
                document.getElementById('localVideo').srcObject = s;
                call.on('stream', remoteS => document.getElementById('remoteVideo').srcObject = remoteS);
            });
        });

        function setupChat() {
            conn.on('data', data => logMessage("Pareja", data));
        }

        function logMessage(sender, msg) {
            const log = document.getElementById('chatLog');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            log.innerHTML += `<div><span style="color:#888">[${time}]</span> <b>${sender}:</b> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        function manejarEnvio(e) {
            if (e.key === 'Enter') {
                const msg = e.target.value;
                if (conn && conn.open) {
                    conn.send(msg);
                    logMessage("Tú", msg);
                    e.target.value = '';
                }
            }
        }
    </script>
</body>
</html>
