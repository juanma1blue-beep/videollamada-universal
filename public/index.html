<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión Útil - Control Centralizado</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0e1621; color: white; margin: 0; padding: 4px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .status-header { background: #17212b; padding: 6px; display: flex; align-items: center; justify-content: center; border-radius: 8px; flex-shrink: 0; gap: 4px; height: 35px; box-sizing: border-box; }
        
        #roomInput { width: 80px; background: #242f3d; color: #6ab2f2; border: 1px solid #3d4a5d; padding: 4px; border-radius: 4px; text-align: center; font-weight: bold; font-family: monospace; font-size: 0.8em; }
        .arrow { color: #555; font-size: 1em; font-weight: bold; }
        
        .btn-forest-green { 
            background: #242f3d; 
            color: #228B22; 
            border: 2px solid #228B22; 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 0.7em; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .btn-forest-green:active { background: #228B22; color: #fff; }

        .name-input { width: 60px; background: #242f3d; color: white; border: none; padding: 3px; border-radius: 4px; font-size: 0.7em; }
        .btn-ok { background: #242f3d; color: white; border: none; padding: 2px 5px; border-radius: 4px; font-size: 0.7em; cursor: pointer; }
        
        .wrapper { display: flex; flex-direction: column; flex-grow: 1; padding: 4px 0; gap: 4px; overflow: hidden; }
        .video-box { flex: 1; background: #000; border-radius: 8px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #timer { position: absolute; top: 10px; left: 10px; z-index: 100; color: #00ff00; font-family: monospace; background: rgba(0,0,0,0.6); padding: 2px 5px; border-radius: 4px; font-size: 0.9em; pointer-events: none; }
        .cam-overlay { position: absolute; bottom: 10px; left: 10px; right: 10px; z-index: 100; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 6px; font-size: 0.85em; }
        .cam-info { display: flex; align-items: center; gap: 6px; }
        
        .status-dot { width: 10px; height: 10px; background: #ff4444; border-radius: 50%; transition: 0.3s; }
        .status-dot.active { background: #00ff00; box-shadow: 0 0 5px #00ff00; }
        .status-dot.warning { background: #ffcc00; box-shadow: 0 0 5px #ffcc00; }
        
        .btn-hangup { background: #ff5959; border: none; color: white; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 1.1em; }
        .bottom-panel { background: #17212b; padding: 8px; display: flex; flex-direction: column; gap: 4px; border-radius: 8px; flex-shrink: 0; }
        #consoleLog { font-size: 0.7em; color: #00ff00; height: 30px; overflow-y: auto; background: #0e1621; padding: 4px; border-radius: 4px; font-family: monospace; }
        .control-bar { display: flex; justify-content: space-evenly; padding: 4px; }
        button.ctrl-btn { background: #242f3d; border: none; font-size: 1.2em; cursor: pointer; padding: 8px; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="status-header">
        <input type="text" id="roomInput" readonly>
        <span class="arrow">➜</span>
        <button class="btn-forest-green" onclick="copyRoomCode()">📋 Copiar</button>
        <span class="arrow">➜</span>
        <button class="btn-forest-green" onclick="safeExecute(joinRoom)">Conectar</button>
    </div>
    <div class="wrapper">
        <div class="video-box">
            <div id="timer">00:00:00</div>
            <div class="cam-overlay">
                <div class="cam-info">
                    <div id="statusDot1" class="status-dot"></div>
                    <input type="text" id="name1" class="name-input" placeholder="Nombre...">
                    <button class="btn-ok" onclick="saveName(1)">OK</button>
                    <span id="displayUser1"></span>
                </div>
                <button class="btn-hangup" onclick="confirmEnd()">📞</button>
            </div>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-box">
            <div class="cam-overlay">
                <div class="cam-info">
                    <div id="statusDot2" class="status-dot"></div>
                    <input type="text" id="name2" class="name-input" placeholder="Nombre...">
                    <button class="btn-ok" onclick="saveName(2)">OK</button>
                    <span id="displayUser2"></span>
                </div>
                <button class="btn-hangup" onclick="confirmEnd()">📞</button>
            </div>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>
    <div class="bottom-panel">
        <div id="consoleLog">Sistema restaurado y listo.</div>
        <div class="control-bar">
            <button class="ctrl-btn" onclick="toggleAudio()">🎙️</button>
            <button class="ctrl-btn" onclick="toggleVideo()">📷</button>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const state = { localStream: null, timerInterval: null, startTime: 0 };
        
        function copyRoomCode() {
            const el = document.getElementById('roomInput');
            el.select();
            document.execCommand('copy');
            log("Código copiado.");
        }
        function confirmEnd() {
            if(confirm("¿Finalizar expedición?")) endCall();
        }
        function endCall() { 
            clearInterval(state.timerInterval); 
            window.location.reload(); 
        }
        function updateStatus(status) { 
            document.getElementById('statusDot1').className = 'status-dot ' + status;
            document.getElementById('statusDot2').className = 'status-dot ' + status;
        }
        socket.on('disconnect', () => { updateStatus('warning'); log("Conexión perdida."); });
        socket.on('connect', () => { if(state.localStream) updateStatus('active'); });
        
        function saveName(id) {
            const name = document.getElementById('name'+id).value;
            document.getElementById('displayUser'+id).innerText = name;
            sessionStorage.setItem('u'+id, name);
        }
        function log(msg) { 
            const el = document.getElementById('consoleLog'); 
            el.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`; 
            el.scrollTop = el.scrollHeight; 
        }
        
        async function startCamera() {
            try {
                state.localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = state.localStream;
                updateStatus('active');
                state.startTime = Date.now();
                state.timerInterval = setInterval(() => {
                    const diff = new Date(Date.now() - state.startTime);
                    document.getElementById('timer').innerText = diff.toISOString().substr(11, 8);
                }, 1000);
            } catch(err) { log("Error: " + err.message); }
        }
        
        async function safeExecute(func) { try { await func(); } catch(e) { log("Error: " + e.message); } }
        
        async function joinRoom() { 
            const roomCode = document.getElementById('roomInput').value;
            socket.emit('join-room', roomCode); 
            await startCamera(); 
        }
        
        function toggleAudio() { if (state.localStream) state.localStream.getAudioTracks()[0].enabled = !state.localStream.getAudioTracks()[0].enabled; }
        function toggleVideo() { if (state.localStream) state.localStream.getVideoTracks()[0].enabled = !state.localStream.getVideoTracks()[0].enabled; }
        
        window.onload = () => {
            document.getElementById('roomInput').value = Math.random().toString(36).substring(2, 12);
            for(let i=1; i<=2; i++) {
                if(sessionStorage.getItem('u'+i)) document.getElementById('displayUser'+i).innerText = sessionStorage.getItem('u'+i);
            }
        };
    </script>
</body>
</html>
