<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Sanguino v2.0</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Verdana', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .cam-box { border: 2px solid #002244; background: #000; border-radius: 8px; position: relative; overflow: hidden; }
        /* Indicador de Estado Integrado */
        #statusIndicator { width: 15px; height: 15px; background-color: #555; border-radius: 50%; position: absolute; top: 10px; right: 10px; border: 2px solid #000; z-index: 10; }
        video { width: 100%; height: 85%; object-fit: cover; }
        .panel { border: 2px solid #002244; background: #0a0a0a; padding: 20px; border-radius: 12px; }
        .chat-log { height: 120px; overflow-y: auto; border: 1px solid #333; padding: 10px; background: #000; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="camera-layer" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; height: 40vh;">
        <div class="cam-box"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="cam-box">
            <div id="statusIndicator"></div> <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <div class="interface-layer" style="padding: 20px;">
        <div class="panel">
            <h3>[Sistema] Registro de Diagnóstico</h3>
            <div id="chatLog" class="chat-log"></div>
        </div>
    </div>

    <script>
        const App = {
            peer: new Peer(),
            // Módulo: Gestor de Estado Visual
            setEstado: (activo) => {
                const punto = document.getElementById('statusIndicator');
                punto.style.backgroundColor = activo ? '#228B22' : '#555';
            },
            // Módulo: Log de Sistema (Diagnóstico)
            log: (msg) => {
                const log = document.getElementById('chatLog');
                log.innerHTML += `<div>[Sistema]: ${msg}</div>`;
                log.scrollTop = log.scrollHeight;
            },
            conectar: async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                    document.getElementById('localVideo').srcObject = stream;
                    App.log("Cámara iniciada.");
                    
                    // Aquí iría la lógica de llamada peer.call...
                    App.setEstado(true); // Se pone verde
                    App.log("Conexión establecida con éxito.");
                } catch (e) {
                    App.log("Error de hardware: " + e.message);
                }
            }
        };
    </script>
</body>
</html>
