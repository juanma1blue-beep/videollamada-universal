<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión Útil - Control Central</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0e1621; color: white; margin: 0; padding: 5px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .status-header { background: #17212b; padding: 8px; display: flex; align-items: center; justify-content: space-between; border-radius: 8px; flex-shrink: 0; gap: 8px; }
        
        /* Código aleatorio: Ajustado para verse completo y claro */
        #roomInput { flex-grow: 1; max-width: 120px; background: #242f3d; color: #6ab2f2; border: none; padding: 6px; border-radius: 5px; text-align: center; font-weight: bold; font-family: monospace; }
        
        #statusIndicator { color: #00ff00; font-size: 0.7em; font-weight: bold; white-space: nowrap; }
        select { background: #242f3d; color: #fff; border: none; padding: 6px; border-radius: 5px; font-size: 0.8em; max-width: 80px; }
        #btnConnect { color: #6ab2f2; background: none; border: none; font-weight: bold; cursor: pointer; font-size: 0.9em; }

        .wrapper { display: flex; flex-direction: column; flex-grow: 1; padding: 5px 0; gap: 5px; overflow: hidden; }
        .video-box { flex: 1; background: #000; border-radius: 10px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #timer { position: absolute; top: 10px; left: 10px; z-index: 100; color: #00ff00; font-family: monospace; font-size: 1.1em; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; pointer-events: none; }
        
        .bottom-panel { background: #17212b; padding: 8px; display: flex; flex-direction: column; gap: 5px; border-radius: 10px; flex-shrink: 0; }
        #consoleLog { font-size: 0.7em; color: #00ff00; height: 35px; overflow-y: auto; background: #0e1621; padding: 4px; border-radius: 4px; font-family: monospace; }
        .control-bar { display: flex; justify-content: space-around; padding: 5px; }
        button.ctrl-btn { background: transparent; border: none; font-size: 1.3em; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

    <div class="status-header">
        <input type="text" id="roomInput" readonly>
        <div id="statusIndicator">ESTABLE</div>
        <select id="videoSource"></select>
        <button id="btnConnect" onclick="safeExecute(joinRoom)">Conectar</button>
    </div>

    <div class="wrapper">
        <div class="video-box">
            <div id="timer">00:00:00</div>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-box"><video id="remoteVideo" autoplay playsinline></video></div>
    </div>

    <div class="bottom-panel">
        <div id="consoleLog">Telemetría operativa...</div>
        <div class="control-bar">
            <button class="ctrl-btn" onclick="toggleAudio()">🎙️</button>
            <button class="ctrl-btn" onclick="toggleVideo()">📷</button>
            <button class="ctrl-btn" onclick="endCall()" style="color: #ff5959;">❌</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const state = { localStream: null, timerInterval: null, seconds: 0, minutes: 0, hours: 0 };

        function log(msg) {
            const entry = document.createElement('div');
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            const logBox = document.getElementById('consoleLog');
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function startCamera() {
            const videoSource = document.getElementById('videoSource').value;
            state.localStream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: videoSource ? { exact: videoSource } : undefined }, 
                audio: true
            });
            document.getElementById('localVideo').srcObject = state.localStream;
            state.timerInterval = setInterval(() => {
                state.seconds++; 
                if (state.seconds === 60) { state.seconds = 0; state.minutes++; }
                document.getElementById('timer').innerText = `${state.hours.toString().padStart(2,'0')}:${state.minutes.toString().padStart(2,'0')}:${state.seconds.toString().padStart(2,'0')}`;
            }, 1000);
            log("Sistema: Operativo.");
        }

        async function safeExecute(func) { try { await func(); } catch(e) { log("Error: " + e.message); } }
        async function joinRoom() { 
            socket.emit('join-room', document.getElementById('roomInput').value); 
            await startCamera(); 
            document.getElementById('btnConnect').style.display = 'none'; 
        }
        
        function toggleAudio() { if (state.localStream) state.localStream.getAudioTracks()[0].enabled = !state.localStream.getAudioTracks()[0].enabled; }
        function toggleVideo() { if (state.localStream) state.localStream.getVideoTracks()[0].enabled = !state.localStream.getVideoTracks()[0].enabled; }
        function endCall() { clearInterval(state.timerInterval); window.location.reload(); }

        window.onload = async () => {
            // Generación de código aleatorio de 10 caracteres
            document.getElementById('roomInput').value = Math.random().toString(36).substring(2, 12);
            
            const devices = await navigator.mediaDevices.enumerateDevices();
            const select = document.getElementById('videoSource');
            devices.filter(d => d.kind === 'videoinput').forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = d.deviceId; opt.text = "Cam " + (i + 1);
                select.appendChild(opt);
            });
        };
    </script>
</body>
</html>
