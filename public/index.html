<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V45.0 [Orden Maestro]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* Bloqueo Inicial */
        #bloqueo { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        
        /* Layout Ordenado: 2 Cámaras iguales */
        .live-grid { display: grid; grid-template-rows: 1fr 1fr; width: 100vw; height: 100vh; }
        .cam-box { border: 2px solid #111; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Chat Live superpuesto (dentro de la cam remota) */
        #chatLive { position: absolute; bottom: 20px; left: 20px; width: 80%; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; pointer-events: none; z-index: 10; }
        .chat-entry { margin-bottom: 5px; font-size: 0.9em; text-shadow: 1px 1px 2px #000; }

        /* Controles siempre visibles */
        .panel-control { position: absolute; top: 10px; right: 10px; display: flex; gap: 10px; z-index: 20; }
        .btn-finalizar { background: #FF3333; color: white; padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="bloqueo">
        <h2>CONTROL DE ACCESO</h2>
        <input type="text" id="myID" readonly style="padding:10px; text-align:center; width:200px;">
        <input type="text" id="targetID" placeholder="ID PAREJA" style="padding:10px; text-align:center; width:200px;">
        <button onclick="conectar()" style="padding:10px 30px; background:#A50044; color:white; border:none; border-radius:5px;">CONECTAR</button>
    </div>

    <div class="live-grid">
        <div class="cam-box"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="cam-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <div id="chatLive"></div>
        </div>
    </div>

    <div class="panel-control">
        <button class="btn-finalizar" onclick="location.reload()">FINALIZAR TRANSMISIÓN</button>
    </div>

    <script>
        const uniqueID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = "Tu ID: " + uniqueID;
        const peer = new Peer(uniqueID);
        let myStream;

        async function conectar() {
            const target = document.getElementById('targetID').value.trim();
            if(!target) return alert("Pega el ID...");
            
            myStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVideo').srcObject = myStream;
            
            peer.on('call', call => {
                call.answer(myStream);
                call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; });
            });

            const call = peer.call(target, myStream);
            call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; });
            
            document.getElementById('bloqueo').style.display = 'none';
        }
        
        // Simulación de mensajes para que veas cómo queda el chat
        function addChat(msg) {
            const c = document.getElementById('chatLive');
            c.innerHTML += `<div class="chat-entry"><b>User:</b> ${msg}</div>`;
        }
    </script>
</body>
</html>
