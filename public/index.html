<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V35.0 [Transmisión 1-Clic]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --azul: #001E62; --granada: #A50044; --fondo: #050505; --neon-rojo: #FF3333; }
        body { margin: 0; background: var(--fondo); color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .hero-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; height: 70vh; padding: 15px; }
        .cam-container { border: 2px solid var(--azul); border-radius: 15px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .control-zone { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        button { background: var(--azul); color: #fff; border: 2px solid var(--neon-rojo); padding: 20px 40px; border-radius: 50px; font-size: 1.2em; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px rgba(255,51,51,0.3); }
        button:hover { background: var(--granada); transform: scale(1.05); }
        
        .status-box { font-family: monospace; color: var(--neon-rojo); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="hero-zone">
        <div class="cam-container"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="cam-container"><video id="remoteVideo" autoplay playsinline></video></div>
    </div>

    <div class="control-zone">
        <button id="btnTransmision" onclick="iniciarTodo()">INICIAR TRANSMISIÓN</button>
        <div id="status" class="status-box">ESTADO: ESPERANDO ACTIVACIÓN...</div>
        <input type="text" id="targetID" placeholder="Introduce el ID de tu pareja aquí" style="padding:10px; width:300px; background:#000; border:1px solid var(--azul); color:#fff; text-align:center;">
    </div>

    <script>
        const App = {
            peer: new Peer(),
            stream: null
        };

        async function iniciarTodo() {
            try {
                // 1. Activar Cámara y Audio
                App.stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('localVideo').srcObject = App.stream;
                
                // 2. Escuchar llamadas entrantes
                App.peer.on('call', call => {
                    call.answer(App.stream);
                    call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; });
                    document.getElementById('status').innerText = "ESTADO: CONECTADO";
                });

                // 3. Intentar llamar automáticamente si hay un ID
                const target = document.getElementById('targetID').value;
                if(target) {
                    const call = App.peer.call(target, App.stream);
                    call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; });
                }

                document.getElementById('status').innerText = "ESTADO: TRANSMITIENDO (ID: " + App.peer.id + ")";
                document.getElementById('btnTransmision').style.display = 'none'; // Ocultar para limpiar interfaz
            } catch(e) {
                alert("Error: Asegúrate de dar permisos de cámara.");
            }
        }
    </script>
</body>
</html>
