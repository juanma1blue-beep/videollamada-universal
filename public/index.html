<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Misión Útil - Restauración Total y Datos</title>
    <style>
        body { font-family: sans-serif; background: #0e1621; color: white; margin: 0; padding: 5px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .data-panel { background: #17212b; padding: 5px; border-radius: 8px; font-size: 0.75em; display: flex; justify-content: space-around; }
        .horde-bar { width: 100%; height: 8px; background: #242f3d; border-radius: 4px; overflow: hidden; margin: 5px 0; }
        .horde-progress { width: 45%; height: 100%; background: #228B22; }
        .wrapper { display: flex; flex-direction: column; flex-grow: 1; gap: 4px; padding: 4px 0; }
        .video-box { flex: 1; background: #000; border-radius: 8px; position: relative; overflow: hidden; }
        .star { width: 6px; height: 6px; background: gold; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); display: inline-block; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; transform: scale(0.8); } to { opacity: 1; transform: scale(1.1); } }
        #consoleLog { font-size: 0.6em; color: #00ff00; height: 30px; overflow-y: auto; background: #0e1621; padding: 3px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="data-panel">
        <div>Oro: 739</div>
        <div>Jeeves: Solo si no mount</div>
        <div>Addon: Looking for Satchels</div>
    </div>
    <div class="horde-bar"><div class="horde-progress"></div></div>

    <div class="wrapper">
        <div class="video-box">
            <video id="v1" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
            <div style="position:absolute; bottom:5px; left:5px; display:flex; gap:5px;">
                <div id="stars1"></div>
                <div id="display1" style="color:gold; font-weight:bold;"></div>
            </div>
        </div>
        <div class="video-box">
            <video id="v2" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
            <div style="position:absolute; bottom:5px; left:5px; display:flex; gap:5px;">
                <div id="stars2"></div>
                <div id="display2" style="color:gold; font-weight:bold;"></div>
            </div>
        </div>
    </div>

    <div id="consoleLog">Sistema restaurado al 100% con datos de usuario.</div>

    <script>
        function procesarNombre(id, nombre) {
            const starField = document.getElementById('stars'+id);
            const display = document.getElementById('display'+id);
            starField.innerHTML = '<span class="star"></span><span class="star"></span><span class="star"></span>';
            setTimeout(() => {
                display.innerText = nombre;
                setInterval(() => { display.style.visibility = (display.style.visibility === 'hidden') ? 'visible' : 'hidden'; }, 60000);
            }, 1000);
        }
        // Inicialización de nombres guardados
        window.onload = () => {
            if(sessionStorage.getItem('u1')) procesarNombre(1, sessionStorage.getItem('u1'));
            if(sessionStorage.getItem('u2')) procesarNombre(2, sessionStorage.getItem('u2'));
        };
    </script>
</body>
</html>
