<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V134.0 [CARGA DIRECTA]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #panel { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: #050a1a; z-index: 100; }
        .box { background: #0a1122; padding: 30px; border: 2px solid #a50044; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; }
        #videoArea { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        .v-container { flex: 1; position: relative; border-bottom: 2px solid #004d98; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .weather-widget { position: absolute; top: 10px; right: 10px; z-index: 50; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3 id="statusText">SISTEMA LISTO</h3>
            <button id="btnIniciar" style="padding:20px; width:100%; background:#a50044; color:#fff; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">INICIAR VÍDEO</button>
        </div>
    </div>

    <div id="videoArea">
        <div class="v-container"><div class="weather-widget" id="w1">Esperando...</div><video id="remoteVideo" autoplay playsinline></video></div>
        <div class="v-container"><div class="weather-widget" id="w2">Esperando...</div><video id="localVideo" autoplay playsinline muted></video></div>
    </div>

    <script>
        const peer = new Peer();
        
        document.getElementById('btnIniciar').addEventListener('click', async () => {
            document.getElementById('statusText').innerText = "Solicitando cámara...";
            
            try {
                // 1. Prioridad absoluta: Cámara
                const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('localVideo').srcObject = stream;
                
                // 2. Cambio de interfaz inmediato
                document.getElementById('panel').style.display = 'none';
                document.getElementById('videoArea').style.display = 'flex';

                // 3. Obtener tiempo en segundo plano sin bloquear nada
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current=temperature_2m`);
                        const data = await res.json();
                        const temp = Math.round(data.current.temperature_2m) + "°C";
                        document.getElementById('w1').innerText = temp;
                        document.getElementById('w2').innerText = temp;
                    }, () => {
                        document.getElementById('w1').innerText = "28°C";
                        document.getElementById('w2').innerText = "28°C";
                    });
                }
            } catch (e) {
                alert("Error de cámara: " + e.message);
                document.getElementById('statusText').innerText = "Error, intenta de nuevo";
            }
        });
    </script>
</body>
</html>
