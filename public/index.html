<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SISTEMA V1.3 MEJORADO</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #000;
    color: #fff;
    font-family: sans-serif;
    height: 100vh;
    overflow: hidden;
}

#panel {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #050a1a;
    z-index: 10;
}

.box {
    background: #0a1122;
    padding: 40px;
    width: 95%;
    max-width: 500px;
    border: 3px solid #a50044;
    border-radius: 25px;
    text-align: center;
}

input {
    width: 100%;
    padding: 20px;
    margin: 10px 0;
    background: #000;
    border: 2px solid #004d98;
    color: #fff;
    border-radius: 12px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
}

#videoArea {
    display: none;
    width: 100vw;
    height: 100vh;
    flex-direction: column;
}

.v-container {
    width: 100%;
    flex: 1;
    position: relative;
    border-bottom: 2px solid #004d98;
    overflow: hidden;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.weather-widget {
    position: absolute;
    top: 15px;
    right: 15px;
    z-index: 999;
    background: rgba(0,0,0,0.8);
    border: 1px solid #00d2ff;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 14px;
    color: #00d2ff;
    font-weight: bold;
}

#estado {
    position: absolute;
    top: 15px;
    left: 15px;
    z-index: 999;
    background: rgba(0,0,0,0.8);
    padding: 10px;
    border-radius: 10px;
    font-weight: bold;
}

.control-bar {
    height: 120px;
    width: 100%;
    display: flex;
    justify-content: space-around;
    align-items: center;
    background: linear-gradient(180deg, #a50044 0%, #004d98 100%);
    border-top: 3px solid #fff;
    padding: 10px;
}

.btn-end {
    background: rgba(0,0,0,0.3);
    border: 2px solid #fff;
    border-radius: 20px;
    padding: 15px 25px;
    cursor: pointer;
    font-weight: 900;
    font-size: 14px;
    color: #fff;
    text-transform: uppercase;
}
</style>
</head>

<body>

<div id="panel">
    <div class="box">
        <h3>ID CONEXIÓN</h3>
        <input id="myID" readonly>

        <h3>ID SOCIO</h3>
        <input id="targetID" placeholder="Introduce ID socio">

        <button onclick="iniciar()" class="btn-end" style="width:100%;margin-top:15px;">
            INICIAR
        </button>
    </div>
</div>

<div id="videoArea">

    <div id="estado">🟡 Inicializando...</div>

    <div class="v-container">
        <div class="weather-widget" id="w1">---</div>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div class="v-container">
        <div class="weather-widget" id="w2">---</div>
        <video id="localVideo" autoplay playsinline muted></video>
    </div>

    <div class="control-bar">

        <button class="btn-end" onclick="colgar()">COLGAR</button>
        <button class="btn-end" onclick="toggleMic()">MIC</button>
        <button class="btn-end" onclick="toggleCam()">CAM</button>

    </div>
</div>

<script>

let localStream = null;
let call = null;
let mic = true;
let cam = true;

const peer = new Peer();

function estado(t){
    document.getElementById("estado").textContent = t;
}

peer.on('open', id => {
    document.getElementById('myID').value = id;
    estado("🟢 Listo");
});

peer.on('error', err => {
    console.log(err);
    estado("🔴 Error PeerJS");
});

peer.on('call', incoming => {

    if(!localStream){
        estado("⚠️ Sin cámara");
        return;
    }

    call = incoming;

    estado("📞 Llamada entrante");

    call.answer(localStream);

    call.on('stream', remote => {
        document.getElementById('remoteVideo').srcObject = remote;
        estado("🟢 Conectado");
    });
});

async function iniciar(){

try{

    localStream = await navigator.mediaDevices.getUserMedia({
        video:true,
        audio:true
    });

    document.getElementById('localVideo').srcObject = localStream;

    document.getElementById('panel').style.display = 'none';
    document.getElementById('videoArea').style.display = 'flex';

    const target = document.getElementById('targetID').value.trim();

    if(target){

        estado("📡 Llamando...");

        call = peer.call(target, localStream);

        call.on('stream', remote => {
            document.getElementById('remoteVideo').srcObject = remote;
            estado("🟢 Conectado");
        });
    }

}catch(e){
    estado("🔴 Error cámara");
    alert("Permiso denegado o cámara ocupada");
}

}

function colgar(){

    if(call){
        call.close();
        call = null;
    }

    estado("🔴 Colgado");
}

function toggleMic(){

    if(!localStream) return;

    mic = !mic;

    localStream.getAudioTracks().forEach(t => t.enabled = mic);

    estado(mic ? "🎤 Mic ON" : "🔇 Mic OFF");
}

function toggleCam(){

    if(!localStream) return;

    cam = !cam;

    localStream.getVideoTracks().forEach(t => t.enabled = cam);

    estado(cam ? "📷 Cam ON" : "📴 Cam OFF");
}

</script>

</body>
</html>
