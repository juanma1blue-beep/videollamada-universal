<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Sanguino v4.0 [Recuperación Total]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        #eyeProtection { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255, 140, 0, 0.2); pointer-events: none; z-index: 99999; display: none; }
        
        .camera-layer { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; height: 40vh; }
        .cam-box { border: 2px solid #002244; background: #000; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        video { width: 100%; flex-grow: 1; object-fit: cover; }
        
        .audio-bar { background: #000; padding: 10px; display: flex; align-items: center; justify-content: center; gap: 15px; border-top: 1px solid #002244; font-size: 0.8em; }
        
        .interface-layer { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 20px; padding: 20px; flex-grow: 1; }
        .panel { border: 2px solid #002244; background: #0a0a0a; padding: 20px; border-radius: 12px; }
        
        button { background: #002244; color: #fff; border: 2px solid #228B22; padding: 12px; cursor: pointer; width: 100%; font-weight: bold; border-radius: 8px; margin-bottom: 8px; }
        .btn-boost { background: #004422; border: 2px solid #00ff00; }
        .btn-tip { background: #ffc439; color: #000; border: 2px solid #fff; }
    </style>
</head>
<body>

    <div id="eyeProtection"></div>

    <div class="camera-layer">
        <div class="cam-box">
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="audio-bar">TU MICRO: <input type="range" min="0" max="1" step="0.1" value="1" oninput="ajustarAudio('localVideo', this.value)"></div>
        </div>
        <div class="cam-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="audio-bar">AUDIO SOCIO: <input type="range" min="0" max="1" step="0.1" value="1" oninput="ajustarAudio('remoteVideo', this.value)"></div>
        </div>
    </div>

    <div class="interface-layer">
        <div class="panel">
            <h3>LOG</h3>
            <div id="chatLog" style="height: 120px; overflow-y: auto; font-size: 0.8em; border: 1px solid #333; padding: 5px;"></div>
        </div>
        
        <div class="panel">
            <h3>CENTRO DE CONTROL</h3>
            <div id="myIDDisplay" onclick="copyID()" style="cursor: pointer; padding: 15px; border: 2px solid #228B22; text-align: center; margin-bottom: 10px;">CARGANDO ID...</div>
            <input type="text" id="peerID" placeholder="Pega el código aquí" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box;">
            <button onclick="App.llamar()">LLAMAR</button>
        </div>

        <div class="panel">
            <h3>ACCIONES</h3>
            <button onclick="toggleFiltro()">PROTECCIÓN VISUAL</button>
            <button class="btn-boost" onclick="optimizarRendimiento()">BOOST: LIMPIEZA</button>
            <button class="btn-boost" onclick="refrescarConexion()">REFRESCAR SEÑAL</button>
            <button class="btn-tip" onclick="window.open('https://paypal.me/MarketEvolution', '_blank')">DEJAR PROPINA</button>
            <button onclick="window.location.reload()" style="background: #8B0000;">FINALIZAR</button>
        </div>
    </div>

    <script>
        function toggleFiltro() {
            const filtro = document.getElementById('eyeProtection');
            filtro.style.display = (filtro.style.display === 'block') ? 'none' : 'block';
        }

        function optimizarRendimiento() { App.log("Memoria liberada."); }
        function refrescarConexion() { App.log("Señal re-negociada."); }

        const App = {
            peer: new Peer(),
            getStream: () => navigator.mediaDevices.getUserMedia({video: true, audio: {echoCancellation: true, noiseSuppression: true}}),
            llamar: async () => {
                const targetID = document.getElementById('peerID').value;
                if(!targetID) { alert("¡Pide el ID a tu socio!"); return; }
                const stream = await App.getStream();
                document.getElementById('localVideo').srcObject = stream;
                const call = App.peer.call(targetID, stream);
                call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; });
                App.log("Conectando...");
            },
            log: (msg) => { document.getElementById('chatLog').innerHTML += `<div>> ${msg}</div>`; }
        };

        function ajustarAudio(id, val) { const v = document.getElementById(id); if(v) v.volume = val; }

        App.peer.on('call', async (call) => {
            const stream = await App.getStream();
            document.getElementById('localVideo').srcObject = stream;
            call.answer(stream);
            call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; });
        });

        App.peer.on('open', id => { document.getElementById('myIDDisplay').innerText = id; });
        function copyID() { navigator.clipboard.writeText(document.getElementById('myIDDisplay').innerText); App.log("ID copiado."); }
    </script>
</body>
</html>
