<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA V95.0 [CORRECCIÓN VISIBILIDAD]</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* PANEL PRINCIPAL: Fondo diferenciado y jerarquía alta */
        #panel { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #000510; /* Azul muy oscuro para que se vea que es el panel */
            z-index: 9999; /* Máxima prioridad sobre todo */
            padding: 20px;
        }

        .box { 
            background: #050a1a; 
            padding: 25px; 
            width: 100%; 
            max-width: 450px; 
            border: 2px solid #002277; 
            border-radius: 20px; 
            box-shadow: 0 0 30px rgba(0, 50, 150, 0.4);
        }

        /* Ocultar video hasta que sea necesario */
        .live-grid { display: none; } 
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3 style="color:#00d2ff;">ID DE CONEXIÓN</h3>
            <input type="text" id="myID" readonly style="width:100%; padding:10px; background:#0a1122; border:1px solid #002277; color:#fff; border-radius:8px;">
            <br><br>
            <h3 style="color:#00d2ff;">PANEL DE GESTIÓN TÁCTICA</h3>
            <button onclick="iniciar()" style="width:100%; padding:15px; background:#002277; color:#fff; border:none; border-radius:8px; font-weight:bold;">INICIAR VIDEOLLAMADA</button>
        </div>
    </div>

    <div class="live-grid" id="videoArea">
        </div>

    <script>
        function iniciar() {
            document.getElementById('panel').style.display = 'none'; // Oculta el panel negro
            document.getElementById('videoArea').style.display = 'grid'; // Muestra el video
            // ... lógica de conexión ...
        }
    </script>
</body>
</html>
