<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V44.0 [Debug Pro]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #bloqueo { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .live-container { display: grid; grid-template-rows: 1fr 1fr; width: 100vw; height: 100vh; }
        .cam-box { border: 1px solid #333; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #statusLog { position: absolute; top: 10px; right: 10px; color: #0f0; font-size: 12px; z-index: 100; }
    </style>
</head>
<body>

    <div id="bloqueo">
        <h2>SISTEMA BLOQUEADO</h2>
        <input type="text" id="myID" readonly style="width:250px; padding:10px; text-align:center;">
        <input type="text" id="targetID" placeholder="Pega el código de tu pareja..." style="width:250px; padding:10px; text-align:center;">
        <button onclick="conectar()" style="padding:15px 30px; cursor:pointer;">DESBLOQUEAR Y CONECTAR</button>
    </div>

    <div class="live-container">
        <div class="cam-box"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="cam-box"><video id="remoteVideo" autoplay playsinline></video></div>
    </div>
    <div id="statusLog">Esperando conexión...</div>

    <script>
        const uniqueID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = "Tu ID: " + uniqueID;
        const peer = new Peer(uniqueID);
        let myStream;

        async function conectar() {
            const target = document.getElementById('targetID').value.trim();
            if(!target) return alert("Pega el código primero.");

            try {
                // CONFIGURACIÓN AUDIO AGRESIVA (Supresión de eco máxima)
                myStream = await navigator.mediaDevices.getUserMedia({
                    video: true, 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        googEchoCancellation: true,
                        googNoiseSuppression: true,
                        googAutoGainControl: true
                    }
                });
                
                document.getElementById('localVideo').srcObject = myStream;
                document.getElementById('bloqueo').style.display = 'none';
                document.getElementById('statusLog').innerText = "Cámara activa. Llamando...";

                // Escuchar llamadas
                peer.on('call', call => {
                    call.answer(myStream);
                    call.on('stream', st => {
                        document.getElementById('remoteVideo').srcObject = st;
                        document.getElementById('statusLog').innerText = "Conexión remota recibida.";
                    });
                });

                // Iniciar llamada
                const call = peer.call(target, myStream);
                call.on('stream', st => {
                    document.getElementById('remoteVideo').srcObject = st;
                    document.getElementById('statusLog').innerText = "Conexión remota establecida.";
                });
            } catch(e) { 
                alert("Error: " + e.message);
                document.getElementById('statusLog').innerText = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
