<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V40.0 [TikTok Live Mode]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --azul: #001E62; --neon: #FF3333; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Contenedor principal: Cámaras ocupan todo */
        .live-zone { flex: 1; position: relative; display: flex; flex-direction: column; }
        .cam-box { flex: 1; position: relative; border-bottom: 1px solid var(--azul); }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Capa del Chat flotante sobre el vídeo */
        #chatOverlay { position: absolute; bottom: 80px; left: 10px; width: 250px; height: 300px; overflow-y: auto; pointer-events: none; z-index: 10; padding: 10px; }
        .chat-msg { background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 15px; margin-bottom: 5px; font-size: 0.85em; border-left: 3px solid var(--neon); }

        /* Panel de control inferior */
        .controls { height: 70px; background: #000; display: flex; align-items: center; justify-content: space-around; padding: 0 10px; border-top: 1px solid var(--azul); }
        input { background: #222; border: none; color: white; padding: 10px; border-radius: 20px; width: 150px; }
        button { background: var(--azul); color: white; border: 1px solid var(--neon); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="live-zone">
        <div id="chatOverlay"></div>
        <div class="cam-box"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="cam-box"><video id="remoteVideo" autoplay playsinline></video></div>
    </div>

    <div class="controls">
        <input type="text" id="msgInput" placeholder="Escribe aquí...">
        <button onclick="enviarMensaje()">ENVIAR</button>
        <button onclick="window.open('https://paypal.me/MarketEvolution', '_blank')">PROPINA</button>
        <button onclick="location.reload()" style="background:var(--neon);">SALIR</button>
    </div>

    <script>
        const myID = Math.random().toString(36).substring(2, 10);
        const App = { peer: new Peer(myID) };

        function enviarMensaje() {
            const input = document.getElementById('msgInput');
            if(input.value.trim()) {
                const chat = document.getElementById('chatOverlay');
                chat.innerHTML += `<div class="chat-msg"><strong>Tú:</strong> ${input.value}</div>`;
                input.value = '';
                chat.scrollTop = chat.scrollHeight;
            }
        }

        async function iniciar() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('localVideo').srcObject = stream;
                App.peer.on('call', call => { call.answer(stream); call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; }); });
            } catch(e) { alert("Error de cámara."); }
        }
        
        // Auto-iniciar al abrir
        iniciar();
    </script>
</body>
</html>
