<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base44 - Transmisión Real Unificada</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background-color: #f0f4f8; color: #333; line-height: 1.4; padding: 10px; }
        .main-layout { display: flex; gap: 10px; max-width: 1200px; margin: 0 auto; }
        .container { flex: 2; background: #ffffff; padding: 15px; border-radius: 8px; }
        
        /* AJUSTES PARA FLUIDEZ Y NO-LAG */
        video { width: 100%; height: 100%; object-fit: cover; background: #000; transform: translateZ(0); will-change: transform; }
        
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h1 { color: #004d98; font-size: 18px; }

        .video-grid { display: flex; gap: 10px; }
        .video-box { width: 100%; height: 200px; background: #222; border-radius: 4px; overflow: hidden; position: relative; }
        
        /* CORRECCIÓN DE BUG EN CAMPO DE TEXTO */
        .chat-panel { flex: 1; background: #ffffff; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; height: 400px; }
        .chat-input-area { display: flex; gap: 5px; flex-shrink: 0; width: 100%; }
        .chat-input { flex: 1; min-width: 0; padding: 10px; border: 2px solid #ccc; border-radius: 4px; height: 40px; }
        
        .instructions-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; margin-top: 10px; font-size: 11px; }
        button { height: 40px; padding: 0 15px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-primary { background-color: #004d98; }
        .btn-success { background-color: #28a745; }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="container">
            <div class="header-area">
                <h1>Base44</h1>
                <a href="https://PayPal.me/MarketEvolution" target="_blank" style="background:#ffc439; padding:5px 10px; border-radius:20px; font-size:12px; font-weight:bold; color:#003087; text-decoration:none;">PayPal</a>
            </div>
            <div class="video-grid">
                <div class="video-box"><video id="localVideo" autoplay playsinline muted></video></div>
                <div class="video-box"><video id="remoteVideo" autoplay playsinline></video></div>
            </div>
            <div class="instructions-box">
                <h2>Guía Rápida de Uso</h2>
                <p>Persona 1 genera código. Persona 2 conecta. Gesto Stop (✋) 2s para colgar.</p>
                <p>Auto-optimización de caché activa en cada cierre.</p>
            </div>
        </div>
        <div class="chat-panel">
            <h3>Chat</h3>
            <div id="chatBox" style="flex:1; overflow-y:auto; border:1px solid #ddd; margin-bottom:10px; padding:5px;"></div>
            <div class="chat-input-area">
                <input type="text" id="chatMsg" class="chat-input" placeholder="Escribe aquí...">
                <button class="btn-primary" onclick="enviarMensajeChat()">Enviar</button>
            </div>
        </div>
    </div>
    <script>
        let localStream = null, peer = null, currentCall = null;
        // Optimización WebRTC para reducir lag
        const constraints = { video: { width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 30 } }, audio: true };
        
        async function activarCamaraLocal() {
            localStream = await navigator.mediaDevices.getUserMedia(constraints);
            document.getElementById('localVideo').srcObject = localStream;
        }
        
        function inicializarPeer(id) {
            peer = new Peer(id);
            peer.on('call', (c) => { c.answer(localStream); gestionarLlamada(c); });
        }

        function gestionarLlamada(call) {
            currentCall = call;
            call.on('stream', (s) => document.getElementById('remoteVideo').srcObject = s);
        }

        function enviarMensajeChat() {
            const input = document.getElementById('chatMsg');
            document.getElementById('chatBox').innerHTML += `<div><b>Juanma:</b> ${input.value}</div>`;
            input.value = "";
        }
    </script>
</body>
</html>
