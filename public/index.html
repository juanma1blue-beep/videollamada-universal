<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V53.0 [Agenda WiFi]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        
        #panel { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .box { background: #111; padding: 20px; border-radius: 15px; width: 320px; border: 1px solid #333; }
        
        /* Estilo Agenda */
        .amigo-item { display: flex; justify-content: space-between; padding: 10px; background: #222; margin-bottom: 5px; border-radius: 5px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; margin-top: 5px; }
        button { width: 100%; padding: 10px; margin-top: 5px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3>AGENDA DE CONTACTOS (WiFi)</h3>
            <div id="listaAmigos"></div>
            <input type="text" id="nombreAmigo" placeholder="Nombre...">
            <input type="text" id="idAmigo" placeholder="ID de conexión...">
            <button onclick="guardarAmigo()" style="background:#006600; color:white;">AÑADIR A LA AGENDA</button>
            
            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
            
            <h3>TU IDENTIFICADOR</h3>
            <input type="text" id="myID" readonly>
            <input type="text" id="targetID" placeholder="Pega ID para conectar...">
            <button onclick="conectar()" style="background:#A50044; color:white;">INICIAR VÍDEO (WiFi)</button>
        </div>
    </div>

    <script>
        const myID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = myID;
        const peer = new Peer(myID);
        let amigos = JSON.parse(localStorage.getItem('agenda') || '[]');

        function guardarAmigo() {
            const nombre = document.getElementById('nombreAmigo').value;
            const id = document.getElementById('idAmigo').value;
            amigos.push({nombre, id});
            localStorage.setItem('agenda', JSON.stringify(amigos));
            renderAgenda();
        }

        function renderAgenda() {
            const lista = document.getElementById('listaAmigos');
            lista.innerHTML = amigos.map(a => `<div class="amigo-item"><span>${a.nombre}</span><button onclick="document.getElementById('targetID').value='${a.id}'" style="width:auto; padding:2px 10px;">Llamar</button></div>`).join('');
        }

        async function conectar() {
            const target = document.getElementById('targetID').value.trim();
            // ... (Lógica de conexión PeerJS igual a la v52)
            document.getElementById('panel').style.display = 'none';
        }

        renderAgenda();
    </script>
</body>
</html>
