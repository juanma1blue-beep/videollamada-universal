<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA SANGUINO V12.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #eee; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .camera-layer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; height: 40vh; }
        .cam-box { border: 1px solid #222; background: #000; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        video { width: 100%; flex-grow: 1; object-fit: cover; }
        .nombre-tag { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px; font-size: 0.8em; border: 1px solid #1a1a1a; color: #00ff00; }
        
        .interface-layer { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 15px; padding: 15px; flex-grow: 1; }
        .panel { border: 1px solid #1a1a1a; background: #0a0a0a; padding: 15px; border-radius: 10px; display: flex; flex-direction: column; }
        h3 { margin: 0 0 10px 0; font-size: 0.9em; text-transform: uppercase; color: #666; border-bottom: 1px solid #222; padding-bottom: 5px; }
        
        button { background: #111; color: #eee; border: 1px solid #333; padding: 10px; cursor: pointer; width: 100%; font-weight: bold; border-radius: 4px; margin-bottom: 8px; font-size: 0.85em; }
        .btn-call { background: #002211; border-color: #008844; }
        .btn-final { background: #440000; border-color: #880000; margin-top: auto; }
        input { padding: 8px; background: #000; color: #fff; border: 1px solid #333; border-radius: 4px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="camera-layer">
        <div class="cam-box"><div id="miNombre" class="nombre-tag">TÚ</div><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="cam-box"><video id="remoteVideo" autoplay playsinline></video></div>
    </div>

    <div class="interface-layer">
        <div class="panel">
            <h3>Gestión de Enlaces</h3>
            <input type="text" id="tagSocio" placeholder="ID de conexión">
            <button onclick="vincularSocio()" style="background: #003366; border: 1px solid #0055aa;">VINCULAR ENLACE</button>
            <div style="margin-top:10px;">
                <button onclick="gestionarNodo('EXTERNO')">SINCRONIZAR RED</button>
                <button onclick="gestionarNodo('INTERNO')">CARGAR DATOS LOCALES</button>
            </div>
            <button class="btn-final" onclick="window.location.reload()">FINALIZAR SESIÓN</button>
        </div>
        
        <div class="panel">
            <h3>Control Maestro</h3>
            <input type="text" id="nombreInput" placeholder="Nombre en cámara">
            <button onclick="guardarNombre()">GUARDAR IDENTIDAD</button>
            <div id="myIDDisplay" onclick="copyID()" style="padding:15px; border:1px solid #228B22; text-align:center; margin-bottom:15px; background:#000; border-radius:4px; cursor:pointer; font-family:monospace; color:#228B22;">CARGANDO ID...</div>
            <input type="text" id="peerID" placeholder="ID del socio">
            <button class="btn-call" onclick="App.llamar()">LLAMAR AHORA</button>
        </div>

        <div class="panel">
            <h3>Estado del Sistema</h3>
            <button onclick="optimizar()">BOOST: LIMPIEZA</button>
            <button onclick="refrescar()">REFRESCAR SEÑAL</button>
            <button onclick="proteccion()">PROTECCIÓN VISUAL</button>
            <button onclick="window.open('https://paypal.me/MarketEvolution', '_blank')">APOYAR PROYECTO</button>
        </div>
    </div>

    <script>
        function guardarNombre() {
            const nom = document.getElementById('nombreInput').value;
            if(nom) { localStorage.setItem('nombreSanguino', nom); document.getElementById('miNombre').innerText = nom; }
        }
        function vincularSocio() {
            const tag = document.getElementById('tagSocio').value;
            if(tag) alert("Enlace vinculado con: " + tag);
        }
        function gestionarNodo(tipo) { alert("Accediendo a Nodo " + tipo + "."); }
        function optimizar() { alert("Sistema: Memoria optimizada."); }
        function refrescar() { alert("Sistema: Señal reestablecida."); }
        function proteccion() { alert("Protección visual activa."); }
        
        const App = {
            peer: new Peer(),
            getStream: () => navigator.mediaDevices.getUserMedia({video: true, audio: true}),
            llamar: async () => {
                const targetID = document.getElementById('peerID').value;
                if(!targetID) return alert("Error: ID socio vacío.");
                const stream = await App.getStream();
                document.getElementById('localVideo').srcObject = stream;
                const call = App.peer.call(targetID, stream);
                call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; });
            }
        };
        App.peer.on('open', id => { document.getElementById('myIDDisplay').innerText = id; });
        function copyID() { navigator.clipboard.writeText(document.getElementById('myIDDisplay').innerText); alert("ID copiado."); }
    </script>
</body>
</html>
