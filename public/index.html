<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base44 - Restauración Total</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose"></script>

    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 10px; margin: 0; }
        .main-layout { display: flex; flex-direction: column; max-width: 800px; margin: auto; gap: 15px; }
        .container { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .video-box { background: #222; border-radius: 4px; overflow: hidden; margin-top: 10px; height: 200px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .room-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #004d98; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .btn-success { background: #28a745; }
        .btn-youtube { background: #ff0000; }
        .btn-paypal { background: #ffc439; color: #003087; text-decoration: none; display: block; text-align: center; padding: 10px; border-radius: 4px; font-weight: bold; margin-bottom: 10px; }
        .chat-panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chatBox { height: 150px; border: 1px solid #ccc; overflow-y: auto; padding: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="container">
            <h1>Base44</h1>
            <a href="https://PayPal.me/MarketEvolution" target="_blank" class="btn-paypal">PayPal 💛 Propinas</a>
            <a href="https://www.youtube.com/@juanmaentertaiment" target="_blank" class="btn-youtube" style="display:block; text-align:center; color:white; padding:10px; border-radius:4px; font-weight:bold; margin-bottom:10px; text-decoration:none;">Canal YouTube</a>
            
            <input type="text" id="roomCode" class="room-input" placeholder="CÓDIGO">
            <button onclick="generar()">Generar Código</button>
            <button class="btn-success" onclick="conectar()">Conectar</button>
            
            <div class="video-box"><video id="localVideo" autoplay playsinline muted></video></div>
            <div class="video-box"><video id="remoteVideo" autoplay playsinline></video></div>
        </div>
        <div class="chat-panel">
            <h3>Chat</h3>
            <div id="chatBox"></div>
            <input type="text" id="chatMsg" class="room-input" placeholder="Mensaje...">
            <button onclick="enviar()">Enviar</button>
        </div>
    </div>
    <script>
        let localStream, peer, call, model;

        async function init() {
            model = await handpose.load();
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVideo').srcObject = localStream;
            detectar();
        }
        init();

        async function detectar() {
            const video = document.getElementById('localVideo');
            const hands = await model.estimateHands(video);
            if (hands.length > 0 && call) {
                call.close();
            }
            setTimeout(detectar, 1000);
        }

        function generar() {
            const id = 'B44-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            document.getElementById('roomCode').value = id;
            peer = new Peer(id);
            peer.on('call', c => { c.answer(localStream); call = c; c.on('stream', s => document.getElementById('remoteVideo').srcObject = s); });
        }

        function conectar() {
            peer = new Peer();
            call = peer.call(document.getElementById('roomCode').value, localStream);
            call.on('stream', s => document.getElementById('remoteVideo').srcObject = s);
        }

        function enviar() {
            const msg = document.getElementById('chatMsg').value;
            document.getElementById('chatBox').innerHTML += "<div><b>Juanma:</b> " + msg + "</div>";
            document.getElementById('chatMsg').value = "";
        }
    </script>
</body>
</html>
