<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V70.0 [NÚCLEO INTOCABLE]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #panel { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .box { background: #151515; padding: 25px; width: 340px; border: 1px solid #333; border-radius: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 8px; background: #0a0a0a; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        
        button { width: 100%; padding: 12px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 8px; border-radius: 8px; transition: 0.3s; }
        
        /* PALETA DE IMPACTO - NÚCLEO ESTABLE */
        .btn-video { background: linear-gradient(135deg, #0055ff, #002277); border: 1px solid #0099ff; color: #fff; }
        .btn-save  { background: linear-gradient(135deg, #00b070, #005030); border: 1px solid #00ff90; color: #fff; }
        .btn-wifi  { background: linear-gradient(135deg, #00d2ff, #006677); border: 1px solid #00f2ff; color: #fff; }
        .btn-edit  { background: linear-gradient(135deg, #ffaa00, #885500); border: 1px solid #ffcc00; color: #fff; }
        
        .btn-end { 
            position: absolute; bottom: 20px; right: 20px; z-index: 100; 
            background: linear-gradient(135deg, #770000, #330000); border: 1px solid #ff4444; color: white;
            padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold;
        }

        .amigo-item { background: #1a1a1a; padding: 12px; margin-bottom: 10px; border-radius: 10px; border-left: 4px solid #444; }
        .live-grid { display: grid; grid-template-rows: 1fr 1fr; width: 100vw; height: 100vh; display: none; }
        .cam-box { position: relative; border-bottom: 1px solid #222; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3>ID DE CONEXIÓN</h3>
            <input type="text" id="myID" readonly>
            
            <h3>OPERACIONES</h3>
            <input type="text" id="targetID" placeholder="Pega el ID aquí...">
            <button class="btn-video" onclick="conectar()">Iniciar Videollamada</button>
            
            <h3>AGENDA</h3>
            <div id="listaAmigos"></div>
            <input type="text" id="nombre" placeholder="Nombre...">
            <input type="text" id="telefono" placeholder="Número...">
            <button class="btn-save" onclick="guardar()">Guardar Contacto</button>
        </div>
    </div>

    <div class="live-grid" id="videoArea">
        <div class="cam-box"><video id="remoteVideo" autoplay playsinline></video></div>
        <div class="cam-box">
            <video id="localVideo" autoplay playsinline muted></video>
            <button class="btn-end" onclick="location.reload()">FINALIZAR</button>
        </div>
    </div>

    <script>
        const randomID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = randomID;
        const peer = new Peer(randomID);

        function editar(index) {
            let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');
            let n = prompt("Nuevo nombre:", agenda[index].nombre);
            let t = prompt("Nuevo número:", agenda[index].telefono);
            if(n && t) { agenda[index] = {nombre: n, telefono: t}; localStorage.setItem('agenda', JSON.stringify(agenda)); render(); }
        }

        function guardar() {
            const nombre = document.getElementById('nombre').value;
            const telefono = document.getElementById('telefono').value;
            if(!nombre || !telefono) return alert("Rellena nombre y número");
            let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');
            agenda.push({nombre, telefono});
            localStorage.setItem('agenda', JSON.stringify(agenda));
            render();
        }

        function render() {
            const lista = document.getElementById('listaAmigos');
            let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');
            lista.innerHTML = agenda.map((a, i) => `
                <div class="amigo-item">
                    <b>${a.nombre}</b><br>${a.telefono}
                    <button class="btn-wifi" onclick="alert('Llamada WiFi a ${a.telefono}')">LLAMADA WIFI</button>
                    <button class="btn-edit" onclick="editar(${i})">EDITAR</button>
                </div>`).join('');
        }

        async function conectar() {
            const target = document.getElementById('targetID').value.trim();
            if(!target) return alert("Pega un ID");
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVideo').srcObject = stream;
            peer.on('call', call => { call.answer(stream); call.on('stream', st => document.getElementById('remoteVideo').srcObject = st); });
            const call = peer.call(target, stream);
            call.on('stream', st => document.getElementById('remoteVideo').srcObject = st);
            document.getElementById('panel').style.display = 'none';
            document.getElementById('videoArea').style.display = 'grid';
        }
        render();
    </script>
</body>
</html>
