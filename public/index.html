<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión Útil - Restaurada</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0e1621; color: white; margin: 0; padding: 4px; height: 100vh; display: flex; flex-direction: column; }
        .status-header { background: #17212b; padding: 5px; display: flex; align-items: center; justify-content: center; border-radius: 8px; gap: 4px; }
        .btn-green { background: #242f3d; color: #228B22; border: 2px solid #228B22; padding: 2px 6px; border-radius: 4px; cursor: pointer; }
        .wrapper { display: flex; flex-direction: column; flex-grow: 1; padding: 4px 0; gap: 4px; }
        .video-box { flex: 1; background: #000; border-radius: 8px; position: relative; overflow: hidden; }
        .cam-overlay { position: absolute; bottom: 8px; left: 8px; right: 8px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 6px; display: flex; align-items: center; gap: 5px; }
        .star { width: 5px; height: 5px; background: gold; border-radius: 50%; display: inline-block; animation: pop 1s ease-out; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .name-txt { font-weight: bold; color: gold; }
    </style>
</head>
<body>
    <div class="status-header">
        <input type="text" id="roomInput" readonly>
        <button class="btn-green" onclick="startCamera()">🔗 Conectar</button>
    </div>
    <div class="wrapper">
        <div class="video-box">
            <div class="cam-overlay">
                <div id="statusDot1" style="width:8px; height:8px; background:#ff4444; border-radius:50%;"></div>
                <div id="starContainer1"></div>
                <div id="nameDisplay1" class="name-txt"></div>
                <input type="text" id="name1" placeholder="Nombre...">
                <button onclick="applyName(1)">OK</button>
                <button onclick="confirmEnd()" style="background:#ff5959; border:none; color:white;">📞</button>
            </div>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
    </div>

    <script>
        document.getElementById('roomInput').value = Math.random().toString(36).substring(2, 12);
        let localStream = null;

        function applyName(id) {
            const name = document.getElementById('name'+id).value;
            const container = document.getElementById('starContainer1');
            const display = document.getElementById('nameDisplay1');
            
            // Efecto estrellas
            container.innerHTML = '<span class="star"></span><span class="star"></span><span class="star"></span>';
            setTimeout(() => {
                display.innerText = name;
                // Ocultar tras 1 min, volver a aparecer tras 1 min
                setInterval(() => {
                    display.style.display = (display.style.display === 'none') ? 'block' : 'none';
                }, 60000);
            }, 1000);
        }

        function confirmEnd() {
            if(localStream && confirm("¿Deseas finalizar la videollamada?")) window.location.reload();
            else if(!localStream) alert("Cámara no activa.");
        }

        async function startCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('statusDot1').style.background = '#00ff00';
            } catch(e) { console.error(e); }
        }
    </script>
</body>
</html>
