<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V59.0 [Llamada WiFi]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        #panel { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .box { background: #111; padding: 20px; border-radius: 15px; width: 320px; border: 1px solid #333; }
        .amigo-item { background: #222; padding: 10px; margin-bottom: 8px; border-radius: 5px; }
        input { width: 100%; padding: 8px; margin-bottom: 5px; background: #000; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3>PASO 1: TU IDENTIFICACIÓN</h3>
            <input type="text" id="myID" readonly>
            
            <h3>PASO 2: CONEXIÓN</h3>
            <input type="text" id="targetID" placeholder="Pega el ID aquí...">
            <button onclick="conectar()" style="background:#A50044; color:white;">CONECTAR VÍDEO</button>
            
            <h3 style="margin-top:15px;">AGENDA (LLAMADA WIFI)</h3>
            <div id="listaAmigos"></div>
            <input type="text" id="nombre" placeholder="Nombre...">
            <input type="text" id="telefono" placeholder="Número...">
            <button onclick="guardar()" style="background:#006600; color:white;">GUARDAR CONTACTO</button>
        </div>
    </div>

    <script>
        const myID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = myID;
        let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');

        function guardar() {
            const nombre = document.getElementById('nombre').value;
            const telefono = document.getElementById('telefono').value;
            if(!nombre || !telefono) return alert("Rellena nombre y número");
            agenda.push({nombre, telefono});
            localStorage.setItem('agenda', JSON.stringify(agenda));
            render();
        }

        function render() {
            const lista = document.getElementById('listaAmigos');
            lista.innerHTML = agenda.map(a => `
                <div class="amigo-item">
                    <b>${a.nombre}</b><br>${a.telefono}
                    <button onclick="iniciarLlamadaWiFi('${a.telefono}')" style="background:#0044cc; color:white; margin-top:8px;">LLAMADA WIFI</button>
                </div>`).join('').replace(/LLAMADA WIFI/g, 'LLAMADA WIFI');
        }

        function iniciarLlamadaWiFi(num) {
            // Esta función ejecuta la lógica de llamada de datos interna
            alert("Iniciando llamada WiFi a: " + num + "\nSin consumo de datos móviles.");
            // Aquí se integraría el stream de audio puro que diseñamos
        }

        function conectar() { /* ... */ }
        render();
    </script>
</body>
</html>
