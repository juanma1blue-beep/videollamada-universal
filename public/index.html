<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comando Élite - Proyecto Sanguino v1.1</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Verdana', sans-serif; height: 100vh; display: flex; flex-direction: column; transition: filter 0.3s; }
        .night-mode { filter: sepia(0.4) hue-rotate(180deg) brightness(0.85); }
        
        .camera-layer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; height: 45vh; }
        .cam-box { border: 2px solid #002244; background: #000; border-radius: 8px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        video { width: 100%; height: 85%; object-fit: cover; }
        
        /* Controles de Volumen Integrados */
        .audio-control { height: 15%; background: #0a0a0a; display: flex; align-items: center; padding: 0 10px; border-top: 1px solid #002244; font-size: 0.7em; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #228B22; margin-left: 10px; }

        .interface-layer { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px; padding: 10px; flex-grow: 1; }
        .panel { border: 1px solid #002244; background: #0a0a0a; padding: 10px; border-radius: 8px; }
        
        input { background: #000; color: #fff; border: 1px solid #002244; padding: 8px; width: 90%; margin-bottom: 5px; }
        button { background: #002244; color: #fff; border: 1px solid #228B22; padding: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 5px; }
        .btn-red { background: #8B0000; border: 1px solid #FF4500; }
        .chat-log { height: 150px; overflow-y: auto; font-size: 0.8em; border: 1px solid #333; padding: 5px; margin-bottom: 5px; color: #ddd; }
    </style>
</head>
<body>

    <div class="camera-layer">
        <div class="cam-box">
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="audio-control">TU MIC:<input type="range" min="0" max="1" step="0.1" value="0.5" oninput="ajustarAudio('local', this.value)"></div>
        </div>
        <div class="cam-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="audio-control">AUDIO SOCIO:<input type="range" min="0" max="1" step="0.1" value="0.5" oninput="ajustarAudio('remote', this.value)"></div>
        </div>
    </div>

    <div class="interface-layer">
        <div class="panel">
            <h3>[Session] Log</h3>
            <div id="chatLog" class="chat-log"></div>
            <input type="text" id="chatInput" placeholder="/w Asesor..." onkeypress="App.manejarChat(event)">
        </div>
        <div class="panel">
            <h3>CABECERA DE MANDO</h3>
            <div id="myIDDisplay" style="font-size:1.2em; font-weight:bold; border:2px solid #228B22; padding:10px; text-align:center; cursor:pointer;" onclick="copyID()">GENERANDO ID...</div>
            <input type="text" id="peerID" placeholder="Introduce el ID de tu socio aquí">
            <button onclick="App.conectar()">CONECTAR SESIÓN PRIVADA</button>
        </div>
        <div class="panel">
            <h3>PROTOCOLOS</h3>
            <button onclick="toggleNightMode()">MODO PROTECCIÓN OCULAR</button>
            <button class="btn-red" onclick="window.location.reload()">CERRAR OPERACIÓN</button>
        </div>
    </div>

    <script>
        const App = {
            peer: new Peer(),
            conectar: async () => {
                const stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                document.getElementById('localVideo').srcObject = stream;
                const call = App.peer.call(document.getElementById('peerID').value, stream);
                call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; });
            },
            manejarChat: (e) => {
                if (e.key === 'Enter') {
                    const val = e.target.value;
                    document.getElementById('chatLog').innerHTML += `<div>[Tú] ${val}</div>`;
                    e.target.value = '';
                }
            }
        };
        function ajustarAudio(tipo, valor) {
            const video = document.getElementById(tipo === 'local' ? 'localVideo' : 'remoteVideo');
            video.volume = valor;
        }
        function toggleNightMode() { document.body.classList.toggle('night-mode'); }
        App.peer.on('open', id => { document.getElementById('myIDDisplay').innerText = id; });
        function copyID() { navigator.clipboard.writeText(document.getElementById('myIDDisplay').innerText); alert("ID Copiado"); }
    </script>
</body>
</html>
