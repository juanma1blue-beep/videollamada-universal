<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VideoChat Pro - Maestro Ordenado</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding-bottom: 160px; }
        
        /* Ajuste de orden: Flex-wrap y gap para que no se peguen */
        .status-header { 
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
            background: #1e1e1e; padding: 20px; margin: 10px; border-radius: 12px; gap: 15px; 
        }
        
        #timer { font-family: monospace; font-size: 1.5em; color: #00ff00; min-width: 100px; }
        select { padding: 8px; border-radius: 8px; border: none; background: #333; color: white; }
        
        .wrapper { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 10px; }
        .video-box { width: 100%; max-width: 350px; position: relative; background: #000; border-radius: 12px; overflow: hidden; }
        video { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .status-indicator { position: absolute; bottom: 15px; left: 15px; font-size: 2em; z-index: 500; color: #ff3b30; text-shadow: 0 0 5px #000; }
        
        #chatBox, #logBox { width: 100%; max-width: 350px; margin: 10px auto; background: #1e1e1e; border-radius: 12px; padding: 10px; text-align: left; }
        #messages, #consoleLog { height: 80px; overflow-y: auto; font-size: 0.8em; color: #ccc; }
        #consoleLog { color: #00ff00; font-family: monospace; }
        .control-bar { position: fixed; bottom: 0; width: 100%; background: #1e1e1e; padding: 15px 0; display: flex; justify-content: center; gap: 20px; z-index: 1000; border-top: 1px solid #333; }
        .control-bar button { width: 50px; height: 50px; border-radius: 50%; border: none; background: #333; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="status-header">
        <div id="timer">00:00:00</div>
        <input type="text" id="roomInput" style="width: 80px; padding: 8px; border-radius: 8px; border: none;" readonly>
        <select id="videoSource"><option value="">Cámara...</option></select>
        <button onclick="safeExecute(joinRoom)" style="padding: 8px 15px; border-radius: 8px; border: none; background: #0084ff; color: white; cursor: pointer;">Conectar</button>
    </div>

    <div class="wrapper">
        <div class="video-box" id="localBox">
            <span class="status-indicator" id="statusLocal">●</span>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-box" id="remoteBox">
            <span class="status-indicator" id="statusRemote">●</span>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <div id="chatBox">
        <div id="messages"></div>
        <input type="text" id="chatInput" style="width: 70%; padding: 5px;">
        <button onclick="sendMessage()">➤</button>
    </div>

    <div id="logBox">
        <strong>Telemetría:</strong>
        <div id="consoleLog"></div>
    </div>

    <div class="control-bar">
        <button onclick="toggleAudio()">🎙️</button>
        <button onclick="toggleVideo()">📷</button>
        <button onclick="endCall()" style="background:#ff3b30">❌</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const state = { localStream: null, timerInterval: null, countAudio: parseInt(localStorage.getItem('countAudio')) || 0, countVideo: parseInt(localStorage.getItem('countVideo')) || 0, seconds: 0, minutes: 0, hours: 0 };

        async function safeExecute(func) { try { await func(); } catch (err) { log("Error: " + err.message); } }

        async function getDevices() {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoSelect = document.getElementById('videoSource');
            devices.filter(d => d.kind === 'videoinput').forEach(d => {
                const option = document.createElement('option');
                option.value = d.deviceId; option.text = d.label || 'Cámara';
                videoSelect.appendChild(option);
            });
        }

        function log(msg) {
            const entry = document.createElement('div');
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            const logBox = document.getElementById('consoleLog');
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        window.onload = async () => { 
            let room = localStorage.getItem('lastRoom') || Math.random().toString(36).substring(2, 9);
            document.getElementById('roomInput').value = room;
            localStorage.setItem('lastRoom', room);
            await getDevices();
            log("Sistema inicializado.");
        };

        async function startCamera() {
            const videoSource = document.getElementById('videoSource').value;
            state.localStream = await navigator.mediaDevices.getUserMedia({video: {deviceId: videoSource ? {exact: videoSource} : undefined}, audio: true});
            document.getElementById('localVideo').srcObject = state.localStream;
            document.getElementById('statusLocal').style.color = "#00ff00";
            state.timerInterval = setInterval(() => {
                state.seconds++; if (state.seconds === 60) { state.seconds = 0; state.minutes++; }
                document.getElementById('timer').innerText = `${state.hours.toString().padStart(2,'0')}:${state.minutes.toString().padStart(2,'0')}:${state.seconds.toString().padStart(2,'0')}`;
            }, 1000);
        }

        function toggleAudio() { if (state.localStream) { state.localStream.getAudioTracks()[0].enabled = !state.localStream.getAudioTracks()[0].enabled; state.countAudio++; localStorage.setItem('countAudio', state.countAudio); log(`Audio: ${state.countAudio}`); } }
        function toggleVideo() { if (state.localStream) { state.localStream.getVideoTracks()[0].enabled = !state.localStream.getVideoTracks()[0].enabled; state.countVideo++; localStorage.setItem('countVideo', state.countVideo); log(`Video: ${state.countVideo}`); } }
        function sendMessage() { const input = document.getElementById('chatInput'); socket.emit('chat-message', input.value); document.getElementById('messages').innerHTML += `<div>Tú: ${input.value}</div>`; input.value = ''; }
        async function joinRoom() { socket.emit('join-room', document.getElementById('roomInput').value); await startCamera(); }
        function endCall() { clearInterval(state.timerInterval); if(state.localStream) state.localStream.getTracks().forEach(t => t.stop()); window.location.reload(); }
        socket.on('chat-message', (msg) => document.getElementById('messages').innerHTML += `<div>Otro: ${msg}</div>`);
    </script>
</body>
</html>
