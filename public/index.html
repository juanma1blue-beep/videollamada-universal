<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VideoChat Pro - Sistema Integrado</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding-bottom: 160px; }
        .setup-box { background: #1e1e1e; padding: 15px; border-radius: 12px; margin: 10px; }
        .wrapper { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        
        /* Contenedor de vídeo y bolitas visibles */
        .video-box { width: 100%; max-width: 350px; position: relative; background: #000; border-radius: 12px; overflow: hidden; }
        video { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        
        /* Bolitas de estado - Visibilidad blindada */
        .status-indicator { 
            position: absolute; bottom: 15px; left: 15px; font-size: 2em; 
            z-index: 100; color: #ff3b30; text-shadow: 0 0 5px #000; 
        }

        #chatBox, #logBox { width: 100%; max-width: 350px; margin: 10px auto; background: #1e1e1e; border-radius: 12px; padding: 10px; text-align: left; }
        #messages, #consoleLog { height: 80px; overflow-y: auto; font-size: 0.8em; color: #ccc; }
        #consoleLog { color: #00ff00; font-family: monospace; }

        .control-bar { position: fixed; bottom: 0; width: 100%; background: #1e1e1e; padding: 15px 0; display: flex; justify-content: center; gap: 20px; z-index: 200; border-top: 1px solid #333; }
        .control-bar button { width: 50px; height: 50px; border-radius: 50%; border: none; background: #333; color: white; font-size: 1.5em; cursor: pointer; }
    </style>
</head>
<body>
    <div class="setup-box">
        <input type="text" id="roomInput">
        <button onclick="joinRoom()">Conectar</button>
        <div id="timer">00:00:00</div>
    </div>

    <div class="wrapper">
        <div class="video-box" id="localBox">
            <span class="status-indicator" id="statusLocal">●</span>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-box" id="remoteBox">
            <span class="status-indicator" id="statusRemote">●</span>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <div id="chatBox">
        <div id="messages"></div>
        <input type="text" id="chatInput">
        <button onclick="sendMessage()">➤</button>
    </div>

    <div id="logBox">
        <strong>Telemetría:</strong>
        <div id="consoleLog"></div>
    </div>

    <div class="control-bar">
        <button id="btnAudio" onclick="toggleAudio()">🎙️</button>
        <button id="btnVideo" onclick="toggleVideo()">📷</button>
        <button id="btnEnd" onclick="endCall()">❌</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let localStream, timerInterval, seconds = 0, minutes = 0, hours = 0;
        let countAudio = 0, countVideo = 0;

        function log(msg) {
            consoleLog.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        window.onload = () => { 
            document.getElementById('roomInput').value = Math.random().toString(36).substring(2, 9);
            document.getElementById('statusLocal').style.color = "#ff3b30"; // Bolita en rojo al inicio
        };

        async function startCamera() {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVideo').srcObject = localStream;
            document.getElementById('statusLocal').style.color = "#00ff00"; // Bolita verde al conectar
            startTimer();
            log("Cámara y Micro activos.");
        }

        function toggleAudio() {
            const t = localStream.getAudioTracks()[0];
            t.enabled = !t.enabled;
            countAudio++;
            log("Micro (Cambios: " + countAudio + ")");
        }

        function toggleVideo() {
            const t = localStream.getVideoTracks()[0];
            t.enabled = !t.enabled;
            countVideo++;
            log("Cámara (Cambios: " + countVideo + ")");
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++; if (seconds === 60) { seconds = 0; minutes++; }
                if (minutes === 60) { minutes = 0; hours++; }
                document.getElementById('timer').innerText = (hours<10?"0"+hours:hours)+":"+(minutes<10?"0"+minutes:minutes)+":"+(seconds<10?"0"+seconds:seconds);
            }, 1000);
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            socket.emit('chat-message', input.value);
            document.getElementById('messages').innerHTML += `<div>Tú: ${input.value}</div>`;
            input.value = '';
        }

        function joinRoom() { 
            socket.emit('join-room', document.getElementById('roomInput').value); 
            startCamera(); 
        }

        function endCall() { clearInterval(timerInterval); if(localStream) localStream.getTracks().forEach(t => t.stop()); window.location.reload(); }
        
        socket.on('chat-message', (msg) => document.getElementById('messages').innerHTML += `<div>Otro: ${msg}</div>`);
    </script>
</body>
</html>
