<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA V120.0 [FINAL + METEO]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* PANEL PRINCIPAL */
        #panel { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at bottom, #1a1f33 0%, #050a1a 70%); z-index: 10; }
        .box { background: #0a1122; padding: 25px; width: 90%; max-width: 400px; border: 2px solid #a50044; border-radius: 20px; text-align: center; }
        h3 { color: #004d98; margin-bottom: 5px; font-size: 16px; }
        .help-text { color: #555; font-size: 11px; margin-bottom: 15px; display: block; }
        input { width: 100%; padding: 12px; margin: 5px 0 10px 0; background: #000; border: 1px solid #004d98; color: #fff; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; }

        /* VIDEO Y WIDGETS */
        #videoArea { display: none; width: 100vw; height: 100vh; background: #000; }
        .v-container { width: 100%; height: 50%; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* WIDGET METEO: Integrado en cada cámara */
        .weather-widget {
            position: absolute; top: 10px; right: 10px; z-index: 500;
            background: rgba(2, 4, 10, 0.7); border: 1px solid #a50044;
            padding: 6px 10px; border-radius: 12px; font-size: 11px;
            cursor: pointer; backdrop-filter: blur(4px); color: #fff;
        }

        /* BARRA INFERIOR (Intocable) */
        .control-bar { position: fixed; bottom: 20px; left: 5%; width: 90%; display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; border-radius: 40px; border: 2px solid #a50044; z-index: 999; background-color: #02040a; }
        .btn-end { background: none; border: none; cursor: pointer; font-weight: 900; font-size: 20px; text-transform: uppercase; display: flex; align-items: center; }
        .btn-end span { padding: 0 4px; }
        .azul { color: #004d98; } .grana { color: #a50044; }
        .btn-paypal { text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .btn-paypal img { width: 55px; margin-bottom: 2px; }
        .paypal-text { font-weight: bold; font-size: 11px; background: linear-gradient(to right, #004d98, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3>ID CONEXIÓN</h3>
            <input type="text" id="myID" readonly onclick="copiarID()">
            <span class="help-text">(Toca para copiar)</span>
            <h3>ID SOCIO</h3>
            <input type="text" id="targetID" placeholder="Introduce ID...">
            <button onclick="iniciarConexion()" style="width:100%; padding:15px; background:#a50044; color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">INICIAR</button>
        </div>
    </div>

    <div id="videoArea">
        <div class="v-container">
            <div class="weather-widget" onclick="toggleMeteo()">Vinaròs: 22°C</div>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
        <div class="v-container">
            <div class="weather-widget" onclick="toggleMeteo()">Vinaròs: 22°C</div>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="control-bar">
            <button class="btn-end" onclick="finalizarConexion()">
                <span class="azul">F</span><span class="grana">I</span><span class="azul">N</span>
                <span class="grana">A</span><span class="azul">L</span><span class="grana">I</span>
                <span class="azul">Z</span><span class="grana">A</span><span class="azul">R</span>
            </button>
            <a href="https://paypal.me/MarketEvolution" target="_blank" class="btn-paypal">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
                <span class="paypal-text">PROPINAS</span>
            </a>
        </div>
    </div>
    
    <script>
        // Sesión persistente
        let session = localStorage.getItem('user_id');
        if(!session) { session = Math.random().toString(36).substring(2, 10); localStorage.setItem('user_id', session); }
        document.getElementById('myID').value = session;

        function toggleMeteo() { alert("Vinaròs: 22°C | Viento: 12km/h | Despejado"); }
        function copiarID() { navigator.clipboard.writeText(document.getElementById("myID").value); alert("ID copiado."); }
        function finalizarConexion() { window.location.reload(); }
        
        // ... Lógica PeerJS igual a la versión estable ...
    </script>
</body>
</html>
