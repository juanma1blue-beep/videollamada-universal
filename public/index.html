<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V52.0 [Control Maestro]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        #bloqueo { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; padding: 20px; }
        
        /* Estilos del Panel */
        .panel-box { border: 1px solid #333; padding: 20px; border-radius: 15px; width: 300px; text-align: center; background: #111; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        
        .live-grid { display: grid; grid-template-rows: 1fr 1fr; width: 100vw; height: 100vh; }
        .cam-box { position: relative; border-bottom: 1px solid #111; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .btn-end { position: absolute; top: 15px; right: 15px; z-index: 100; background: #880000; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="bloqueo">
        <div class="panel-box">
            <h3 style="margin-top:0;">PASO 1: CONTACTO</h3>
            <a href="tel:+34000000000"><button style="background:#006600; color:white;">LLAMAR POR WIFI</button></a>
            
            <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
            
            <h3>PASO 2: CONEXIÓN</h3>
            <input type="text" id="myID" readonly placeholder="Tu ID (dáselo a ella)">
            <input type="text" id="targetID" placeholder="Pega el ID de ella aquí">
            <button onclick="conectar()" style="background:#A50044; color:white;">CONECTAR VÍDEO</button>
        </div>
    </div>

    <div class="live-grid">
        <div class="cam-box"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="cam-box">
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <button class="btn-end" onclick="location.reload()">FINALIZAR</button>

    <script>
        const myID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = myID;
        const peer = new Peer(myID);

        async function conectar() {
            const target = document.getElementById('targetID').value.trim();
            if(!target) return alert("¡Pega el ID de tu pareja primero!");
            
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } },
                audio: { echoCancellation: true, noiseSuppression: true, latency: 0 }
            });
            
            document.getElementById('localVideo').srcObject = stream;
            peer.on('call', call => { call.answer(stream); call.on('stream', st => document.getElementById('remoteVideo').srcObject = st); });
            const call = peer.call(target, stream);
            call.on('stream', st => document.getElementById('remoteVideo').srcObject = st);
            document.getElementById('bloqueo').style.display = 'none';
        }
    </script>
</body>
</html>
