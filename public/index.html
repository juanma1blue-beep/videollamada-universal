<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA V117.0 [PROPINAS]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

        #panel { 
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle at bottom, #1a1f33 0%, #050a1a 70%); 
            z-index: 10; 
        }
        .box { background: #0a1122; padding: 25px; width: 90%; max-width: 400px; border: 2px solid #a50044; border-radius: 20px; text-align: center; }
        
        h3 { color: #004d98; margin-bottom: 5px; font-size: 16px; }
        .help-text { color: #555; font-size: 11px; margin-bottom: 15px; display: block; }
        
        input { 
            width: 100%; padding: 12px; margin: 5px 0 10px 0; background: #000; 
            border: 1px solid #004d98; color: #fff; border-radius: 8px;
            cursor: pointer; text-align: center; font-weight: bold;
        }

        #videoArea { display: none; width: 100vw; height: 100vh; background: radial-gradient(circle at bottom, #1a1f33 0%, #050a1a 70%); }
        .v-container { width: 100%; height: 50%; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .control-bar {
            position: fixed; bottom: 20px; left: 5%; width: 90%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; border-radius: 40px; border: 2px solid #a50044; z-index: 999;
            background-color: #02040a;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 77, 152, 0.6) 0%, rgba(0,0,0,0) 40%),
                radial-gradient(circle at 80% 70%, rgba(165, 0, 68, 0.5) 0%, rgba(0,0,0,0) 40%);
            box-shadow: 0 0 15px rgba(165, 0, 68, 0.6);
        }
        
        .btn-end { background: none; border: none; cursor: pointer; font-weight: 900; font-size: 20px; text-transform: uppercase; display: flex; align-items: center; }
        .btn-end span { display: inline-block; padding: 0 4px; text-align: center; min-width: 18px; }
        .azul { color: #004d98; }
        .grana { color: #a50044; }
        
        /* MEJORA PROPINAS Y LOGO */
        .btn-paypal { 
            text-decoration: none; display: flex; flex-direction: column; align-items: center; 
            padding: 5px;
        }
        .btn-paypal img { width: 55px; margin-bottom: 2px; } /* Logo más grande */
        .paypal-text { 
            font-weight: bold; font-size: 11px; 
            background: linear-gradient(to right, #004d98, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3>ID CONEXIÓN</h3>
            <input type="text" id="myID" readonly onclick="copiarID()">
            <span class="help-text">(Toca para copiar)</span>
            
            <h3>ID SOCIO</h3>
            <input type="text" id="targetID" placeholder="Introduce ID...">
            
            <button onclick="iniciarConexion()" style="width:100%; padding:15px; background:#a50044; color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">INICIAR</button>
        </div>
    </div>

    <div id="videoArea">
        <div class="v-container"><video id="remoteVideo" autoplay playsinline></video></div>
        <div class="v-container"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="control-bar">
            <button class="btn-end" onclick="finalizarConexion()">
                <span class="azul">F</span><span class="grana">I</span><span class="azul">N</span>
                <span class="grana">A</span><span class="azul">L</span><span class="grana">I</span>
                <span class="azul">Z</span><span class="grana">A</span><span class="azul">R</span>
            </button>
            <a href="https://paypal.me/MarketEvolution" target="_blank" class="btn-paypal">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
                <span class="paypal-text">PROPINAS</span>
            </a>
        </div>
    </div>
    
    <script>
        const randomID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = randomID;
        
        function copiarID() {
            const copyText = document.getElementById("myID");
            copyText.select();
            document.execCommand("copy");
            alert("ID copiado.");
        }

        const peer = new Peer(randomID);
        let localStream;

        async function iniciarConexion() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('panel').style.display = 'none';
                document.getElementById('videoArea').style.display = 'block';

                const targetID = document.getElementById('targetID').value;
                if (targetID) {
                    const call = peer.call(targetID, localStream);
                    call.on('stream', (stream) => { document.getElementById('remoteVideo').srcObject = stream; });
                }
            } catch (err) { alert("Error de cámara: " + err); }
        }

        peer.on('call', (call) => {
            call.answer(localStream);
            call.on('stream', (stream) => { document.getElementById('remoteVideo').srcObject = stream; });
        });

        function finalizarConexion() { window.location.reload(); }
    </script>
</body>
</html>
