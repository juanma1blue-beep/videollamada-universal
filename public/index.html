<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Sanguino v2.2 [AutoSync + Ayuda]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Verdana', sans-serif; height: 100vh; display: flex; flex-direction: column; transition: filter 0.3s; }
        .night-mode { filter: sepia(0.4) hue-rotate(180deg) brightness(0.85); }
        .camera-layer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; height: 40vh; }
        .cam-box { border: 2px solid #002244; background: #000; border-radius: 8px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        video { width: 100%; height: 85%; object-fit: cover; }
        .audio-control { height: 15%; background: #0a0a0a; display: flex; align-items: center; padding: 0 10px; border-top: 1px solid #002244; font-size: 0.8em; font-weight: bold; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #228B22; margin-left: 10px; }
        .interface-layer { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 20px; padding: 20px; flex-grow: 1; }
        .panel { border: 2px solid #002244; background: #0a0a0a; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; }
        #peerID { width: 100%; padding: 15px; box-sizing: border-box; background: #111; color: #fff; border: 2px solid #228B22; font-size: 1.1em; text-align: center; border-radius: 8px; }
        button { background: #002244; color: #fff; border: 2px solid #228B22; padding: 12px; cursor: pointer; width: 100%; font-weight: bold; border-radius: 8px; transition: 0.2s; }
        button:hover { background: #003366; }
        .btn-sync { background: #228B22; border-color: #fff; }
        .btn-red { background: #8B0000; border: 2px solid #FF4500; }
        .chat-log { height: 120px; overflow-y: auto; font-size: 0.85em; border: 1px solid #333; padding: 10px; background: #000; }
        
        /* Instrucciones discretas */
        #helpPanel { position: fixed; bottom: 10px; left: 10px; background: #002244; color: #fff; padding: 10px; border-radius: 8px; font-size: 0.75em; border: 1px solid #228B22; opacity: 0.85; max-width: 250px; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

    <div id="helpPanel">
        <strong>Cómo conectar:</strong><br>
        1. Pulsa <b>SYNC</b> para enviar tu ID.<br>
        2. Recibirás el ID del socio auto-configurado.<br>
        3. Si falla, usa <b>CONECTAR MANUAL</b>.
    </div>

    <div class="camera-layer">
        <div class="cam-box">
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="audio-control">TU MIC:<input type="range" min="0" max="1" step="0.1" value="0.8" oninput="ajustarAudio('local', this.value)"></div>
        </div>
        <div class="cam-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="audio-control">AUDIO SOCIO:<input type="range" min="0" max="1" step="0.1" value="0.8" oninput="ajustarAudio('remote', this.value)"></div>
        </div>
    </div>

    <div class="interface-layer">
        <div class="panel">
            <h3>LOG DE SESIÓN</h3>
            <div id="chatLog" class="chat-log"></div>
        </div>
        
        <div class="panel">
            <h3>CABECERA DE MANDO</h3>
            <div id="myIDDisplay" style="font-size:1.2em; font-weight:bold; border:2px solid #228B22; padding:15px; text-align:center; cursor:pointer;" onclick="copyID()">CARGANDO...</div>
            <input type="text" id="peerID" placeholder="ID de tu socio">
            <button onclick="App.conectar()">CONECTAR MANUAL</button>
            <button class="btn-sync" onclick="App.enviarID()">ENVIAR ID A SOCIO (Sync)</button>
        </div>

        <div class="panel">
            <h3>PROTOCOLOS</h3>
            <button onclick="toggleNightMode()">MODO NOCTURNO</button>
            <button class="btn-red" onclick="window.location.reload()">FINALIZAR</button>
        </div>
    </div>

    <script>
        const App = {
            peer: new Peer(),
            conectar: async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                    document.getElementById('localVideo').srcObject = stream;
                    const call = App.peer.call(document.getElementById('peerID').value, stream);
                    call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; });
                    App.log("Llamada iniciada.");
                } catch(e) { App.log("Error: " + e.message); }
            },
            enviarID: () => {
                const targetID = prompt("Introduce el ID del socio:");
                if (targetID) {
                    const conn = App.peer.connect(targetID);
                    conn.on('open', () => {
                        conn.send(document.getElementById('myIDDisplay').innerText);
                        App.log("ID enviado correctamente.");
                    });
                }
            },
            log: (msg) => { document.getElementById('chatLog').innerHTML += `<div>> ${msg}</div>`; }
        };

        App.peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                document.getElementById('peerID').value = data;
                App.log("ID recibido y configurado: " + data);
            });
        });

        App.peer.on('open', id => { document.getElementById('myIDDisplay').innerText = id; });
        function copyID() { navigator.clipboard.writeText(document.getElementById('myIDDisplay').innerText); App.log("ID copiado."); }
        function ajustarAudio(t, v) { document.getElementById(t === 'local' ? 'localVideo' : 'remoteVideo').volume = v; }
        function toggleNightMode() { document.body.classList.toggle('night-mode'); }
    </script>
</body>
</html>
