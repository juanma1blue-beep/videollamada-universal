<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V42.0 [Seguridad Activa]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* Capa de Bloqueo (El letrero que tapa todo) */
        #bloqueo { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        
        .live-container { width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        input { background: #222; border: 1px solid #444; color: white; padding: 15px; border-radius: 10px; width: 250px; text-align: center; }
        button { background: #A50044; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="bloqueo">
        <h2>SISTEMA BLOQUEADO</h2>
        <input type="text" id="myID" readonly>
        <input type="text" id="targetID" placeholder="Pega el código de tu pareja...">
        <button onclick="conectar()">DESBLOQUEAR Y CONECTAR</button>
    </div>

    <div class="live-container">
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <script>
        const uniqueID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = "Tu ID: " + uniqueID;
        const App = { peer: new Peer(uniqueID) };

        async function conectar() {
            const target = document.getElementById('targetID').value.trim();
            if(!target) return alert("¡Necesito el código de tu pareja!");

            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('remoteVideo').srcObject = stream;
                
                const call = App.peer.call(target, stream);
                call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; });
                
                // Si todo va bien, quitamos el candado
                document.getElementById('bloqueo').style.display = 'none';
            } catch(e) { alert("Error: Permisos denegados."); }
        }
    </script>
</body>
</html>
