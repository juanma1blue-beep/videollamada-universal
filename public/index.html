<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA V105.0 [CORRECCIÓN ESTABILIDAD]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

        #panel { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: #050a1a; z-index: 100; padding: 20px; }
        .box { background: #0a1122; padding: 25px; width: 100%; max-width: 450px; border: 2px solid #a50044; border-radius: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #004d98; color: #fff; border-radius: 8px; }

        /* REPARACIÓN DE GRID: Asegura que el video no se deforme */
        .live-grid { 
            display: none; 
            flex-direction: column; 
            width: 100vw; height: 100vh; 
            background: #000;
        }
        video { 
            width: 100%; height: 50%; 
            object-fit: contain; /* Esto evita el bug de la imagen estrecha */
            background: #000;
        }

        /* BARRA TÁCTICA BLINDADA */
        .control-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; z-index: 9999;
            background: #050a1a; padding: 15px 25px; border-radius: 40px;
            border: 2px solid #a50044;
        }
        .btn-end { background: none; border: none; cursor: pointer; font-weight: 900; font-size: 20px; text-transform: uppercase; }
        .azul { color: #004d98; }
        .grana { color: #a50044; }
        
        .btn-paypal { text-decoration: none; color: #fff; font-size: 9px; text-align: center; display: flex; flex-direction: column; align-items: center; margin-left: 20px; }
        .btn-paypal img { width: 25px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3 style="color:#004d98;">ID CONEXIÓN</h3>
            <input type="text" id="myID" readonly>
            <h3 style="color:#004d98;">ID SOCIO</h3>
            <input type="text" id="targetID">
            <button onclick="iniciarConexion()" style="width:100%; padding:15px; background:#a50044; border:none; border-radius:8px; font-weight:bold; color:#fff;">INICIAR</button>
        </div>
    </div>

    <div class="live-grid" id="videoArea">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="control-bar">
            <button class="btn-end" onclick="finalizarConexion()">
                <span class="azul">F</span><span class="grana">I</span><span class="azul">N</span>
                <span class="grana">A</span><span class="azul">L</span><span class="grana">I</span>
                <span class="azul">Z</span><span class="grana">A</span><span class="azul">R</span>
            </button>
            <a href="https://paypal.me/MarketEvolution" target="_blank" class="btn-paypal">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
                <span>PROPINA</span>
            </a>
        </div>
    </div>
    
    <script>
        const randomID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = randomID;
        const peer = new Peer(randomID);
        let localStream;

        async function iniciarConexion() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('panel').style.display = 'none';
                document.getElementById('videoArea').style.display = 'flex'; // Cambio a flex para mejor control

                const targetID = document.getElementById('targetID').value;
                if (targetID) {
                    const call = peer.call(targetID, localStream);
                    call.on('stream', (remoteStream) => { document.getElementById('remoteVideo').srcObject = remoteStream; });
                }
            } catch (err) { alert("Error de cámara: " + err); }
        }

        peer.on('call', (call) => {
            call.answer(localStream);
            call.on('stream', (remoteStream) => { document.getElementById('remoteVideo').srcObject = remoteStream; });
        });

        function finalizarConexion() { window.location.reload(); }
    </script>
</body>
</html>
