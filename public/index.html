<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoChat Privado</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .wrapper { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .video-box { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
        video { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; background: #000; border-radius: 12px; }
        .volume-control { margin-top: 10px; width: 80%; }
        #room-id-display { font-weight: bold; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 8px; display: inline-block; }
    </style>
</head>
<body>
    <h1>VideoChat</h1>
    
    <div id="room-id-display">Generando código...</div>
    <br>
    <input type="text" id="roomInput" placeholder="Introduce el código de sala">
    <button onclick="joinRoom()">Unirse a la sala</button>
    
    <div class="wrapper">
        <div class="video-box">
            <video id="localVideo" autoplay playsinline muted></video>
            <label>Tu Volumen</label>
            <input type="range" id="volumeLocal" class="volume-control" min="0" max="1" step="0.1" value="1">
        </div>
        <div class="video-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <label>Volumen Remoto</label>
            <input type="range" id="volumeRemote" class="volume-control" min="0" max="1" step="0.1" value="1">
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
