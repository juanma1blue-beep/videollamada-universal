<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RaidCall Full Client</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f12;
  color:white;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
#sidebar{
  width:260px;
  background:#1c1d22;
  padding:15px;
  box-sizing:border-box;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:5px;
}

button{
  background:#5865f2;
  color:white;
  cursor:pointer;
}

/* MAIN */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

video{
  width:320px;
  border-radius:10px;
  margin:10px;
  background:black;
}

/* STATUS */
#status{
  margin-top:10px;
  font-size:14px;
  opacity:0.8;
}

/* PTT */
#ptt{
  margin-top:10px;
  background:red;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">

  <h2>🎧 RAIDCALL</h2>

  <input id="roomInput" placeholder="Room ID" />

  <button onclick="createRoom()">➕ Create Room</button>
  <button onclick="joinRoom()">🚪 Join Room</button>

  <div id="status">Disconnected</div>

  <button id="ptt"
    onmousedown="pushToTalk(true)"
    onmouseup="pushToTalk(false)">
    🎤 PUSH TO TALK
  </button>

</div>

<!-- MAIN -->
<div id="main">

  <video id="localVideo" autoplay muted></video>
  <video id="remoteVideo" autoplay></video>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

/* STATE */
let roomId;
let pc;
let stream;

/* ICE CONFIG */
const config = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }

    // TURN (PRODUCTION)
    // {
    //   urls: "turn:YOUR_SERVER:3478",
    //   username: "user",
    //   credential: "pass"
    // }
  ]
};

/* CREATE ROOM */
function createRoom(){
  roomId = Math.random().toString(36).substring(2,8);
  document.getElementById("roomInput").value = roomId;
}

/* JOIN ROOM */
async function joinRoom(){

  roomId = document.getElementById("roomInput").value;

  socket.emit("join-room", { roomId });

  stream = await navigator.mediaDevices.getUserMedia({
    video:true,
    audio:true
  });

  document.getElementById("localVideo").srcObject = stream;

  setStatus("Connected to " + roomId);
}

/* STATUS */
function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

/* PEER */
function createPeer(isOffer){

  if(pc) pc.close();

  pc = new RTCPeerConnection(config);

  stream.getTracks().forEach(track => {
    pc.addTrack(track, stream);
  });

  pc.ontrack = (event) => {
    document.getElementById("remoteVideo").srcObject = event.streams[0];
  };

  /* STABILITY */
  pc.oniceconnectionstatechange = () => {
    if(pc.iceConnectionState === "failed"){
      pc.restartIce();
      setStatus("Reconnecting...");
    }
  };

  pc.onicecandidate = (event) => {
    if(event.candidate){
      socket.emit("signal", {
        roomId,
        data:{ candidate:event.candidate }
      });
    }
  };

  if(isOffer){
    pc.createOffer()
      .then(o => pc.setLocalDescription(o))
      .then(() => {
        socket.emit("signal", {
          roomId,
          data:{ offer:pc.localDescription }
        });
      });
  }
}

/* SIGNALING */
socket.on("peer-ready", () => {
  createPeer(true);
});

socket.on("signal", async (data) => {

  if(data.offer){
    createPeer(false);
    await pc.setRemoteDescription(data.offer);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit("signal", {
      roomId,
      data:{ answer:pc.localDescription }
    });
  }

  if(data.answer){
    await pc.setRemoteDescription(data.answer);
  }

  if(data.candidate){
    try{
      await pc.addIceCandidate(data.candidate);
    }catch(e){}
  }
});

/* PUSH TO TALK */
function pushToTalk(active){
  if(stream && stream.getAudioTracks()[0]){
    stream.getAudioTracks()[0].enabled = active;
  }
}
</script>

</body>
</html>
