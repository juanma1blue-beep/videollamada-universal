<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Sistema Activo</title>
    <style>
        /* Estilos optimizados para evitar sobrecarga de renderizado */
        body { font-family: sans-serif; background: #0e1621; color: white; margin: 0; padding: 4px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #17212b; padding: 5px; display: flex; align-items: center; justify-content: center; border-radius: 8px; gap: 5px; height: 35px; }
        #roomInput { width: 90px; background: #242f3d; color: white; border: 1px solid #228B22; padding: 3px; border-radius: 4px; text-align: center; font-weight: bold; }
        .btn-header { background: #242f3d; color: #228B22; border: 1px solid #228B22; padding: 2px 8px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .wrapper { display: flex; flex-direction: column; flex-grow: 1; gap: 4px; overflow: hidden; }
        .video-box { flex: 1; background: #000; border-radius: 8px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 2px solid #242f3d; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .weather-overlay { position: absolute; top: 10px; left: 10px; z-index: 20; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 15px; font-size: 0.9em; border: 1px solid rgba(255,255,255,0.1); }
        .overlay { position: absolute; bottom: 8px; left: 8px; right: 8px; display: flex; align-items: center; justify-content: space-between; z-index: 5; }
        .btn-call { background: #ff5959; border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .footer { background: #17212b; padding: 8px; border-radius: 8px; }
        #sysLog { color: #00ff00; font-family: monospace; font-size: 0.9em; height: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <input type="text" id="roomInput" value="krhhe17o9r" readonly>
        <button class="btn-header" onclick="init()">CONECTAR</button>
    </div>
    <div class="wrapper">
        <div class="video-box" id="localBox">
            <div class="weather-overlay" id="wL">🌤️ --°C</div>
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="overlay"><button class="btn-call" onclick="window.location.reload()">SALIR</button></div>
        </div>
    </div>
    <div class="footer">
        <div id="sysLog">Sistema listo...</div>
    </div>

    <script>
        // Función de clima con fuerza bruta para evitar caché
        async function updateWeather() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const url = `https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current=temperature_2m,weather_code&_=${Date.now()}`;
                    const res = await fetch(url);
                    const data = await res.json();
                    document.getElementById('wL').innerText = (data.current.weather_code >= 51 ? '🌧️' : '☀️') + " " + Math.round(data.current.temperature_2m) + "°C";
                    document.getElementById('sysLog').innerText = "Clima actualizado en tiempo real";
                });
            }
        }

        // Evento de inicio forzado
        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = stream;
                document.getElementById('sysLog').innerText = "Cámara activa. Sistema estable.";
            } catch(e) { 
                document.getElementById('sysLog').innerText = "Error: Permisos bloqueados.";
            }
        }

        window.onload = () => { 
            updateWeather(); 
            setInterval(updateWeather, 30000); // Refresco agresivo cada 30s
        };
    </script>
</body>
</html>
