<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        /* El chat visual que me pediste */
        .chat-visual { background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 10px; position: relative; }
        
        /* El botoncito transparente "mágico" */
        .btn-transparente {
            background: rgba(255, 255, 255, 0.1); /* Efecto cristal */
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-transparente:hover { background: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>

<div class="chat-visual">
    <p>Código de transmisión: <strong id="elCodigo">ABC-123</strong></p>
    <button class="btn-transparente" onclick="copiarYConectar()">Copiar código y conectar</button>
</div>

<script>
    function copiarYConectar() {
        const codigo = document.getElementById('elCodigo').innerText;
        
        // 1. Acción: Copiar al portapapeles
        navigator.clipboard.writeText(codigo).then(() => {
            alert("Código copiado: " + codigo);
            
            // 2. Acción: Pegar automáticamente en el campo de conexión (roomCode)
            const inputDestino = document.getElementById('roomCode');
            inputDestino.value = codigo;
            
            // 3. Acción: Disparar la conexión automáticamente
            // Aquí llamamos a la función que ya teníamos de "optimizar/conectar"
            document.getElementById('optimizarBtn').click();
        });
    }
</script>
</body>
</html>
