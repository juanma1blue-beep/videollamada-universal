<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V19.0 [Conexión & Chat]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --azul: #001E62; --granada: #A50044; --fondo: #050505; }
        body { margin: 0; background: var(--fondo); color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .main-layout { display: grid; grid-template-columns: 1fr 300px; height: 100vh; }
        .video-zone { display: grid; grid-template-rows: 1fr 1fr; gap: 10px; padding: 10px; }
        .cam-container { border: 2px solid var(--azul); border-radius: 15px; overflow: hidden; position: relative; }
        
        /* CHAT LATERAL */
        .chat-zone { border-left: 2px solid var(--azul); display: flex; flex-direction: column; background: #0a0a0a; }
        #chatBox { flex-grow: 1; padding: 15px; overflow-y: auto; color: #ccc; font-size: 0.9em; }
        .chat-input-area { padding: 15px; border-top: 1px solid var(--azul); }
        
        .modal { display: none; position: fixed; top: 20%; left: 30%; width: 40%; background: var(--azul); padding: 25px; border-radius: 20px; z-index: 100; border: 3px solid var(--granada); }
        button { background: var(--azul); color: #fff; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input { padding: 10px; border-radius: 8px; border: 1px solid var(--azul); background: #000; color: #fff; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="modalAmistades" class="modal">
        <h3>AÑADIR USUARIO</h3>
        <input type="text" id="userTag" placeholder="Nombre o ID del usuario...">
        <button onclick="alert('Usuario añadido a tu lista.')" style="background:var(--granada);">CONFIRMAR AÑADIR</button>
        <button onclick="toggleAmistades()" style="background:transparent;">CERRAR</button>
    </div>

    <div class="main-layout">
        <div class="video-zone">
            <div class="cam-container"><video id="localVideo" autoplay playsinline muted></video></div>
            <div class="cam-container"><video id="remoteVideo" autoplay playsinline></video></div>
        </div>

        <div class="chat-zone">
            <div style="padding:15px; border-bottom:1px solid var(--azul); text-align:center; font-weight:bold;">CHAT PRIVADO</div>
            <div id="chatBox"></div>
            <div class="chat-input-area">
                <input type="text" id="msgInput" placeholder="Escribe un mensaje...">
                <button onclick="enviarMensaje()">ENVIAR</button>
                <button onclick="toggleAmistades()" style="background:#555; width:100%; margin-top:10px;">+ AÑADIR USUARIO</button>
            </div>
        </div>
    </div>

    <script>
        function toggleAmistades() { const m = document.getElementById('modalAmistades'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
        
        function enviarMensaje() {
            const msg = document.getElementById('msgInput').value;
            if(msg) {
                const box = document.getElementById('chatBox');
                box.innerHTML += `<div style="margin-bottom:10px;"><strong>Tú:</strong> ${msg}</div>`;
                document.getElementById('msgInput').value = '';
            }
        }

        const App = {
            peer: new Peer(),
            llamar: async () => {
                const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('localVideo').srcObject = stream;
            }
        };
        App.peer.on('open', id => { console.log("ID del Nodo: " + id); });
    </script>
</body>
</html>
