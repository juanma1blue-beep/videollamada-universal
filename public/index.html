<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA V98.0 [SINCRO TOTAL]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* PANEL PRINCIPAL (Recuperado 100%) */
        #panel { 
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; 
            background: #050a1a; z-index: 100; padding: 20px;
        }
        .box { background: #0a1122; padding: 25px; width: 100%; max-width: 450px; border: 2px solid #002277; border-radius: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #002277; color: #00d2ff; border-radius: 8px; }
        
        /* BARRA DE MANDO TÁCTICA (Integrada) */
        .control-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; align-items: center; z-index: 3000;
            background: rgba(0, 0, 0, 0.7); padding: 10px 25px; border-radius: 50px;
            border: 2px solid rgba(255, 0, 0, 0.6); backdrop-filter: blur(5px);
        }
        .btn-end { background: none; border: none; cursor: pointer; font-weight: 900; font-size: 22px; text-transform: uppercase; }
        .neo-azul { color: #00d2ff; text-shadow: 0 0 5px #00d2ff; }
        .neo-grana { color: #ff4444; text-shadow: 0 0 5px #ff4444; }
        .btn-paypal { text-decoration: none; color: #fff; font-size: 9px; text-align: center; display: flex; flex-direction: column; align-items: center; border-left: 1px solid #555; padding-left: 15px; }
        .btn-paypal img { width: 35px; }

        .live-grid { display: none; grid-template-rows: 1fr 1fr; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; border: 1px solid #002277; }
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3 style="color:#00d2ff;">ID DE CONEXIÓN</h3>
            <input type="text" id="myID" readonly>
            <h3 style="color:#00d2ff;">PANEL DE GESTIÓN</h3>
            <input type="text" id="targetID" placeholder="Pega el ID del socio...">
            <button onclick="iniciar()" style="width:100%; padding:15px; background:#002277; color:#fff; border:none; border-radius:8px; font-weight:bold;">INICIAR VIDEOLLAMADA</button>
            <div id="listaAmigos"></div>
        </div>
    </div>

    <div class="live-grid" id="videoArea">
        <video id="remoteVideo" autoplay playsinline></video>
        <div style="position:relative;">
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="control-bar">
                <button class="btn-end" onclick="finalizarConexion()">
                    <span class="neo-azul">F</span><span class="neo-grana">I</span><span class="neo-azul">N</span>
                    <span class="neo-grana">A</span><span class="neo-azul">L</span><span class="neo-grana">I</span>
                    <span class="neo-azul">Z</span><span class="neo-grana">A</span><span class="neo-azul">R</span>
                </button>
                <a href="https://paypal.me/MarketEvolution" target="_blank" class="btn-paypal">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
                    <span>PROPINA PAYPAL</span>
                </a>
            </div>
        </div>
    </div>
    
    <script>
        // Lógica recuperada
        const randomID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = randomID;
        const peer = new Peer(randomID);

        function iniciar() {
            document.getElementById('panel').style.display = 'none';
            document.getElementById('videoArea').style.display = 'grid';
            // Aquí iría tu lógica de navigator.mediaDevices...
        }
        function finalizarConexion() { window.location.reload(); }
    </script>
</body>
</html>
