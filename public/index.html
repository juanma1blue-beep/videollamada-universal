<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA V111.0 [BLINDADO]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

        #panel { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: #050a1a; z-index: 10; }
        .box { background: #0a1122; padding: 25px; width: 90%; max-width: 400px; border: 2px solid #a50044; border-radius: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #004d98; color: #fff; border-radius: 8px; }

        #videoArea { display: none; width: 100vw; height: 100vh; background: #000; }
        .v-container { width: 100%; height: 50%; position: relative; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .control-bar {
            position: fixed; bottom: 20px; left: 5%; width: 90%;
            display: flex; justify-content: space-between; align-items: center;
            background: #050a1a; padding: 15px 30px; border-radius: 40px;
            border: 2px solid #a50044; z-index: 999;
        }
        
        .btn-end { 
            background: none; border: none; cursor: pointer; 
            font-weight: 900; font-size: 20px; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-end span { display: inline-block; padding: 0 4px; text-align: center; min-width: 18px; }
        .azul { color: #004d98; }
        .grana { color: #a50044; }
        
        /* MEJORA PAYPAL: Tamaño ajustado y color corporativo */
        .btn-paypal { 
            text-decoration: none; display: flex; flex-direction: column; align-items: center; 
            padding: 5px;
        }
        .btn-paypal img { width: 40px; margin-bottom: 4px; }
        .paypal-text { 
            font-weight: bold; font-size: 10px;
            background: linear-gradient(to right, #004d98, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3 style="color:#004d98;">ID CONEXIÓN</h3>
            <input type="text" id="myID" readonly>
            <input type="text" id="targetID" placeholder="ID DEL SOCIO...">
            <button onclick="iniciarConexion()" style="width:100%; padding:15px; background:#a50044; color:#fff; border:none; border-radius:8px; font-weight:bold;">INICIAR</button>
        </div>
    </div>

    <div id="videoArea">
        <div class="v-container"><video id="remoteVideo" autoplay playsinline></video></div>
        <div class="v-container"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="control-bar">
            <button class="btn-end" onclick="finalizarConexion()">
                <span class="azul">F</span><span class="grana">I</span><span class="azul">N</span>
                <span class="grana">A</span><span class="azul">L</span><span class="grana">I</span>
                <span class="azul">Z</span><span class="grana">A</span><span class="azul">R</span>
            </button>
            <a href="https://paypal.me/MarketEvolution" target="_blank" class="btn-paypal">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
                <span class="paypal-text">PAYPAL</span>
            </a>
        </div>
    </div>
    
    <script>
        const randomID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = randomID;
        const peer = new Peer(randomID);
        let localStream;

        async function iniciarConexion() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('panel').style.display = 'none';
                document.getElementById('videoArea').style.display = 'block';

                const targetID = document.getElementById('targetID').value;
                if (targetID) {
                    const call = peer.call(targetID, localStream);
                    call.on('stream', (stream) => { document.getElementById('remoteVideo').srcObject = stream; });
                }
            } catch (err) { alert("Error de cámara: " + err); }
        }

        peer.on('call', (call) => {
            call.answer(localStream);
            call.on('stream', (stream) => { document.getElementById('remoteVideo').srcObject = stream; });
        });

        function finalizarConexion() { window.location.reload(); }
    </script>
</body>
</html>
