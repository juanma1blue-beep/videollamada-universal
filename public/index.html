<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V49.1 [Raw Fidelity]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* BLOQUEO INICIAL */
        #bloqueo { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; width: 250px; text-align: center; }
        button#btnConectar { padding: 12px 40px; background: #A50044; color: white; border: none; border-radius: 8px; cursor: pointer; }

        /* GRID PROFESIONAL */
        .live-grid { display: grid; grid-template-rows: 1fr 1fr; width: 100vw; height: 100vh; }
        .cam-box { position: relative; border-bottom: 1px solid #111; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* CHAT INTEGRADO */
        #chatInterface { 
            position: absolute; bottom: 20px; left: 20px; width: 300px; height: 150px; 
            background: rgba(0,0,0,0.7); border-radius: 8px; padding: 10px; display: none; 
            pointer-events: auto; z-index: 50;
        }
        #chatLog { height: 100px; overflow-y: auto; font-size: 12px; margin-bottom: 5px; }
        .input-row { display: flex; gap: 5px; }
        input#msgInput { flex: 1; padding: 5px; background: #222; border: none; color: white; }

        /* FINALIZAR */
        .btn-end { position: absolute; top: 15px; right: 15px; z-index: 100; background: #880000; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="bloqueo">
        <input type="text" id="myID" readonly>
        <input type="text" id="targetID" placeholder="Código de la pareja...">
        <button id="btnConectar" onclick="conectar()">CONECTAR</button>
    </div>

    <div class="live-grid">
        <div class="cam-box"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="cam-box" onclick="toggleChat()">
            <video id="remoteVideo" autoplay playsinline></video>
            <div id="chatInterface">
                <div id="chatLog"></div>
                <div class="input-row">
                    <input type="text" id="msgInput" placeholder="Escribir...">
                    <button onclick="enviar()">Ok</button>
                </div>
            </div>
        </div>
    </div>

    <button class="btn-end" onclick="location.reload()">FINALIZAR</button>

    <script>
        const myID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = myID;
        const peer = new Peer(myID);
        let conn;

        async function conectar() {
            const target = document.getElementById('targetID').value.trim();
            if(!target) return alert("Pega el código...");
            
            // CONFIGURACIÓN DE MÁXIMA CALIDAD (RAW)
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 60 } },
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, latency: 0 }
            });
            
            document.getElementById('localVideo').srcObject = stream;
            
            conn = peer.connect(target);
            peer.on('connection', c => { conn = c; conn.on('data', d => addChat("Pareja", d)); });
            peer.on('call', call => { call.answer(stream); call.on('stream', st => document.getElementById('remoteVideo').srcObject = st); });
            
            const call = peer.call(target, stream);
            call.on('stream', st => document.getElementById('remoteVideo').srcObject = st);
            
            document.getElementById('bloqueo').style.display = 'none';
        }

        function toggleChat() {
            const c = document.getElementById('chatInterface');
            c.style.display = (c.style.display === 'block') ? 'none' : 'block';
        }

        function enviar() {
            const input = document.getElementById('msgInput');
            addChat("Tú", input.value);
            if(conn) conn.send(input.value);
            input.value = '';
        }
        function addChat(quien, msg) { document.getElementById('chatLog').innerHTML += `<div><b>${quien}:</b> ${msg}</div>`; }
    </script>
</body>
</html>
