<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA V96.0 [UNIFICADO]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* PANEL PRINCIPAL - VISIBILIDAD GARANTIZADA */
        #panel { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            background: #050a1a; z-index: 5000; padding: 20px;
        }
        .box { background: #0a1122; padding: 25px; width: 100%; max-width: 450px; border: 2px solid #002277; border-radius: 20px; }

        /* BARRA DE MANDO TÁCTICA */
        .control-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; align-items: center; z-index: 3000;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px; border-radius: 50px;
            border: 2px solid rgba(255, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }
        .btn-end { background: none; border: none; cursor: pointer; font-weight: 900; font-size: 24px; text-transform: uppercase; }
        .neo-azul { color: #002277; text-shadow: 0 0 5px #00d2ff; }
        .neo-grana { color: #910023; text-shadow: 0 0 5px #ff4444; }
        
        .btn-paypal { 
            text-decoration: none; color: #fff; font-size: 10px; text-align: center;
            display: flex; flex-direction: column; align-items: center; 
            border-left: 1px solid rgba(255,255,255,0.2); padding-left: 15px;
        }
        .btn-paypal img { width: 45px; height: auto; margin-bottom: 2px; }
