<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Videollamada</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0e1621; color: white; margin: 0; padding: 4px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; flex-grow: 1; gap: 4px; }
        .video-box { flex: 1; background: #000; border-radius: 8px; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .cam-overlay { position: absolute; bottom: 8px; left: 8px; right: 8px; z-index: 10; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 6px; }
        .star { width: 6px; height: 6px; background: gold; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); display: inline-block; }
        .name-txt { font-weight: bold; color: gold; font-size: 0.9em; margin-left: 5px; }
        
        .btn-base { background: #242f3d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="video-box">
            <video id="v1" autoplay playsinline muted></video>
            <div class="cam-overlay">
                <div style="display:flex; align-items:center;">
                    <div id="stars1"></div>
                    <div id="display1" class="name-txt"></div>
                    <input type="text" id="name1" class="btn-base" style="width:60px;" placeholder="Nombre">
                    <button class="btn-base" onclick="aplicar(1)">OK</button>
                </div>
            </div>
        </div>
        <div class="video-box">
            <video id="v2" autoplay playsinline></video>
        </div>
    </div>

    <script>
        function aplicar(id) {
            const name = document.getElementById('name'+id).value;
            const field = document.getElementById('stars'+id);
            const display = document.getElementById('display'+id);
            
            field.innerHTML = '<span class="star"></span><span class="star"></span><span class="star"></span>';
            setTimeout(() => {
                display.innerText = name;
                setInterval(() => {
                    display.style.display = (display.style.display === 'none') ? 'block' : 'none';
                }, 60000);
            }, 1000);
        }
    </script>
</body>
</html>
