<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V20.0 [Impacto Total]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --azul: #001E62; --granada: #A50044; --fondo: #050505; }
        body { margin: 0; background: var(--fondo); color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .main-layout { display: grid; grid-template-columns: 1fr 300px; height: 100vh; }
        .video-zone { display: grid; grid-template-rows: 1fr 1fr; gap: 15px; padding: 15px; }
        .cam-container { border: 2px solid var(--azul); border-radius: 15px; overflow: hidden; position: relative; background: #000; }
        
        .chat-zone { border-left: 2px solid var(--azul); background: #0a0a0a; display: flex; flex-direction: column; }
        #chatBox { flex-grow: 1; padding: 15px; font-size: 0.9em; }
        
        /* PANEL DE ACCIÓN */
        .panel-control { padding: 20px; border-top: 1px solid var(--azul); }
        .btn-end { background: var(--granada) !important; width: 100%; margin-top: 10px; }
        .id-box { background: #000; border: 1px solid var(--azul); color: var(--azul); padding: 15px; text-align: center; font-family: monospace; font-size: 1.1em; border-radius: 8px; margin: 10px 0; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="video-zone">
            <div class="cam-container"><video id="localVideo" autoplay playsinline muted></video></div>
            <div class="cam-container"><video id="remoteVideo" autoplay playsinline></video></div>
        </div>

        <div class="chat-zone">
            <div id="chatBox"></div>
            <div class="panel-control">
                <div style="font-size:0.7em; color:#666;">CÓDIGO DE SESIÓN:</div>
                <div id="myIDDisplay" class="id-box" onclick="copyID()">GENERANDO...</div>
                
                <input type="text" id="peerID" placeholder="Pega el código del socio..." style="width:100%; padding:10px; box-sizing:border-box; border-radius:5px;">
                <button onclick="App.llamar()" style="width:100%; margin-top:10px; background:#008844;">LLAMAR AHORA</button>
                <button class="btn-end" onclick="location.reload()">FINALIZAR LLAMADA</button>
            </div>
        </div>
    </div>

    <script>
        function copyID() { navigator.clipboard.writeText(document.getElementById('myIDDisplay').innerText); alert("Código copiado."); }
        const App = {
            peer: new Peer(),
            llamar: async () => {
                const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('localVideo').srcObject = stream;
            }
        };
        App.peer.on('open', id => { document.getElementById('myIDDisplay').innerText = id; });
    </script>
</body>
</html>
