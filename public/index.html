<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V48.0 [WoW/Live Style]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Bloqueo Inicial */
        #bloqueo { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        
        /* Estructura de cámaras (WoW Style: Una arriba, otra abajo) */
        .grid { display: grid; grid-template-rows: 1fr 1fr; height: 100vh; width: 100vw; }
        .cam-box { position: relative; border-bottom: 1px solid #111; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Chat Estilo WoW / Live */
        .chat-box { 
            position: absolute; bottom: 15px; left: 15px; width: 85%; height: 120px; 
            background: rgba(0,0,0,0.6); border: 1px solid #333; border-radius: 5px; 
            padding: 8px; z-index: 10; display: flex; flex-direction: column; 
        }
        #chatLog { flex: 1; overflow-y: auto; font-size: 13px; font-family: monospace; }
        .input-row { display: flex; gap: 5px; margin-top: 5px; }
        input { flex: 1; background: #000; border: 1px solid #555; color: #fff; padding: 5px; }
        
        /* Finalizar */
        .btn-end { position: absolute; top: 10px; right: 10px; z-index: 20; background: #A50044; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="bloqueo">
        <input type="text" id="myID" readonly style="width:200px; padding:10px; text-align:center;">
        <input type="text" id="targetID" placeholder="Código de la pareja..." style="width:200px; padding:10px; text-align:center;">
        <button onclick="conectar()" style="padding:10px 40px; background:#001E62; color:white; border:none; cursor:pointer;">CONECTAR</button>
    </div>

    <div class="grid">
        <div class="cam-box"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="cam-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="chat-box">
                <div id="chatLog"></div>
                <div class="input-row">
                    <input type="text" id="msgInput" placeholder="Hablar...">
                    <button onclick="enviar()">Ok</button>
                </div>
            </div>
        </div>
    </div>

    <button class="btn-end" onclick="location.reload()">FINALIZAR</button>

    <script>
        const myID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = myID;
        const peer = new Peer(myID);
        let conn;

        async function conectar() {
            const target = document.getElementById('targetID').value.trim();
            if(!target) return alert("Pega el código...");
            
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVideo').srcObject = stream;
            
            // Conexión de chat
            conn = peer.connect(target);
            peer.on('connection', c => { conn = c; conn.on('data', d => addChat("Pareja", d)); });
            
            peer.on('call', call => { call.answer(stream); call.on('stream', st => document.getElementById('remoteVideo').srcObject = st); });
            const call = peer.call(target, stream);
            call.on('stream', st => document.getElementById('remoteVideo').srcObject = st);
            
            document.getElementById('bloqueo').style.display = 'none';
        }

        function enviar() {
            const input = document.getElementById('msgInput');
            addChat("Tú", input.value);
            if(conn) conn.send(input.value);
            input.value = '';
        }
        function addChat(quien, msg) { document.getElementById('chatLog').innerHTML += `<div>[${quien}]: ${msg}</div>`; }
    </script>
</body>
</html>
