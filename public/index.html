<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <title>Proyecto Sanguino - Élite Operativa</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Verdana', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .integrity-panel { background: #000; padding: 4px; display: flex; justify-content: space-around; font-size: 0.65em; color: #228B22; border-bottom: 1px solid #228B22; }
        .header { background: #111; padding: 5px; display: flex; gap: 5px; align-items: center; border-bottom: 1px solid #333; }
        .wrapper { display: flex; flex-direction: column; flex-grow: 1; }
        .video-box { flex: 1; position: relative; border: 1px solid #333; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .status { position: absolute; top: 10px; left: 10px; font-weight: bold; color: #fff; z-index: 10; font-size: 0.8em; text-shadow: 1px 1px 1px #000; }
        .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: red; transition: background 0.2s; }
        .chat-overlay { position: absolute; bottom: 10px; left: 10px; width: 90%; z-index: 20; }
        .chat-log { height: 60px; overflow-y: auto; background: rgba(0, 0, 0, 0.85); border: 1px solid #444; font-size: 0.7em; padding: 5px; margin-bottom: 5px; border-radius: 4px; color: #fff; text-shadow: 1px 1px 1px #000; }
        .chat-input { width: 100%; background: #111; border: 1px solid #228B22; color: #ffd100; padding: 5px; box-sizing: border-box; font-family: 'Verdana', sans-serif; }
        .system-msg { color: #ffd100; font-weight: bold; }
        .controls { height: 60px; display: flex; justify-content: space-around; align-items: center; background: #111; border-top: 1px solid #333; }
        button { background: #1a1a1a; border: 1px solid #228B22; color: #fff; padding: 15px 30px; border-radius: 5px; cursor: pointer; }
        .btn-close { background: #8B0000; border: 1px solid #FF4500; }
        input { background: #111; color: #fff; border: 1px solid #228B22; padding: 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="integrity-panel">
        <span>STOCK: <b id="valStock">0</b></span>
        <span>ESTADO: <b id="valEstado">EN ESPERA</b></span>
    </div>
    <div class="header">
        <input type="text" id="myID" readonly placeholder="ID">
        <input type="text" id="peerID" placeholder="ID Pareja">
        <button onclick="conectar()">📞</button>
    </div>
    <div class="wrapper">
        <div class="video-box">
            <div class="status"><span id="dotLocal" class="dot"></span> LOCAL</div>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-box">
            <div class="status"><span id="dotRemote" class="dot"></span> PAREJA</div>
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="chat-overlay">
                <div id="hist" class="chat-log"></div>
                <input type="text" id="msgInput" class="chat-input" placeholder="Comando..." onkeypress="enviar(event)">
            </div>
        </div>
    </div>
    <div class="controls">
        <button onclick="cambiarCamara()">📷</button>
        <button class="btn-close" onclick="window.location.reload()">❌</button>
    </div>

    <script>
        const peer = new Peer();
        let conn, localStream, useFront = true;

        peer.on('open', id => document.getElementById('myID').value = id);
        peer.on('connection', c => { conn = c; document.getElementById('dotRemote').style.background = '#00ff00'; setupChat(); });
        
        // --- SENSOR DE AUDIO TÁCTICO ---
        function iniciarSensorVoz(stream) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            source.connect(analyser);
            analyser.fftSize = 256;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            setInterval(() => {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                const volume = sum / dataArray.length;
                document.getElementById('dotLocal').style.background = volume > 20 ? '#00ccff' : '#00ff00';
            }, 200);
        }

        function setupChat() {
            conn.on('data', data => {
                if (data.cmd === 'update') {
                    document.getElementById('valStock').innerText = data.stock;
                    document.getElementById('valEstado').innerText = data.estado;
                } else {
                    log("Pareja", data, false);
                }
            });
        }
        
        function log(quien, msg, isSystem) {
            const h = document.getElementById('hist');
            const cl = isSystem ? 'system-msg' : '';
            h.innerHTML += `<div class="${cl}"><b>${quien}:</b> ${msg}</div>`;
            h.scrollTop = h.scrollHeight;
        }

        function sincronizarEstado(stock, estado) {
            document.getElementById('valStock').innerText = stock;
            document.getElementById('valEstado').innerText = estado;
            if (conn && conn.open) conn.send({cmd: 'update', stock, estado});
        }

        function enviar(e) {
            if (e.key === 'Enter') {
                const val = e.target.value;
                if (val.startsWith('/')) {
                    const params = val.slice(1).split(' ');
                    if (params[0] === 'prod') { sincronizarEstado('PRODUCCIÓN', 'ACTIVO'); log("Sistema", "Estado actualizado a PROD", true); }
                    else if (params[0] === 'espera') { sincronizarEstado('0', 'EN ESPERA'); log("Sistema", "Estado actualizado a ESPERA", true); }
                } else if (conn && conn.open) {
                    conn.send(val);
                    log("Tú", val, false);
                }
                e.target.value = '';
            }
        }

        async function conectar() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video: {facingMode: useFront ? "user" : "environment"}, audio: true});
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('dotLocal').style.background = '#00ff00';
                iniciarSensorVoz(localStream); // Activación del sensor
                const call = peer.call(document.getElementById('peerID').value, localStream);
                call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; document.getElementById('dotRemote').style.background = '#00ff00'; });
            } catch(e) { console.error("Error acceso cámara", e); }
        }

        function cambiarCamara() { useFront = !useFront; conectar(); }
    </script>
</body>
</html>
