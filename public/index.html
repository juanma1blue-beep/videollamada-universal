<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V63.0 [UI Optimizada]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        #panel { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .box { background: #111; padding: 20px; border-radius: 15px; width: 320px; border: 1px solid #333; }
        input { width: 100%; padding: 10px; margin-bottom: 5px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        
        /* ZONA DE VÍDEO OPTIMIZADA */
        .live-grid { display: grid; grid-template-rows: 1fr 1fr; width: 100vw; height: 100vh; display: none; }
        .cam-box { position: relative; border-bottom: 1px solid #111; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* BOTÓN FINALIZAR REPOSICIONADO (Abajo a la derecha en tu cámara) */
        .btn-end { 
            position: absolute; bottom: 15px; right: 15px; z-index: 100; 
            background: #880000; color: white; padding: 10px 20px; 
            border-radius: 25px; cursor: pointer; border: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3>PASO 1: TU CÓDIGO</h3>
            <input type="text" id="myID" readonly>
            <h3>PASO 2: VIDEOLLAMADA</h3>
            <input type="text" id="targetID" placeholder="Pega el ID aquí...">
            <button onclick="conectar()" style="background:#A50044; color:white;">INICIAR VIDEOLLAMADA</button>
            <h3 style="margin-top:15px;">AGENDA</h3>
            <div id="listaAmigos"></div>
            <input type="text" id="nombre" placeholder="Nombre...">
            <input type="text" id="telefono" placeholder="Número...">
            <button onclick="guardar()" style="background:#006600; color:white;">GUARDAR CONTACTO</button>
        </div>
    </div>

    <div class="live-grid" id="videoArea">
        <div class="cam-box"><video id="remoteVideo" autoplay playsinline></video></div>
        <div class="cam-box">
            <video id="localVideo" autoplay playsinline muted></video>
            <button class="btn-end" onclick="location.reload()">FINALIZAR</button>
        </div>
    </div>

    <script>
        const randomID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = randomID;
        const peer = new Peer(randomID);

        async function conectar() {
            const target = document.getElementById('targetID').value.trim();
            if(!target) return alert("Pega un ID para conectar");
            
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVideo').srcObject = stream;
            
            peer.on('call', call => { call.answer(stream); call.on('stream', st => document.getElementById('remoteVideo').srcObject = st); });
            const call = peer.call(target, stream);
            call.on('stream', st => document.getElementById('remoteVideo').srcObject = st);
            
            document.getElementById('panel').style.display = 'none';
            document.getElementById('videoArea').style.display = 'grid';
        }

        function guardar() {
            const nombre = document.getElementById('nombre').value;
            const telefono = document.getElementById('telefono').value;
            if(!nombre || !telefono) return alert("Rellena nombre y número");
            let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');
            agenda.push({nombre, telefono});
            localStorage.setItem('agenda', JSON.stringify(agenda));
            render();
        }

        function render() {
            const lista = document.getElementById('listaAmigos');
            let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');
            lista.innerHTML = agenda.map(a => `
                <div style="background:#222; padding:8px; margin-bottom:5px; border-radius:5px;">
                    <b>${a.nombre}</b> - ${a.telefono}
                    <button onclick="alert('Llamada WiFi iniciada')" style="background:#0044cc; color:white; margin-top:2px; padding:2px;">LLAMADA WIFI</button>
                </div>`).join('');
        }
        render();
    </script>
</body>
</html>
