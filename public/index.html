<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V55.0 [Agenda Limpia]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        #panel { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .box { background: #111; padding: 20px; border-radius: 15px; width: 320px; border: 1px solid #333; }
        .amigo-item { background: #222; padding: 10px; margin-bottom: 8px; border-radius: 5px; }
        input { width: 100%; padding: 10px; margin-bottom: 5px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3>AGENDA</h3>
            <div id="listaAmigos"></div>
            
            <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
            
            <input type="text" id="nombre" placeholder="Nombre...">
            <input type="text" id="telefono" placeholder="Número de teléfono...">
            <button onclick="guardar()" style="background:#006600; color:white;">AÑADIR CONTACTO</button>
        </div>
    </div>

    <script>
        let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');

        function guardar() {
            const nombre = document.getElementById('nombre').value;
            const telefono = document.getElementById('telefono').value;
            if(!nombre || !telefono) return alert("Rellena nombre y teléfono");
            
            agenda.push({nombre, telefono});
            localStorage.setItem('agenda', JSON.stringify(agenda));
            render();
        }

        function render() {
            const lista = document.getElementById('listaAmigos');
            lista.innerHTML = agenda.map(a => `
                <div class="amigo-item">
                    <b>${a.nombre}</b><br>${a.telefono}
                </div>`).join('');
        }
        
        render();
    </script>
</body>
</html>
