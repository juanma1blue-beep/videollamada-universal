<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <title>Proyecto Sanguino - Versión Maestra</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; flex-grow: 1; gap: 2px; }
        .video-box { flex: 1; position: relative; border: 1px solid #333; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Chat estilo WoW */
        .chat-container { position: absolute; bottom: 10px; left: 10px; width: 90%; z-index: 20; }
        .chat-log { background: rgba(0,0,0,0.7); height: 70px; overflow-y: auto; padding: 5px; font-size: 0.85em; border: 1px solid #444; }
        .chat-input { width: 100%; background: #111; border: 1px solid #555; color: #ffd100; padding: 5px; margin-top: 2px; font-family: inherit; }
        
        .controls { height: 50px; display: flex; justify-content: space-around; align-items: center; background: #111; }
        button { background: #242f3d; border: 1px solid #228B22; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="video-box">
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="chat-container">
                <div id="chatLog" class="chat-log"></div>
                <input type="text" id="chatInput" class="chat-input" placeholder="Susurrar..." onkeypress="manejarEnvio(event)">
            </div>
        </div>
    </div>
    <div class="controls">
        <button onclick="cambiarCamara()">📷 Cámara</button>
        <button onclick="colgar()" style="background:#cc0000; border:none;">❌ Colgar</button>
    </div>

    <script>
        const peer = new Peer();
        let conn, currentStream, useFront = true;

        peer.on('connection', c => { conn = c; setupChat(); });
        peer.on('call', call => {
            navigator.mediaDevices.getUserMedia({video: {facingMode: useFront ? "user" : "environment"}, audio: true})
            .then(s => {
                call.answer(s);
                currentStream = s;
                document.getElementById('localVideo').srcObject = s;
                call.on('stream', remoteS => document.getElementById('remoteVideo').srcObject = remoteS);
            });
        });

        function setupChat() {
            conn.on('data', data => log("Pareja: " + data));
        }

        function log(msg) {
            const chatLog = document.getElementById('chatLog');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            chatLog.innerHTML += `<div><span style="color:#888">[${time}]</span> ${msg}</div>`;
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function manejarEnvio(e) {
            if (e.key === 'Enter') {
                const msg = e.target.value;
                if (conn && conn.open) {
                    conn.send(msg);
                    log("Tú: " + msg);
                    e.target.value = '';
                } else {
                    log("⚠️ Canal de datos no activo");
                }
            }
        }

        function cambiarCamara() { 
            useFront = !useFront; 
            if(currentStream) currentStream.getTracks().forEach(t => t.stop());
            // El usuario deberá llamar de nuevo o refrescar para aplicar el cambio de cámara
            window.location.reload(); 
        }
        
        function colgar() { window.location.reload(); }
    </script>
</body>
</html>
