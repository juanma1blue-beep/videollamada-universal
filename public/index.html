<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V21.0 [Núcleo Completo]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --azul: #001E62; --granada: #A50044; --fondo: #050505; }
        body { margin: 0; background: var(--fondo); color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .main-layout { display: grid; grid-template-columns: 1fr 350px; height: 100vh; }
        .video-zone { display: grid; grid-template-rows: 1fr 1fr; gap: 15px; padding: 20px; }
        .cam-container { border: 2px solid var(--azul); border-radius: 15px; overflow: hidden; position: relative; background: #000; }
        
        .chat-zone { border-left: 2px solid var(--azul); background: #0a0a0a; display: flex; flex-direction: column; }
        #chatBox { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 0.9em; border-bottom: 1px solid var(--azul); }
        
        .panel-control { padding: 20px; background: rgba(0,30,98,0.1); }
        .id-box { background: #000; border: 1px solid var(--azul); color: var(--azul); padding: 10px; text-align: center; font-family: monospace; border-radius: 5px; margin: 10px 0; cursor: pointer; }
        
        button { background: var(--azul); color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 8px; transition: 0.3s; }
        button:hover { background: var(--granada); }
        .btn-pay { background: #008844 !important; }
        .btn-end { background: var(--granada) !important; }
        input { padding: 10px; border-radius: 5px; border: 1px solid var(--azul); background: #000; color: #fff; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        
        .modal { display: none; position: fixed; top: 25%; left: 30%; width: 40%; background: var(--azul); padding: 25px; border-radius: 15px; z-index: 100; border: 2px solid var(--granada); }
    </style>
</head>
<body>

    <div id="modalAmistades" class="modal">
        <h3>AÑADIR USUARIO</h3>
        <input type="text" id="userTag" placeholder="Nombre o ID del nuevo usuario...">
        <button onclick="añadirUsuario()">CONFIRMAR AÑADIR</button>
        <button onclick="toggleAmistades()" style="background:transparent;">CERRAR</button>
    </div>

    <div class="main-layout">
        <div class="video-zone">
            <div class="cam-container"><video id="localVideo" autoplay playsinline muted></video></div>
            <div class="cam-container"><video id="remoteVideo" autoplay playsinline></video></div>
        </div>

        <div class="chat-zone">
            <div id="chatBox"></div>
            <div class="panel-control">
                <div style="font-size:0.7em; color:#aaa;">CÓDIGO DE SESIÓN:</div>
                <div id="myIDDisplay" class="id-box" onclick="copyID()">GENERANDO...</div>
                
                <input type="text" id="msgInput" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter') enviarMensaje()">
                <button onclick="enviarMensaje()">ENVIAR MENSAJE</button>
                <button onclick="toggleAmistades()">+ AÑADIR USUARIO</button>
                <button class="btn-pay" onclick="window.open('https://paypal.me/MarketEvolution', '_blank')">APOYAR PROYECTO</button>
                <button class="btn-end" onclick="location.reload()">FINALIZAR LLAMADA</button>
            </div>
        </div>
    </div>

    <script>
        function toggleAmistades() { const m = document.getElementById('modalAmistades'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
        
        function enviarMensaje() {
            const msg = document.getElementById('msgInput').value;
            if(msg) {
                const box = document.getElementById('chatBox');
                box.innerHTML += `<div style="margin-bottom:8px;"><strong>Tú:</strong> ${msg}</div>`;
                document.getElementById('msgInput').value = '';
            }
        }

        function añadirUsuario() {
            const user = document.getElementById('userTag').value;
            if(user) { alert("Usuario " + user + " añadido a tu lista de amistades."); toggleAmistades(); }
        }

        function copyID() { navigator.clipboard.writeText(document.getElementById('myIDDisplay').innerText); alert("Código copiado."); }

        const App = {
            peer: new Peer(),
            llamar: async () => {
                const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('localVideo').srcObject = stream;
            }
        };
        App.peer.on('open', id => { document.getElementById('myIDDisplay').innerText = id; });
    </script>
</body>
</html>
