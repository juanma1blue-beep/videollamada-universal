<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FaceCall Clean 1:1 FIXED</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#0b0b0b;
    color:white;
    display:flex;
    height:100vh;
}

#panel {
    width:280px;
    background:#111;
    padding:15px;
}

#main {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

video {
    width:45%;
    margin:5px;
    border-radius:10px;
    background:black;
}

input, button {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
}

button {
    background:#a50044;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="panel">

<h3>FaceCall Clean FIX</h3>

<input id="room" placeholder="código de sesión">

<button onclick="copyRoom()">Generar código</button>
<button onclick="join()">Entrar</button>
<button onclick="call()">Llamar</button>
<button onclick="hang()">Colgar</button>

</div>

<div id="main">
<video id="local" autoplay playsinline muted></video>
<video id="remote" autoplay playsinline></video>
</div>

<script>

const socket = io();

/* =========================
   CONFIG STUN
========================= */

const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
    ]
};

/* =========================
   STATE SAFE
========================= */

let pc = null;
let stream = null;
let roomId = null;

/* =========================
   SIGNAL HANDLER (GLOBAL FIX)
========================= */

socket.on("signal", async data => {

    if(!pc) return;

    if(data.offer){
        await pc.setRemoteDescription(data.offer);

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        socket.emit("signal", {
            roomId,
            data:{ answer }
        });
    }

    if(data.answer){
        await pc.setRemoteDescription(data.answer);
    }

    if(data.candidate){
        await pc.addIceCandidate(data.candidate);
    }

});

/* =========================
   ROOM GENERATOR
========================= */

function copyRoom(){
    const id = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById("room").value = id;
    navigator.clipboard.writeText(id);
}

/* =========================
   MEDIA
========================= */

async function getMedia(){

    if(stream) return stream;

    stream = await navigator.mediaDevices.getUserMedia({
        audio:true,
        video:true
    });

    document.getElementById("local").srcObject = stream;

    return stream;
}

/* =========================
   JOIN ROOM
========================= */

function join(){
    roomId = document.getElementById("room").value;
    socket.emit("join", roomId);
}

/* =========================
   CREATE PEER (FIXED)
========================= */

function createPeer(){

    if(pc){
        pc.close();
        pc = null;
    }

    pc = new RTCPeerConnection(config);

    pc.ontrack = e => {
        document.getElementById("remote").srcObject = e.streams[0];
    };

    pc.onicecandidate = e => {
        if(e.candidate){
            socket.emit("signal", {
                roomId,
                data:{ candidate:e.candidate }
            });
        }
    };
}

/* =========================
   CALL
========================= */

async function call(){

    await getMedia();
    createPeer();

    stream.getTracks().forEach(t => pc.addTrack(t, stream));

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit("signal", {
        roomId,
        data:{ offer }
    });
}

/* =========================
   HANG UP FIXED
========================= */

function hang(){

    if(pc){
        pc.close();
        pc = null;
    }

    if(stream){
        stream.getTracks().forEach(t => t.stop());
        stream = null;
    }

    document.getElementById("remote").srcObject = null;
}

</script>

</body>
</html>
