<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VideoChat Pro - Dashboard Inteligente</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding-bottom: 160px; }
        .status-header { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; background: #1e1e1e; padding: 20px; margin: 10px; border-radius: 12px; gap: 20px; }
        #timer { font-family: monospace; font-size: 1.6em; color: #00ff00; font-weight: bold; }
        .wrapper { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 10px; }
        .video-box { width: 100%; max-width: 350px; position: relative; background: #000; border-radius: 12px; overflow: hidden; }
        video { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .log-entry { padding: 4px; border-bottom: 1px solid #333; font-size: 0.75em; }
        .log-error { color: #ff3b30; font-weight: bold; }
        .log-warn { color: #ffcc00; }
        #consoleLog { height: 100px; overflow-y: auto; background: #000; padding: 5px; border-radius: 8px; text-align: left; }
        .control-bar { position: fixed; bottom: 0; width: 100%; background: #1e1e1e; padding: 15px 0; display: flex; justify-content: center; gap: 20px; z-index: 1000; }
    </style>
</head>
<body>
    <div class="status-header">
        <div id="timer">00:00:00</div>
        <input type="text" id="roomInput" readonly style="padding:8px; border-radius:5px; border:none; text-align:center;">
        <select id="videoSource"></select>
        <button id="btnConnect" onclick="safeExecute(joinRoom)" style="padding: 8px 15px; background: #0084ff; border:none; color:white; border-radius:5px;">Conectar</button>
    </div>

    <div class="wrapper">
        <div class="video-box"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="video-box"><video id="remoteVideo" autoplay playsinline></video></div>
    </div>

    <div id="logBox" style="width: 90%; max-width: 700px; margin: 10px auto; text-align: left;">
        <strong>Diagnóstico del Sistema:</strong>
        <div id="consoleLog"></div>
    </div>

    <div class="control-bar">
        <button onclick="toggleAudio()" style="background:#333; padding:15px; border-radius:50%; border:none; color:white;">🎙️</button>
        <button onclick="toggleVideo()" style="background:#333; padding:15px; border-radius:50%; border:none; color:white;">📷</button>
        <button onclick="endCall()" style="background:#ff3b30; padding:15px; border-radius:50%; border:none; color:white;">❌</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const state = { localStream: null, countAudio: 0, countVideo: 0, seconds: 0, minutes: 0, hours: 0 };

        function log(msg, type = 'INFO') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type === 'ERROR' ? 'log-error' : type === 'WARN' ? 'log-warn' : ''}`;
            entry.innerText = `[${new Date().toLocaleTimeString()}] [${type}] ${msg}`;
            const logBox = document.getElementById('consoleLog');
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        async function safeExecute(func) {
            try { await func(); } 
            catch (err) { log(err.message, 'ERROR'); }
        }

        window.onload = async () => {
            document.getElementById('roomInput').value = Math.random().toString(36).substring(2, 9);
            log("Sistema inicializado correctamente.");
            
            // Monitor de hardware
            navigator.mediaDevices.ondevicechange = () => {
                log("Cambio de hardware detectado.", "WARN");
            };
        };

        async function joinRoom() {
            log("Iniciando conexión a sala...");
            socket.emit('join-room', document.getElementById('roomInput').value);
            // ... (resto de lógica de stream)
            log("Conexión establecida.");
        }

        // ... (restantes funciones de audio, video, etc, intactas)
    </script>
</body>
</html>
