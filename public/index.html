<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <title>Sistema Final con Chat</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #0e1621; color: white; margin: 0; padding: 4px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Estructura */
        .header { background: #17212b; padding: 4px; display: grid; grid-template-columns: 80px 1fr 60px; align-items: center; border-radius: 8px; height: 50px; flex-shrink: 0; gap: 4px; }
        .wrapper { display: flex; flex-direction: column; flex-grow: 1; gap: 4px; overflow: hidden; }
        
        /* Video + Chat WoW */
        .video-box { flex: 1; background: #000; border-radius: 8px; position: relative; overflow: hidden; border: 2px solid #242f3d; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Capa Chat WoW integrada */
        .chat-box { position: absolute; bottom: 10px; left: 10px; width: 220px; background: rgba(0,0,0,0.6); border: 1px solid #444; padding: 6px; z-index: 10; font-size: 0.75em; border-radius: 2px; }
        .chat-history { height: 50px; overflow-y: auto; margin-bottom: 4px; color: #fff; text-shadow: 1px 1px 1px #000; }
        .chat-input { width: 100%; background: #111; border: 1px solid #555; color: #ffd100; padding: 2px; font-family: inherit; }

        .footer { height: 60px; display: flex; justify-content: space-around; align-items: center; background: #17212b; border-radius: 8px; flex-shrink: 0; }
        .btn-ctrl { background: #242f3d; border: 1px solid #228B22; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <input type="text" id="myID" readonly placeholder="Cargando...">
        <div class="conn-area" style="display:flex; gap:2px;">
            <input type="text" id="peerID" placeholder="ID Pareja" style="width:100%; background:#242f3d; color:white; border:1px solid #228B22; border-radius:4px; font-size:0.7em;">
            <button class="btn-ctrl" onclick="llamar()" style="padding:2px 8px;">📞</button>
        </div>
        <a href="https://paypal.me/MarketEvolution" target="_blank" style="background:#ffcc00; color:#000; padding:4px; border-radius:4px; text-align:center; text-decoration:none; font-weight:900;">💶</a>
    </div>
    
    <div class="wrapper">
        <div class="video-box">
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="chat-box">
                <div id="historyLocal" class="chat-history"></div>
                <input type="text" class="chat-input" placeholder="Susurrar..." onkeypress="enviarMensaje(event, 'historyLocal')">
            </div>
        </div>
        <div class="video-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="chat-box">
                <div id="historyRemote" class="chat-history"></div>
                <input type="text" class="chat-input" placeholder="Susurrar..." onkeypress="enviarMensaje(event, 'historyRemote')">
            </div>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let conn;

        peer.on('open', id => document.getElementById('myID').value = id);
        peer.on('connection', c => { conn = c; setupChat(); });

        function llamar() {
            conn = peer.connect(document.getElementById('peerID').value);
            setupChat();
        }

        function setupChat() {
            conn.on('data', data => mostrarMensaje("Pareja: " + data));
        }

        function enviarMensaje(e, targetId) {
            if (e.key === 'Enter') {
                const msg = e.target.value;
                if (conn) conn.send(msg);
                mostrarMensaje("Tú: " + msg);
                e.target.value = '';
            }
        }

        function mostrarMensaje(text) {
            const h = document.getElementById('historyLocal');
            const h2 = document.getElementById('historyRemote');
            [h, h2].forEach(el => {
                el.innerHTML += `<div>${text}</div>`;
                el.scrollTop = el.scrollHeight;
            });
        }
    </script>
</body>
</html>
