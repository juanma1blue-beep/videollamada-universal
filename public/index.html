<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FaceCall Clean</title>
    <style>
        /* CSS Unificado */
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; }
        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; transition: background 0.3s; }
        
        #llamarBtn { background-color: #004d98; } /* Azul */
        #llamarBtn:hover { background-color: #002d58; }
        
        #colgarBtn { background-color: #a50044; } /* Grana */
        #colgarBtn:hover { background-color: #7a0032; }
        
        .video-container { margin: 20px 0; }
        video { width: 45%; background: #000; border-radius: 10px; }
        
        .footer { margin-top: 30px; }
        .paypal-btn { background-color: #f7c000; color: black; padding: 10px 20px; border-radius: 5px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <div class="controls">
        <button id="llamarBtn">Llamar</button>
        <button id="colgarBtn">Colgar</button>
    </div>

    <div class="video-container">
        <video id="localVideo" autoplay playsinline muted></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div class="code-section">
        <input type="text" id="roomCode" placeholder="Código de sala" readonly>
        <button id="generarBtn" style="background-color: #555;">Generar Código</button>
    </div>

    <div class="footer">
        <a href="https://PayPal.me/MarketEvolution" target="_blank" class="paypal-btn">Propinas PayPal - Market Evolution</a>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        /* JS Unificado */
        const socket = io();
        let localStream;
        let peerConnection;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        async function init() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
            } catch (err) { console.error("Error cámara:", err); }
        }

        document.getElementById('generarBtn').addEventListener('click', () => {
            const code = Math.random().toString(36).substring(2, 9);
            document.getElementById('roomCode').value = code;
        });

        document.getElementById('llamarBtn').addEventListener('click', () => {
            const code = document.getElementById('roomCode').value;
            if (!code) return alert("Genera un código primero");
            
            socket.emit('join-room', code);
            peerConnection = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            
            peerConnection.onicecandidate = e => {
                if (e.candidate) socket.emit('signal', { candidate: e.candidate, room: code });
            };
            peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
        });

        document.getElementById('colgarBtn').addEventListener('click', () => {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
                alert("Llamada finalizada");
            }
        });

        init();
    </script>
</body>
</html>
