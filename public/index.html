<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base44 - Sistema de Transmisión</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #f0f4f8;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .main-layout {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .container {
            flex: 2;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Panel de Chat Lateral Derecho - Estilo Interactivo */
        .chat-panel {
            flex: 1;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        h1 {
            color: #004d98;
            text-align: center;
            margin-bottom: 20px;
            font-size: 26px;
        }

        .section {
            background: #fafafa;
            border: 1px solid #e1e8ed;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        h3 {
            color: #004d98;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            background-color: #004d98;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background-color: #003366;
        }

        .btn-success {
            background-color: #28a745;
        }

        .btn-success:hover {
            background-color: #218838;
        }

        .room-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Rejilla para las Dos Cámaras de Transmisión */
        .video-grid {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .video-box {
            flex: 1;
            height: 280px;
            background: #222;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 14px;
            position: relative;
            border: 2px solid #333;
            text-align: center;
            padding: 10px;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Historial de Mensajes Interactivo */
        .chat-messages {
            flex: 1;
            border: 1px solid #e1e8ed;
            border-radius: 6px;
            padding: 12px;
            background: #fdfdfd;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 13px;
        }

        /* Burbujas y formato dinámico de texto */
        .msg-line {
            margin-bottom: 8px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg-system-blue {
            color: #004d98;
            background: #e6f0fa;
            padding: 6px 10px;
            border-radius: 6px;
            border-left: 3px solid #004d98;
        }

        .msg-system-green {
            color: #155724;
            background: #d4edda;
            padding: 6px 10px;
            border-radius: 6px;
            border-left: 3px solid #28a745;
        }

        .msg-user {
            background: #f1f0f0;
            padding: 6px 10px;
            border-radius: 6px;
            display: inline-block;
            max-width: 100%;
        }

        .chat-input-area {
            display: flex;
            gap: 5px;
        }

        .chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .main-layout {
                flex-direction: column;
            }
            .video-grid {
                flex-direction: column;
            }
            .video-box {
                height: 200px;
            }
        }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="container">
        <h1>Base44 - Transmisión Unificada</h1>

        <div class="section">
            <h3>Control de Conexión Nativa</h3>
            
            <input type="text" id="roomCode" class="room-input" placeholder="CÓDIGO DE SALA" readonly>

            <div class="btn-group">
                <button onclick="generarCodigoTransmision()">Generar Código Aleatorio</button>
                <button class="btn-success" onclick="conectarTransmision()">Iniciar Conexión Segura</button>
            </div>
        </div>

        <div class="video-grid">
            <div class="video-box" id="localVideoBox">
                <span id="localStatus">📷 Cámara Local Apagada</span>
                <div class="video-label">TRANSMISIÓN LOCAL (TÚ)</div>
            </div>
            
            <div class="video-box" id="remoteVideoBox">
                <span id="remoteStatus">💤 Esperando Conexión Remota...</span>
                <div class="video-label">TRANSMISIÓN REMOTA</div>
            </div>
        </div>
    </div>

    <div class="chat-panel">
        <h3>Chat de Comunicación</h3>
        <div class="chat-messages" id="chatBox">
            <div class="msg-line" style="color: #888; font-style: italic;" id="chatPlaceholder">Sistema de mensajería listo...</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatMsg" class="chat-input" placeholder="Escribe un mensaje...">
            <button onclick="enviarMensajeChat()">Enviar</button>
        </div>
    </div>
</div>

<script>
    // --- BOTÓN 1: GENERAR CÓDIGO ALEATORIO ---
    function generarCodigoTransmision() {
        const caracteres = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let resultado = 'B44-';
        for (let i = 0; i < 6; i++) {
            resultado += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
        }
        document.getElementById('roomCode').value = resultado;
        
        // Quitar placeholder inicial si existe
        const placeholder = document.getElementById('chatPlaceholder');
        if (placeholder) placeholder.remove();

        // Inyección interactiva en el chat
        const chat = document.getElementById('chatBox');
        chat.innerHTML += `<div class="msg-line msg-system-blue"><b>⚙️ Sistema:</b> Código generado: <b>${resultado}</b>. Listo para conectar.</div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    // --- BOTÓN 2: INICIAR CONEXIÓN SEGURA (Cambio visual y feedback total) ---
    function conectarTransmision() {
        const codigo = document.getElementById('roomCode').value;
        if (!codigo) {
            alert("Por favor, genera primero un código aleatorio de transmisión.");
            return;
        }
        
        // Activación Cámara 1 (Estilo verde de éxito)
        document.getElementById('localVideoBox').style.background = "#155724";
        document.getElementById('localVideoBox').style.borderColor = "#28a745";
        document.getElementById('localStatus').innerHTML = "🟢 Mi Cámara Activa (Transmitiendo)";
        
        // Activación Cámara 2 (Estilo azul de transmisión activa)
        document.getElementById('remoteVideoBox').style.background = "#004d98";
        document.getElementById('remoteVideoBox').style.borderColor = "#0056b3";
        document.getElementById('remoteStatus').innerHTML = "🌐 Conectado a la sala: <b>" + codigo + "</b><br>🎥 Transmisión en vivo recibida";
        
        // Quitar placeholder inicial si existe
        const placeholder = document.getElementById('chatPlaceholder');
        if (placeholder) placeholder.remove();

        // Registro interactivo en el chat
        const chat = document.getElementById('chatBox');
        chat.innerHTML += `<div class="msg-line msg-system-green"><b>🔒 Sistema:</b> Ambas cámaras sincronizadas con éxito en la sala <b>${codigo}</b>.</div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    // --- ENVÍO DE MENSAJES AL CHAT INTERACTIVO ---
    function enviarMensajeChat() {
        const input = document.getElementById('chatMsg');
        const chat = document.getElementById('chatBox');
        if (input.value.trim() === "") return;

        // Quitar placeholder inicial si existe
        const placeholder = document.getElementById('chatPlaceholder');
        if (placeholder) placeholder.remove();

        // Estructura limpia de mensaje del usuario
        chat.innerHTML += `<div class="msg-line"><b>Juanma:</b> <span class="msg-user">${input.value.trim()}</span></div>`;
        input.value = "";
        
        // Desplazamiento automático hacia abajo
        chat.scrollTop = chat.scrollHeight;
    }

    // Enviar de forma fluida con la tecla Enter
    document.getElementById('chatMsg').addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            enviarMensajeChat();
        }
    });
</script>

</body>
</html>
