<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Market Evolution - Comando Élite OORDENADO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', 'Verdana', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Capa 1: Cámaras Cinemáticas (50% altura) */
        .camera-layer { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; height: 50vh; }
        .cam-box { background: #000; border: 2px solid #002244; border-radius: 12px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Capa 2: Barra de Estado (Indicadores Chulos) */
        .status-bar { background: #0a0a0a; border-bottom: 1px solid #111; padding: 5px 20px; display: flex; justify-content: center; gap: 40px; font-weight: bold; }
        .status-item { display: flex; align-items: center; gap: 10px; font-size: 0.8em; }
        .dot { width: 15px; height: 15px; border-radius: 50%; background: #228B22; box-shadow: 0 0 10px #228B22; } /* Bolita Verde Neón Chula */

        /* Capa 3: Mando y Comunicación (Abajo) */
        .control-layer { display: flex; padding: 10px; flex-grow: 1; gap: 10px; }
        
        /* Chat WoW Style (Unificado abajo) */
        .chat-section { flex: 2; border: 2px solid #333; background: rgba(10,10,10,0.9); border-radius: 8px; padding: 10px; display: flex; flex-direction: column; }
        .chat-tabs { display: flex; gap: 5px; margin-bottom: 5px; font-size: 0.8em; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .tab { border: 1px solid #444; padding: 2px 10px; color: #888; }
        .chat-log { flex-grow: 1; overflow-y: auto; font-size: 0.9em; color: #ccc; }
        .chat-input { background: #000; border: 1px solid #002244; color: #fff; padding: 8px; width: 97%; border-radius: 4px; }

        /* Mando y Operaciones */
        .ops-section { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .mando-box { background: #0a0a0a; border: 1px solid #002244; border-radius: 8px; padding: 15px; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        
        button { background: #002244; border: 1px solid #228B22; color: #fff; padding: 12px 20px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #228B22; }
        .btn-close { background: #8B0000; border: 1px solid #FF4500; }
        
        input { background: #000; color: #fff; border: 1px solid #002244; padding: 10px; border-radius: 5px; width: 90%; }
        h3 { margin: 0 0 10px 0; color: #228B22; font-size: 1em; text-align: center; }
    </style>
</head>
<body>

    <div class="camera-layer">
        <div class="cam-box"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="cam-box"><video id="remoteVideo" autoplay playsinline></video></div>
    </div>

    <div class="status-bar">
        <div class="status-item"><div class="dot"></div> SISTEMA: OPERATIVO</div>
        <div class="status-item"><div class="dot" style="background:#cc9900; box-shadow:0 0 10px #cc9900;"></div> CANAL DATA: LISTO</div>
        <div class="status-item"><div class="dot" style="background:#8B0000; box-shadow:0 0 10px #8B0000;"></div> PROTOCOLO: RECOLECCIÓN</div>
    </div>

    <div class="control-layer">
        <div class="chat-section">
            <div class="chat-tabs">
                <div class="tab">[General]</div><div class="tab">[LFG]</div><div class="tab">[Guild]</div><div class="tab" style="color:#fff;">[Session]</div>
            </div>
            <div id="chatLog" class="chat-log"></div>
            <input type="text" id="chatInput" class="chat-input" placeholder="/w Asesor..." onkeypress="App.manejarChat(event)">
        </div>
        
        <div class="ops-section">
            <div class="mando-box">
                <h3>CABECERA DE MANDO</h3>
                <input type="text" id="myID" readonly placeholder="Cargando ID...">
                <input type="text" id="peerID" placeholder="ID Socio">
            </div>
            <div class="mando-box">
                <div class="btn-group">
                    <button onclick="App.conectar()">CONECTAR</button>
                    <button onclick="window.open('https://paypal.me/MarketEvolution', '_blank')">PROPINAS</button>
                    <button class="btn-close" onclick="window.location.reload()">CERRAR SESIÓN</button>
                </div>
            </div>
        </div>
    </div>

                const log = document.getElementById('chatLog');
