<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V38.0 [Automatización]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --azul: #001E62; --granada: #A50044; --fondo: #050505; --neon-rojo: #FF3333; }
        body { margin: 0; background: var(--fondo); color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .hero-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; height: 75vh; padding: 5px; }
        .cam-container { border: 1px solid var(--azul); border-radius: 8px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .control-bar { padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; background: #000; border-top: 1px solid var(--azul); }
        .input-row { display: flex; gap: 5px; width: 100%; max-width: 500px; }
        input { background: #000; border: 1px solid var(--azul); color: var(--neon-rojo); padding: 10px; border-radius: 5px; text-align: center; font-weight: bold; flex-grow: 1; }
        button { background: var(--azul); color: white; border: 1px solid var(--neon-rojo); padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--granada); }
    </style>
</head>
<body>

    <div class="hero-zone">
        <div class="cam-container"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="cam-container"><video id="remoteVideo" autoplay playsinline></video></div>
    </div>

    <div class="control-bar">
        <div class="input-row">
            <input type="text" id="myIDDisplay" readonly title="Tu código de sesión">
            <input type="text" id="targetID" placeholder="Pega el ID de tu pareja">
        </div>
        <div class="input-row">
            <button onclick="iniciarTodo()" style="background:var(--granada); flex-grow:2;">INICIAR TRANSMISIÓN</button>
            <button onclick="zumbar()">ZUMBIDO</button>
            <button onclick="location.reload()" style="background:var(--neon-rojo);">FINALIZAR</button>
        </div>
    </div>

    <script>
        // Generación automática del ID aleatorio al cargar
        const uniqueID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myIDDisplay').value = uniqueID;
        const App = { peer: new Peer(uniqueID) };

        async function iniciarTodo() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('localVideo').srcObject = stream;
                
                App.peer.on('call', call => {
                    call.answer(stream);
                    call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; });
                });

                const target = document.getElementById('targetID').value;
                if(target) {
                    const call = App.peer.call(target, stream);
                    call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; });
                }
            } catch(e) { alert("Error de cámara/micrófono."); }
        }

        function zumbar() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 150; osc.start(); osc.stop(ctx.currentTime + 0.3);
        }
    </script>
</body>
</html>
