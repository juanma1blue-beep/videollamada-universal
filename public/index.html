<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base44 - Sistema Unificado</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #f0f4f8;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            color: #004d98;
            text-align: center;
            margin-bottom: 20px;
            font-size: 26px;
        }

        .section {
            background: #fafafa;
            border: 1px solid #e1e8ed;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        h3 {
            color: #004d98;
            margin-bottom: 15px;
            font-size: 18px;
        }

        button {
            background-color: #004d98;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background-color: #003366;
        }

        /* Lista de contactos original de Base44 */
        .contacto-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 12px 15px;
            border: 1px solid #e6ecf0;
            border-radius: 6px;
            margin-top: 8px;
        }

        .contacto-info {
            display: flex;
            flex-direction: column;
        }

        .contacto-nombre {
            font-weight: bold;
            color: #333;
        }

        .contacto-telefono {
            font-size: 13px;
            color: #666;
        }

        .contacto-acciones {
            display: flex;
            gap: 8px;
        }

        .btn-llamar {
            background-color: #28a745;
            text-decoration: none;
            color: white;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
        }

        .btn-llamar:hover {
            background-color: #218838;
        }

        .btn-eliminar {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-eliminar:hover {
            background-color: #c82333;
        }

        /* Copia Mágica Inferior Original */
        .copia-magica-container {
            margin-top: 15px;
        }

        .textarea-copia {
            width: 100%;
            height: 80px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            resize: none;
            background-color: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Base44 - Sistema Unificado</h1>

    <div class="section">
        <h3>Mis Contactos Nativos</h3>
        
        <button id="addContactBtn" onclick="abrirFormularioContacto()" style="background-color: #28a745; margin-bottom: 10px;">Añadir Contacto del Smartphone</button>
        
        <div id="contactList"></div>
    </div>

    <div class="section">
        <h3>Copia Mágica</h3>
        <div class="copia-magica-container">
            <textarea class="textarea-copia" id="txtCopiaMagica" placeholder="Introduce el texto o la información de control aquí..."></textarea>
            <div style="margin-top: 10px; text-align: right;">
                <button onclick="ejecutarCopiaMagica()">Copiar al Portapapeles</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Carga nativa al arrancar
    document.addEventListener("DOMContentLoaded", function() {
        cargarContactos();
    });

    // --- GESTIÓN DE CONTACTOS ORIGINALES ---
    function obtenerContactos() {
        const contactosRaw = localStorage.getItem('contactos_base44');
        return contactosRaw ? JSON.parse(contactosRaw) : [];
    }

    function guardarContactos(lista) {
        localStorage.setItem('contactos_base44', JSON.stringify(lista));
    }

    function abrirFormularioContacto() {
        const nombre = prompt("Introduce el nombre del contacto (ej. Rocío):");
        if (!nombre || nombre.trim() === "") return;

        const telefono = prompt("Introduce el número de teléfono (9 dígitos seguidos):");
        if (!telefono || telefono.trim() === "") return;

        const lista = obtenerContactos();
        lista.push({
            nombre: nombre.trim(),
            telefono: telefono.trim()
        });

        guardarContactos(lista);
        cargarContactos();
    }

    function cargarContactos() {
        const lista = obtenerContactos();
        const contenedor = document.getElementById('contactList');
        contenedor.innerHTML = "";

        if (lista.length === 0) {
            contenedor.innerHTML = "<p style='color: #777; font-size: 14px; font-style: italic;'>No hay contactos guardados en la memoria local.</p>";
            return;
        }

        lista.forEach((contacto, idx) => {
            const item = document.createElement('div');
            item.className = 'contacto-item';
            item.innerHTML = `
                <div class="contacto-info">
                    <span class="contacto-nombre">${contacto.nombre}</span>
                    <span class="contacto-telefono">${contacto.telefono}</span>
                </div>
                <div class="contacto-acciones">
                    <a href="tel:${contacto.telefono}" class="btn-llamar">📞 Llamar</a>
                    <button class="btn-eliminar" onclick="eliminarContacto(${idx})">X</button>
                </div>
            `;
            contenedor.appendChild(item);
        });
    }

    function eliminarContacto(idx) {
        const lista = obtenerContactos();
        lista.splice(idx, 1);
        guardarContactos(lista);
        cargarContactos();
    }

    // --- FUNCIÓN COPIA MÁGICA ORIGINAL ---
    function ejecutarCopiaMagica() {
        const campoTexto = document.getElementById('txtCopiaMagica');
        if (campoTexto.value.trim() === "") {
            alert("Por favor, escribe algo en el cuadro de Copia Mágica antes de copiar.");
            return;
        }
        campoTexto.select();
        campoTexto.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(campoTexto.value);
    }
</script>

</body>
</html>
