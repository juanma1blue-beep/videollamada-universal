<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RAIDCALL ULTRA STABLE</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f0f12;
  color:white;
  display:flex;
}

#panel{
  width:260px;
  background:#1c1d22;
  padding:10px;
}

button,input{
  width:100%;
  padding:10px;
  margin-top:5px;
}

button{
  background:#5865f2;
  border:none;
  color:white;
  cursor:pointer;
}

#main{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
}

video{
  width:320px;
  margin:10px;
  border-radius:10px;
  background:black;
}

#status{
  margin-top:10px;
}
</style>
</head>

<body>

<div id="panel">

  <h3>RAIDCALL ULTRA</h3>

  <input id="room" placeholder="Room code">

  <button onclick="createRoom()">Create Room</button>
  <button onclick="joinRoom()">Join Room</button>

  <div id="status">Offline</div>

</div>

<div id="main">

  <video id="local" autoplay muted></video>
  <video id="remote" autoplay></video>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let roomId;
let pc;
let stream;

let reconnecting = false;

/* ICE CONFIG (STABLE + TURN READY) */
const config = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }

    // 🔥 PRODUCTION (optional TURN)
    // {
    //   urls: "turn:YOUR_TURN_SERVER",
    //   username: "user",
    //   credential: "pass"
    // }
  ]
};

/* CREATE ROOM */
function createRoom(){
  roomId = Math.random().toString(36).slice(2,8);
  document.getElementById("room").value = roomId;
}

/* JOIN */
async function joinRoom(){

  roomId = document.getElementById("room").value;

  socket.emit("join-room", roomId);

  stream = await navigator.mediaDevices.getUserMedia({
    video:true,
    audio:true
  });

  document.getElementById("local").srcObject = stream;

  document.getElementById("status").innerText =
    "Connected: " + roomId;
}

/* SAFE PEER CREATE */
function createPeer(isOffer){

  if(pc){
    pc.close();
  }

  pc = new RTCPeerConnection(config);

  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  pc.ontrack = (e) => {
    document.getElementById("remote").srcObject = e.streams[0];
  };

  /* STABILITY: ICE RESTART */
  pc.oniceconnectionstatechange = () => {

    if(pc.iceConnectionState === "failed"){
      console.log("Reconnecting ICE...");

      pc.restartIce();

      if(isOffer){
        pc.createOffer({ iceRestart:true })
        .then(o=>pc.setLocalDescription(o))
        .then(()=>{
          socket.emit("signal", {
            roomId,
            data:{ offer:pc.localDescription }
          });
        });
      }
    }
  };

  pc.onicecandidate = (e) => {
    if(e.candidate){
      socket.emit("signal", {
        roomId,
        data:{ candidate:e.candidate }
      });
    }
  };

  if(isOffer){
    pc.createOffer()
    .then(o=>pc.setLocalDescription(o))
    .then(()=>{
      socket.emit("signal", {
        roomId,
        data:{ offer:pc.localDescription }
      });
    });
  }
}

/* SIGNAL FLOW */
socket.on("peer-ready", ()=>{
  createPeer(true);
});

socket.on("signal", async (data)=>{

  if(data.offer){
    createPeer(false);
    await pc.setRemoteDescription(data.offer);

    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);

    socket.emit("signal", {
      roomId,
      data:{ answer:pc.localDescription }
    });
  }

  if(data.answer){
    await pc.setRemoteDescription(data.answer);
  }

  if(data.candidate){
    try{
      await pc.addIceCandidate(data.candidate);
    }catch(e){}
  }
});

/* AUTO RECOVERY */
socket.on("peer-disconnect", () => {
  document.getElementById("status").innerText =
    "Peer disconnected - waiting...";
});
</script>

</body>
</html>
