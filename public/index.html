<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión Útil - Restauración Total</title>
    <style>
        body { font-family: sans-serif; background: #0e1621; color: white; margin: 0; padding: 5px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; gap: 5px; flex-grow: 1; }
        .video-box { flex: 1; background: #000; border-radius: 8px; position: relative; overflow: hidden; }
        .controls { background: #17212b; padding: 8px; border-radius: 8px; display: flex; align-items: center; gap: 8px; font-size: 0.8em; }
        
        .star { width: 7px; height: 7px; background: gold; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.3; } 100% { opacity: 1; } }
        .name-txt { font-weight: bold; color: gold; min-width: 50px; }
    </style>
</head>
<body>
    <div style="background:#17212b; padding:5px; border-radius:8px; display:flex; gap:5px;">
        <input type="text" id="roomCode" readonly style="background:#242f3d; color:white; border:none; padding:5px; width:100px;">
        <button onclick="copiar()">Copiar</button>
        <button onclick="iniciarTodo()" style="background:#228B22; color:white; border:none; padding:5px 10px;">Conectar</button>
    </div>

    <div class="wrapper">
        <div class="video-box">
            <div id="timer1" style="position:absolute; top:5px; left:5px; color:#00ff00; font-family:monospace; background:rgba(0,0,0,0.5);">00:00:00</div>
            <video id="v1" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
            <div class="controls">
                <div id="dot1" style="width:8px; height:8px; background:red; border-radius:50%;"></div>
                <div id="starField1"></div>
                <div id="nameDisplay1" class="name-txt"></div>
                <input type="text" id="nameInput1" placeholder="Nombre 1...">
                <button onclick="procesarNombre(1)">OK</button>
                <button onclick="confirmarColgar()" style="background:red; color:white; border:none;">📞</button>
            </div>
        </div>

        <div class="video-box">
            <video id="v2" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
            <div class="controls">
                <div id="dot2" style="width:8px; height:8px; background:red; border-radius:50%;"></div>
                <div id="starField2"></div>
                <div id="nameDisplay2" class="name-txt"></div>
                <input type="text" id="nameInput2" placeholder="Nombre 2...">
                <button onclick="procesarNombre(2)">OK</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('roomCode').value = "SALA-" + Math.floor(Math.random()*9999);
        let stream = null;

        function procesarNombre(id) {
            const name = document.getElementById('nameInput'+id).value;
            const field = document.getElementById('starField'+id);
            const display = document.getElementById('nameDisplay'+id);
            
            field.innerHTML = '<span class="star"></span><span class="star"></span><span class="star"></span>';
            setTimeout(() => {
                display.innerText = name;
                setInterval(() => {
                    display.style.visibility = (display.style.visibility === 'hidden') ? 'visible' : 'hidden';
                }, 60000);
            }, 1000);
        }

        async function iniciarTodo() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                document.getElementById('v1').srcObject = stream;
                document.getElementById('v2').srcObject = stream;
                document.getElementById('dot1').style.background = '#00ff00';
                document.getElementById('dot2').style.background = '#00ff00';
                iniciarTimer();
            } catch(e) { alert("Error de cámara"); }
        }

        function iniciarTimer() {
            let s = 0;
            setInterval(() => {
                s++;
                document.getElementById('timer1').innerText = new Date(s * 1000).toISOString().substr(11, 8);
            }, 1000);
        }

        function confirmarColgar() {
            if(confirm("¿Seguro que quieres finalizar?")) window.location.reload();
        }
        function copiar() { document.getElementById('roomCode').select(); document.execCommand('copy'); }
    </script>
</body>
</html>
