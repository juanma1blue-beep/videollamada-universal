<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema Purificado</title>
    <style>
        body { font-family: sans-serif; background: #0e1621; color: white; margin: 0; padding: 4px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #17212b; padding: 5px; display: flex; align-items: center; justify-content: center; border-radius: 8px; gap: 5px; height: 35px; }
        #roomInput { width: 90px; background: #242f3d; color: white; border: 1px solid #228B22; padding: 3px; border-radius: 4px; text-align: center; font-weight: bold; }
        .btn-header { background: #242f3d; color: #228B22; border: 1px solid #228B22; padding: 2px 8px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-header:active { background: #228B22; color: #fff; }
        .wrapper { display: flex; flex-direction: column; flex-grow: 1; gap: 4px; overflow: hidden; }
        .video-box { flex: 1; background: #000; border-radius: 8px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 2px solid #242f3d; transition: border 0.3s; }
        .active-signal { border: 2px solid #228B22; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .placeholder-text { color: #555; font-size: 0.8em; position: absolute; }
        .overlay { position: absolute; bottom: 8px; left: 8px; right: 8px; display: flex; align-items: center; justify-content: space-between; z-index: 5; }
        .input-group { display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.5); padding: 3px; border-radius: 4px; }
        .status-dot { width: 10px; height: 10px; background: red; border-radius: 50%; }
        .btn-call { background: #ff5959; border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .footer { background: #17212b; padding: 8px; border-radius: 8px; }
        #sysLog { color: #00ff00; font-family: monospace; font-size: 0.9em; margin-bottom: 8px; height: 20px; }
        .controls { display: flex; justify-content: space-evenly; }
        .btn-ctrl { background: #242f3d; border: none; cursor: pointer; padding: 5px 15px; border-radius: 50%; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="header">
        <input type="text" id="roomInput" value="krhhe17o9r" readonly style="cursor:not-allowed;">
        <button class="btn-header" onclick="toggleEdit()">✏️</button>
        <button class="btn-header" onclick="copyCode()">📋</button>
        <button class="btn-header" onclick="connect()">🔗</button>
    </div>

    <div class="wrapper">
        <div class="video-box" id="localBox">
            <div id="timer" style="position:absolute; top:5px; left:5px; color:#00ff00; font-family:monospace; font-weight:bold; z-index:10;">00:00:00</div>
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="overlay">
                <div class="input-group">
                    <div id="dot1" class="status-dot"></div>
                    <input type="text" id="n1" placeholder="Tu nombre" style="background:transparent; color:white; border:none; width:80px;">
                    <button onclick="save(1)" style="background:transparent; color:white; border:none; cursor:pointer;">OK</button>
                </div>
                <button class="btn-call" onclick="end()">📞</button>
            </div>
        </div>
        <div class="video-box" id="remoteBox">
            <div class="placeholder-text" id="remoteStatus">Esperando señal remota...</div>
            <video id="remoteVideo" autoplay playsinline onplay="confirmConnection()" onpause="handleLoss()"></video>
            <div class="overlay">
                <div class="input-group">
                    <div id="dot2" class="status-dot"></div>
                    <input type="text" id="n2" placeholder="Remoto" style="background:transparent; color:white; border:none; width:80px;" disabled>
                    <button style="background:transparent; color:gray; border:none;" disabled>OK</button>
                </div>
                <button class="btn-call" onclick="end()">📞</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div id="sysLog">Sistema purificado.</div>
        <div class="controls">
            <button class="btn-ctrl" onclick="toggleAudio()">🎙️</button>
            <button class="btn-ctrl" onclick="toggleVideo()">📷</button>
        </div>
    </div>

    <script>
        let localStream = null;
        let timerInterval = null;
        let seconds = 0;

        function log(m) { document.getElementById('sysLog').innerHTML = m; }
        
        window.onload = () => {
            // Limpieza al iniciar por si acaso quedó residuo
            sessionStorage.removeItem('temp_stream_lock');
            if(sessionStorage.getItem('n1')) document.getElementById('n1').value = sessionStorage.getItem('n1');
        };

        function end() { 
            if(confirm("¿Finalizar y purificar sistema?")) {
                // Purificación de memoria
                sessionStorage.clear();
                window.location.reload();
            }
        }

        function confirmConnection() {
            document.getElementById('remoteBox').classList.add('active-signal');
            document.getElementById('remoteStatus').style.display = 'none';
            log("Conexión estable");
        }

        function handleLoss() {
            document.getElementById('remoteBox').classList.remove('active-signal');
            document.getElementById('remoteStatus').style.display = 'block';
            log("Reconectando...");
        }

        function toggleEdit() {
            const input = document.getElementById('roomInput');
            input.readOnly = !input.readOnly;
            input.style.border = input.readOnly ? '1px solid #228B22' : '1px solid #ff5959';
            input.style.cursor = input.readOnly ? 'not-allowed' : 'text';
            log(input.readOnly ? "Código guardado" : "Modo edición activo");
        }

        function copyCode() { document.getElementById('roomInput').select(); document.execCommand('copy'); log("Código copiado"); }
        function save(id) { sessionStorage.setItem('n'+id, document.getElementById('n'+id).value); log("Nombre guardado"); }

        async function connect() {
            log("Adaptando flujo...");
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280, max: 1920 }, height: { ideal: 720, max: 1080 }, frameRate: { ideal: 30, max: 60 }, resizeMode: "crop-and-scale" },
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('localBox').classList.add('active-signal');
                document.getElementById('dot1').style.background = '#00ff00';
                
                if (!timerInterval) {
                    timerInterval = setInterval(() => {
                        seconds++;
                        document.getElementById('timer').innerText = new Date(seconds * 1000).toISOString().substr(11, 8);
                    }, 1000);
                }
                log("Sesión segura");
            } catch(e) { 
                log("Permiso denegado. <button onclick='connect()' style='background:#ff5959; border:none; color:white; cursor:pointer; padding:2px 5px; border-radius:3px;'>Reintentar</button>"); 
            }
        }

        function toggleAudio() { 
            if(localStream && localStream.getAudioTracks().length > 0) {
                localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
                log(localStream.getAudioTracks()[0].enabled ? "Audio OK" : "Audio Silenciado");
            }
        }
        
        function toggleVideo() { 
            if(localStream && localStream.getVideoTracks().length > 0) {
                localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled;
                log(localStream.getVideoTracks()[0].enabled ? "Vídeo OK" : "Vídeo Pausado");
            }
        }
    </script>
</body>
</html>
