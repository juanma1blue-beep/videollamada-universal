<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Videollamada - Restaurado</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0e1621; color: white; margin: 0; padding: 4px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .status-header { background: #17212b; padding: 5px; display: flex; align-items: center; justify-content: center; border-radius: 8px; gap: 4px; height: 35px; }
        
        #roomInput { width: 85px; background: #242f3d; color: #fff; border: 1px solid #228B22; padding: 3px; border-radius: 4px; text-align: center; font-weight: bold; font-family: monospace; font-size: 0.8em; }
        .arrow { color: #228B22; font-size: 1em; font-weight: bold; }
        .btn-green { background: #242f3d; color: #228B22; border: 2px solid #228B22; padding: 2px 6px; border-radius: 4px; font-size: 0.7em; cursor: pointer; }
        
        .wrapper { display: flex; flex-direction: column; flex-grow: 1; padding: 4px 0; gap: 4px; overflow: hidden; }
        .video-box { flex: 1; background: #000; border-radius: 8px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .cam-overlay { position: absolute; bottom: 8px; left: 8px; right: 8px; z-index: 10; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 6px; }
        .btn-hangup { background: #ff5959; border: none; color: white; border-radius: 4px; padding: 2px 8px; cursor: pointer; }
        
        .name-input { width: 60px; background: #242f3d; color: white; border: 1px solid #555; padding: 2px; border-radius: 4px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="status-header">
        <input type="text" id="roomInput" readonly>
        <span class="arrow">➜</span>
        <button class="btn-green" onclick="copyCode()">📋 Copiar</button>
        <span class="arrow">➜</span>
        <button class="btn-green" onclick="connect()">🔗 Conectar</button>
    </div>
    
    <div class="wrapper">
        <div class="video-box">
            <video id="v1" autoplay playsinline muted></video>
            <div class="cam-overlay">
                <input type="text" id="name1" class="name-input" placeholder="Nombre...">
                <button class="btn-green" onclick="saveName(1)">OK</button>
                <button class="btn-hangup" onclick="endCall()">📞</button>
            </div>
        </div>
        <div class="video-box">
            <video id="v2" autoplay playsinline></video>
        </div>
    </div>

    <script>
        document.getElementById('roomInput').value = Math.random().toString(36).substring(2, 12);
        
        function saveName(id) {
            const name = document.getElementById('name'+id).value;
            // Lógica simple de nombre sin efectos extraños
            console.log("Nombre guardado:", name);
        }

        function copyCode() { document.getElementById('roomInput').select(); document.execCommand('copy'); }
        function endCall() { if(confirm("¿Finalizar llamada?")) window.location.reload(); }
        async function connect() { console.log("Conectando..."); }
    </script>
</body>
</html>
