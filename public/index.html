<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <title>Proyecto Sanguino - Base Maestra Final</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #17212b; padding: 5px; display: grid; grid-template-columns: 80px 1fr 60px; gap: 5px; align-items: center; }
        .wrapper { display: flex; flex-direction: column; flex-grow: 1; gap: 2px; }
        
        /* Ajuste cinematográfico: Las cámaras se reparten el espacio al 50% */
        .video-box { 
            flex: 1; 
            position: relative; 
            border: 2px solid #242f3d; 
            overflow: hidden; 
            background: #000; 
        }
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Recorta para llenar el espacio sin deformar */
            object-position: center center; /* Centra el cuerpo/cara */
        }
        
        /* Chat estilo Overlay profesional */
        .chat-container { position: absolute; bottom: 10px; left: 10px; width: 85%; z-index: 20; }
        .chat-log { 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(4px);
            height: 70px; 
            overflow-y: auto; 
            padding: 8px; 
            font-size: 0.85em; 
            border-left: 3px solid #ffd100;
            border-radius: 4px;
        }
        .chat-input { width: 100%; background: #111; border: 1px solid #555; color: #ffd100; padding: 5px; margin-top: 2px; font-family: inherit; }
        
        .controls { height: 50px; display: flex; justify-content: space-around; align-items: center; background: #111; }
        button { background: #242f3d; border: 1px solid #228B22; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <input type="text" id="myID" readonly placeholder="Cargando ID...">
        <div style="display:flex; gap:2px;">
            <input type="text" id="peerID" placeholder="ID Pareja">
            <button onclick="iniciarConexion()">📞</button>
        </div>
        <a href="https://paypal.me/MarketEvolution" target="_blank" style="background:#ffcc00; padding:5px; border-radius:4px; text-align:center; font-weight:bold; color:#000; text-decoration:none;">💶</a>
    </div>

    <div class="wrapper">
        <div class="video-box">
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="chat-container">
                <div id="chatLog" class="chat-log"></div>
                <input type="text" id="chatInput" class="chat-input" placeholder="Susurrar..." onkeypress="manejarEnvio(event)">
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="window.location.reload()">🔄 Reiniciar</button>
        <button onclick="colgar()" style="background:#cc0000; border:none;">❌ Colgar</button>
    </div>

    <script>
        const peer = new Peer();
        let conn, currentStream;

        peer.on('open', id => document.getElementById('myID').value = id);
        peer.on('connection', c => { conn = c; setupChat(); });
        peer.on('call', call => {
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
                call.answer(s);
                currentStream = s;
                document.getElementById('localVideo').srcObject = s;
                call.on('stream', remoteS => document.getElementById('remoteVideo').srcObject = remoteS);
            });
        });

        function setupChat() { conn.on('data', data => logMessage("Pareja", data)); }

        function logMessage(sender, msg) {
            const log = document.getElementById('chatLog');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            log.innerHTML += `<div class="msg-item"><span style="color:#888">[${time}]</span> <b>${sender}:</b> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        function manejarEnvio(e) {
            if (e.key === 'Enter') {
                const input = e.target;
                if (!input.value) return;
                if (conn && conn.open) {
                    conn.send(input.value);
                    logMessage("Tú", input.value);
                    input.value = '';
                } else { alert("⚠️ Canal de datos no activo"); }
            }
        }

        function iniciarConexion() {
            const peerId = document.getElementById('peerID').value;
            conn = peer.connect(peerId);
            setupChat();
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
                currentStream = s;
                document.getElementById('localVideo').srcObject = s;
                const call = peer.call(peerId, s);
                call.on('stream', remoteS => document.getElementById('remoteVideo').srcObject = remoteS);
            });
        }

        function colgar() { window.location.reload(); }
    </script>
</body>
</html>
