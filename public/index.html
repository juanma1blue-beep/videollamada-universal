<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Market Evolution - Comando Élite</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Layout Superior: Cámaras */
        .camera-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; height: 40vh; }
        .cam-box { border: 2px solid #002244; background: #000; position: relative; border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .indicator { position: absolute; bottom: 10px; right: 10px; width: 20px; height: 20px; border-radius: 50%; background: #002244; }

        /* Layout Inferior: Mando */
        .control-panel { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; padding: 0 10px 10px 10px; flex-grow: 1; }
        .panel { background: #111; border: 1px solid #002244; border-radius: 8px; padding: 15px; }
        
        /* Botones Azul Oscuro */
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { background: #002244; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        input { background: #000; color: #fff; border: 1px solid #002244; padding: 10px; width: 90%; margin-bottom: 10px; }
        
        #log { font-size: 0.8em; color: #aaa; height: 100px; overflow-y: auto; }
        .system-status { text-align: center; color: #002244; font-weight: bold; padding-top: 5px; }
    </style>
</head>
<body>

    <div class="camera-grid">
        <div class="cam-box"><video id="localVideo" autoplay playsinline muted></video><div id="dotLocal" class="indicator"></div></div>
        <div class="cam-box"><video id="remoteVideo" autoplay playsinline></video><div id="dotRemote" class="indicator"></div></div>
    </div>

    <div class="control-panel">
        <div class="panel">
            <h3>CABECERA DE MANDO</h3>
            <input type="text" id="myID" readonly placeholder="Generando ID...">
            <input type="text" id="peerID" placeholder="Introduce el ID de tu socio aquí">
            <div class="btn-group">
                <button onclick="conectar()">CONECTAR</button>
                <button onclick="window.open('https://paypal.me/MarketEvolution', '_blank')">PROPINAS</button>
                <button onclick="window.location.reload()" style="background: #8B0000;">CERRAR</button>
            </div>
        </div>
        <div class="panel">
            <h3>REGISTRO DE OPERACIONES</h3>
            <div id="log">Sistema iniciado... esperando conexión.</div>
        </div>
    </div>
    <div class="system-status">● ESTADO DEL SISTEMA: OPERATIVO (AZUL OSCURO)</div>

    <script>
        const App = {
            peer: new Peer(),
            conn: null,
            log: (msg) => { document.getElementById('log').innerHTML += `<br>> ${msg}`; }
        };

        App.peer.on('open', id => document.getElementById('myID').value = id);

        async function conectar() {
            const targetID = document.getElementById('peerID').value;
            const stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            document.getElementById('localVideo').srcObject = stream;
            document.getElementById('dotLocal').style.background = '#002244'; // Azul Oscuro

            const call = App.peer.call(targetID, stream);
            call.on('stream', st => {
                document.getElementById('remoteVideo').srcObject = st;
                document.getElementById('dotRemote').style.background = '#002244'; // Azul Oscuro
                App.log("Conexión establecida con éxito.");
            });
        }

        App.peer.on('call', call => {
            navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(stream => {
                document.getElementById('localVideo').srcObject = stream;
                call.answer(stream);
                call.on('stream', st => {
                    document.getElementById('remoteVideo').srcObject = st;
                    document.getElementById('dotRemote').style.background = '#002244';
                });
            });
        });
    </script>
</body>
</html>
