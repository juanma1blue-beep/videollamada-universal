<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V77.0 [BLAUGRANA NEÓN - GESTIÓN TÁCTICA]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00d2ff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #panel { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* PANEL PRINCIPAL BLAUGRANA */
        .box { background: #0a0a0a; padding: 25px; width: 340px; border: 2px solid #910023; border-radius: 20px; box-shadow: 0 0 15px #910023, inset 0 0 5px #002277; }
        h3 { color: #00d2ff; text-shadow: 0 0 5px #00d2ff; }
        input { width: 100%; padding: 12px; margin-bottom: 8px; background: #0a0a0a; border: 1px solid #002277; color: #00d2ff; border-radius: 8px; box-sizing: border-box; box-shadow: 0 0 5px #002277; }
        
        /* BOTONES NEÓN BLAUGRANA */
        button { 
            width: 100%; padding: 12px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 8px; border-radius: 8px; 
            transition: 0.1s; border-bottom: 4px solid rgba(0,0,0,0.3);
        }
        button:active { transform: translateY(2px); border-bottom: 2px solid rgba(0,0,0,0.3); }
        
        /* BOTÓN DE VIDEO NEÓN AZUL OSCURO */
        .btn-video { background: #002277; border: 2px solid #00d2ff; color: #00d2ff; box-shadow: 0 0 10px #00d2ff, 0 4px 0 #001133; }
        /* BOTÓN DE GUARDADO NEÓN GRANA */
        .btn-save  { background: #910023; border: 2px solid #ff0044; color: #ff0044; box-shadow: 0 0 10px #ff0044, 0 4px 0 #550011; }
        
        /* BOTONES DE AGENDA */
        .btn-wifi  { background: #002277; border: 1px solid #00d2ff; color: #00d2ff; box-shadow: 0 0 5px #00d2ff; }
        .btn-edit  { background: #910023; border: 1px solid #ff0044; color: #ff0044; box-shadow: 0 0 5px #ff0044; }
        
        /* BOTÓN FINALIZAR CENTRADO */
        .btn-end { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; 
            background: linear-gradient(135deg, #cc0000, #330000); border: 2px solid #ff4444; color: white;
            padding: 18px 40px; border-radius: 50px; cursor: pointer; font-weight: 900; font-size: 18px;
            box-shadow: 0 8px 15px rgba(204, 0, 0, 0.4), 0 4px 0 #550000;
        }
        .btn-end:active { transform: translateX(-50%) translateY(4px); box-shadow: 0 2px 0 #550000; }

        /* ELEMENTOS DE AGENDA CON EFECTO NEÓN */
        .amigo-item { background: #1a1a1a; padding: 12px; margin-bottom: 10px; border-radius: 10px; border-left: 4px solid #002277; box-shadow: inset 0 0 5px rgba(0,210,255,0.2); }
        .live-grid { display: grid; grid-template-rows: 1fr 1fr; width: 100vw; height: 100vh; display: none; }
        
        /* CÁMARAS CON BORDES TÁCTICOS NEÓN */
        .cam-box { position: relative; border-bottom: 1px solid #002277; box-shadow: 0 0 10px #002277; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3>ID DE CONEXIÓN</h3>
            <input type="text" id="myID" readonly>
            
            <h3>PANEL DE GESTIÓN TÁCTICA</h3>
            <input type="text" id="targetID" placeholder="Pega el ID aquí...">
            <button class="btn-video" onclick="conectar()">Iniciar Videollamada</button>
            
            <h3>AGENDA</h3>
            <div id="listaAmigos"></div>
            <input type="text" id="nombre" placeholder="Nombre...">
            <input type="text" id="telefono" placeholder="Número...">
            <button class="btn-save" onclick="guardar()">Guardar Contacto</button>
        </div>
    </div>

    <div class="live-grid" id="videoArea">
        <div class="cam-box"><video id="remoteVideo" autoplay playsinline></video></div>
        <div class="cam-box">
            <video id="localVideo" autoplay playsinline muted></video>
            <button class="btn-end" onclick="location.reload()">FINALIZAR</button>
        </div>
    </div>

    <script>
        const randomID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = randomID;
        const peer = new Peer(randomID);

        function editar(index) {
            let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');
            let n = prompt("Nuevo nombre:", agenda[index].nombre);
            let t = prompt("Nuevo número:", agenda[index].telefono);
            if(n && t) { agenda[index] = {nombre: n, telefono: t}; localStorage.setItem('agenda', JSON.stringify(agenda)); render(); }
        }

        function guardar() {
            const nombre = document.getElementById('nombre').value;
            const telefono = document.getElementById('telefono').value;
            if(!nombre || !telefono) return alert("Rellena nombre y número");
            let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');
            agenda.push({nombre, telefono});
            localStorage.setItem('agenda', JSON.stringify(agenda));
            render();
        }

        function render() {
            const lista = document.getElementById('listaAmigos');
            let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');
            lista.innerHTML = agenda.map((a, i) => `
                <div class="amigo-item">
                    <b>${a.nombre}</b><br>${a.telefono}
                    <button class="btn-wifi" onclick="alert('Llamada WiFi a ${a.telefono}')">LLAMADA WIFI</button>
                    <button class="btn-edit" onclick="editar(${i})">EDITAR</button>
                </div>`).join('');
        }

        async function conectar() {
            const target = document.getElementById('targetID').value.trim();
            if(!target) return alert("Pega un ID");
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVideo').srcObject = stream;
            peer.on('call', call => { call.answer(stream); call.on('stream', st => document.getElementById('remoteVideo').srcObject = st); });
            const call = peer.call(target, stream);
            call.on('stream', st => document.getElementById('remoteVideo').srcObject = st);
            document.getElementById('panel').style.display = 'none';
            document.getElementById('videoArea').style.display = 'grid';
        }
        render();
    </script>
</body>
</html>
