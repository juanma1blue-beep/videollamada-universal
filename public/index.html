<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto Sanguino - Operativa Total</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Verdana', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .integrity-panel { background: #000; padding: 6px; text-align: center; font-size: 0.7em; color: #228B22; border-bottom: 1px solid #228B22; }
        .header { background: #111; padding: 5px; display: flex; gap: 5px; border-bottom: 1px solid #333; }
        .wrapper { display: flex; flex-direction: column; flex-grow: 1; }
        .video-box { flex: 1; position: relative; border: 1px solid #333; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .status { position: absolute; top: 10px; left: 10px; font-weight: bold; font-size: 0.8em; text-shadow: 1px 1px #000; z-index: 10; }
        .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: red; }
        .chat-overlay { position: absolute; bottom: 10px; left: 10px; width: 90%; z-index: 20; }
        .chat-log { height: 60px; overflow-y: auto; background: rgba(0,0,0,0.85); border: 1px solid #444; font-size: 0.7em; padding: 5px; margin-bottom: 5px; border-radius: 4px; }
        .chat-input { width: 100%; background: #111; border: 1px solid #228B22; color: #ffd100; padding: 5px; }
        .system-msg { color: #ffd100; font-weight: bold; }
        /* Botones Azul Oscuro */
        .controls { height: 60px; display: flex; justify-content: space-around; align-items: center; background: #111; border-top: 1px solid #333; }
        button { background: #002244; border: 1px solid #228B22; color: #fff; padding: 12px 20px; border-radius: 5px; cursor: pointer; }
        .btn-close { background: #8B0000; border: 1px solid #FF4500; }
        input { background: #111; color: #fff; border: 1px solid #228B22; padding: 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="integrity-panel">PROTOCOLO: <b id="valProtocolo">SIN ASIGNAR</b></div>
    <div class="header">
        <input type="text" id="myID" readonly placeholder="ID">
        <input type="text" id="peerID" placeholder="ID Pareja">
        <button onclick="conectar()">📞</button>
    </div>
    <div class="wrapper">
        <div class="video-box"><div class="status"><span id="dotLocal" class="dot"></span> LOCAL</div><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="video-box"><div class="status"><span id="dotRemote" class="dot"></span> PAREJA</div><video id="remoteVideo" autoplay playsinline></video>
            <div class="chat-overlay"><div id="hist" class="chat-log"></div><input type="text" id="msgInput" class="chat-input" placeholder="Comando..." onkeypress="enviar(event)"></div>
        </div>
    </div>
    <div class="controls">
        <button onclick="cambiarCamara()">📷</button>
        <button onclick="window.open('https://paypal.me/MarketEvolution', '_blank')">🎁 Propinas</button>
        <button class="btn-close" onclick="window.location.reload()">❌</button>
    </div>

    <script>
        const peer = new Peer();
        let conn, localStream, useFront = true;
        
        window.onload = () => { document.getElementById('valProtocolo').innerText = localStorage.getItem('prot') || 'SIN ASIGNAR'; };
        
        peer.on('open', id => document.getElementById('myID').value = id);
        peer.on('connection', c => { conn = c; document.getElementById('dotRemote').style.background = '#00ff00'; setupChat(); });

        function setupChat() {
            conn.on('data', data => {
                if (data.cmd === 'update') {
                    document.getElementById('valProtocolo').innerText = data.protocolo;
                    localStorage.setItem('prot', data.protocolo);
                } else log("Pareja", data, false);
            });
        }

        function log(q, m, sys) {
            const h = document.getElementById('hist');
            h.innerHTML += `<div class="${sys?'system-msg':''}"><b>${q}:</b> ${m}</div>`; h.scrollTop = h.scrollHeight;
        }

        function enviar(e) {
            if (e.key === 'Enter') {
                let val = e.target.value;
                if (val.startsWith('/')) {
                    let p = val.slice(1).toUpperCase();
                    document.getElementById('valProtocolo').innerText = p;
                    localStorage.setItem('prot', p);
                    if (conn?.open) conn.send({cmd:'update', protocolo: p});
                    log("Sistema", "Protocolo: "+p, true);
                } else if (conn?.open) { conn.send(val); log("Tú", val, false); }
                e.target.value = '';
            }
        }

        async function conectar() {
            localStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:useFront?"user":"environment"}, audio:true});
            document.getElementById('localVideo').srcObject = localStream;
            const call = peer.call(document.getElementById('peerID').value, localStream);
            call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; document.getElementById('dotRemote').style.background = '#00ff00'; });
        }

        function cambiarCamara() { useFront = !useFront; conectar(); }
    </script>
</body>
</html>
