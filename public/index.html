<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V50.0 [Max Stability]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #bloqueo { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .live-grid { display: grid; grid-template-rows: 1fr 1fr; width: 100vw; height: 100vh; }
        .cam-box { position: relative; border-bottom: 1px solid #111; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #chatInterface { position: absolute; bottom: 20px; left: 20px; width: 300px; height: 150px; background: rgba(0,0,0,0.8); border-radius: 8px; padding: 10px; display: none; z-index: 50; }
        .btn-end { position: absolute; top: 15px; right: 15px; z-index: 100; background: #880000; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="bloqueo">
        <input type="text" id="myID" readonly style="padding:10px; text-align:center; background:#222; border:none; color:#fff;">
        <input type="text" id="targetID" placeholder="Código de la pareja..." style="padding:10px; text-align:center; background:#222; border:none; color:#fff;">
        <button onclick="conectar()" style="padding:12px 40px; background:#A50044; color:white; border:none; cursor:pointer;">CONECTAR</button>
    </div>

    <div class="live-grid">
        <div class="cam-box"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="cam-box" onclick="document.getElementById('chatInterface').style.display = (document.getElementById('chatInterface').style.display === 'block') ? 'none' : 'block';">
            <video id="remoteVideo" autoplay playsinline></video>
            <div id="chatInterface">
                <div id="chatLog" style="height:100px; overflow-y:auto; font-size:12px; margin-bottom:5px;"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="msgInput" style="flex:1; background:#333; color:white; border:none; padding:5px;">
                    <button onclick="enviar()" style="background:#A50044; color:white; border:none; padding:5px 10px;">Ok</button>
                </div>
            </div>
        </div>
    </div>

    <button class="btn-end" onclick="location.reload()">FINALIZAR</button>

    <script>
        const myID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = myID;
        const peer = new Peer(myID);
        let conn, localStream;

        async function conectar() {
            const target = document.getElementById('targetID').value.trim();
            if(!target) return alert("Pega el código...");
            
            // CONFIGURACIÓN ESTABILIZADA: Calidad máxima con supresión inteligente
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } },
                audio: { 
                    echoCancellation: true, // Cancelación activa para no usar auriculares
                    noiseSuppression: true, 
                    autoGainControl: true,
                    latency: 0 
                }
            });
            
            document.getElementById('localVideo').srcObject = localStream;
            
            // Watchdog para evitar que la transmisión se duerma
            setInterval(() => {
                if(localStream.getAudioTracks()[0].enabled === false) localStream.getAudioTracks()[0].enabled = true;
            }, 5000);

            peer.on('connection', c => { conn = c; conn.on('data', d => addChat("Pareja", d)); });
            peer.on('call', call => { call.answer(localStream); call.on('stream', st => document.getElementById('remoteVideo').srcObject = st); });
            const call = peer.call(target, localStream);
            call.on('stream', st => document.getElementById('remoteVideo').srcObject = st);
            
            document.getElementById('bloqueo').style.display = 'none';
        }

        function enviar() {
            const input = document.getElementById('msgInput');
            addChat("Tú", input.value);
            if(conn) conn.send(input.value);
            input.value = '';
        }
        function addChat(quien, msg) { document.getElementById('chatLog').innerHTML += `<div><b>${quien}:</b> ${msg}</div>`; }
    </script>
</body>
</html>
