<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .integrity-panel { background: #000; padding: 2px; display: flex; justify-content: space-around; font-size: 0.6em; color: #228B22; border-bottom: 1px solid #228B22; }
        .header { background: #111; padding: 5px; display: flex; gap: 5px; align-items: center; border-bottom: 1px solid #333; }
        .wrapper { display: flex; flex-direction: column; flex-grow: 1; }
        .video-box { flex: 1; position: relative; border: 1px solid #333; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .status { position: absolute; top: 10px; left: 10px; font-weight: bold; color: #fff; z-index: 10; }
        .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: red; }
        
        /* CHAT ESTRATO AIKIDO (Flotante) */
        .chat-overlay { position: absolute; bottom: 70px; left: 10px; width: 90%; z-index: 20; }
        .chat-log { height: 80px; overflow-y: auto; background: rgba(0,0,0,0.6); font-size: 0.7em; padding: 5px; margin-bottom: 5px; border-radius: 4px; }
        .chat-input { width: 100%; background: #111; border: 1px solid #228B22; color: #ffd100; padding: 5px; box-sizing: border-box; }
        
        .controls { height: 60px; display: flex; justify-content: space-around; align-items: center; background: #111; }
        button { background: #1a1a1a; border: 1px solid #228B22; color: #fff; padding: 10px 20px; border-radius: 5px; }
        .btn-close { background: #8B0000; border: 1px solid #FF4500; }
        input { background: #111; color: #fff; border: 1px solid #228B22; padding: 5px; }
    </style>
</head>
<body>
    <div class="integrity-panel">
        <span>STOCK: <b id="valStock">0</b></span>
        <span>ESTADO: <b id="valEstado">EN ESPERA</b></span>
    </div>
    <div class="header">
        <input type="text" id="myID" readonly placeholder="ID">
        <input type="text" id="peerID" placeholder="ID Pareja">
        <button onclick="conectar()">📞</button>
    </div>
    <div class="wrapper">
        <div class="video-box">
            <div class="status"><span id="dotLocal" class="dot"></span> LOCAL</div>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-box">
            <div class="status"><span id="dotRemote" class="dot"></span> PAREJA</div>
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="chat-overlay">
                <div id="hist" class="chat-log"></div>
                <input type="text" id="msgInput" class="chat-input" placeholder="Susurrar..." onkeypress="enviar(event)">
            </div>
        </div>
    </div>
    <div class="controls">
        <button onclick="cambiarCamara()">📷</button>
        <button class="btn-close" onclick="window.location.reload()">❌</button>
    </div>

    <script>
        const peer = new Peer();
        let conn, localStream, useFront = true;

        peer.on('open', id => document.getElementById('myID').value = id);
        peer.on('connection', c => { conn = c; document.getElementById('dotRemote').style.background = '#00ff00'; setupChat(); });
        
        function setupChat() { conn.on('data', data => log("Pareja", data)); }
        
        function log(quien, msg) {
            const h = document.getElementById('hist');
            h.innerHTML += `<div><b>${quien}:</b> ${msg}</div>`;
            h.scrollTop = h.scrollHeight;
        }

        function enviar(e) {
            if (e.key === 'Enter') {
                const val = e.target.value;
                if (conn && conn.open) {
                    conn.send(val);
                    log("Tú", val);
                    e.target.value = '';
                }
            }
        }

        async function conectar() {
            localStream = await navigator.mediaDevices.getUserMedia({video: {facingMode: useFront ? "user" : "environment"}, audio: true});
            document.getElementById('localVideo').srcObject = localStream;
            document.getElementById('dotLocal').style.background = '#00ff00';
            const call = peer.call(document.getElementById('peerID').value, localStream);
            call.on('stream', st => { document.getElementById('remoteVideo').srcObject = st; document.getElementById('dotRemote').style.background = '#00ff00'; });
        }

        function cambiarCamara() { useFront = !useFront; conectar(); }
    </script>
</body>
</html>
