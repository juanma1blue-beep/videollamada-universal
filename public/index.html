<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V68.0 [Colores de Impacto]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        
        #panel { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .box { background: #111; padding: 20px; width: 320px; border: 1px solid #555; }
        input { width: 100%; padding: 10px; margin-bottom: 5px; background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        
        /* BOTONES DE IMPACTO */
        button { width: 100%; padding: 10px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 5px; color: #000; }
        .btn-video { background: #ff00ff; box-shadow: 0 0 10px #ff00ff; } /* Fucsia */
        .btn-save { background: #00ff00; box-shadow: 0 0 10px #00ff00; } /* Verde */
        .btn-wifi { background: #00ffff; box-shadow: 0 0 10px #00ffff; } /* Cian */
        .btn-edit { background: #ffff00; box-shadow: 0 0 10px #ffff00; } /* Amarillo */
        
        .amigo-item { background: #111; padding: 10px; margin-bottom: 8px; border: 1px solid #333; }
        
        .live-grid { display: grid; grid-template-rows: 1fr 1fr; width: 100vw; height: 100vh; display: none; }
        .cam-box { position: relative; border-bottom: 1px solid #333; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-end { 
            position: absolute; bottom: 20px; right: 20px; z-index: 100; 
            background: #ff0000; color: white; padding: 12px 24px; 
            border: none; border-radius: 25px; cursor: pointer; font-weight: bold;
            box-shadow: 0 0 15px #ff0000;
        }
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3>TU CÓDIGO (ID)</h3>
            <input type="text" id="myID" readonly>
            
            <h3>CONEXIÓN</h3>
            <input type="text" id="targetID" placeholder="Pega el ID aquí...">
            <button class="btn-video" onclick="conectar()">Iniciar Videollamada</button>
            
            <h3 style="margin-top:15px;">AGENDA</h3>
            <div id="listaAmigos"></div>
            <input type="text" id="nombre" placeholder="Nombre...">
            <input type="text" id="telefono" placeholder="Número...">
            <button class="btn-save" onclick="guardar()">Guardar Contacto</button>
        </div>
    </div>

    <div class="live-grid" id="videoArea">
        <div class="cam-box"><video id="remoteVideo" autoplay playsinline></video></div>
        <div class="cam-box">
            <video id="localVideo" autoplay playsinline muted></video>
            <button class="btn-end" onclick="location.reload()">FINALIZAR</button>
        </div>
    </div>

    <script>
        const randomID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = randomID;
        const peer = new Peer(randomID);

        function editar(index) {
            let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');
            let n = prompt("Nuevo nombre:", agenda[index].nombre);
            let t = prompt("Nuevo número:", agenda[index].telefono);
            if(n && t) { agenda[index] = {nombre: n, telefono: t}; localStorage.setItem('agenda', JSON.stringify(agenda)); render(); }
        }

        function guardar() {
            const nombre = document.getElementById('nombre').value;
            const telefono = document.getElementById('telefono').value;
            if(!nombre || !telefono) return alert("Rellena nombre y número");
            let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');
            agenda.push({nombre, telefono});
            localStorage.setItem('agenda', JSON.stringify(agenda));
            render();
        }

        function render() {
            const lista = document.getElementById('listaAmigos');
            let agenda = JSON.parse(localStorage.getItem('agenda') || '[]');
            lista.innerHTML = agenda.map((a, i) => `
                <div class="amigo-item">
                    <b>${a.nombre}</b><br>${a.telefono}
                    <button class="btn-wifi" onclick="alert('Llamada WiFi a ${a.telefono}')">LLAMADA WIFI</button>
                    <button class="btn-edit" onclick="editar(${i})">EDITAR</button>
                </div>`).join('');
        }

        async function conectar() {
            const target = document.getElementById('targetID').value.trim();
            if(!target) return alert("Pega un ID");
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVideo').srcObject = stream;
            peer.on('call', call => { call.answer(stream); call.on('stream', st => document.getElementById('remoteVideo').srcObject = st); });
            const call = peer.call(target, stream);
            call.on('stream', st => document.getElementById('remoteVideo').srcObject = st);
            document.getElementById('panel').style.display = 'none';
            document.getElementById('videoArea').style.display = 'grid';
        }
        render();
    </script>
</body>
</html>
