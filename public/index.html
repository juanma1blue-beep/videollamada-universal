<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <title>Proyecto Sanguino - Control Maestro</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; flex-grow: 1; gap: 2px; }
        .video-box { flex: 1; position: relative; border: 1px solid #333; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Bolitas de estado */
        .status { position: absolute; top: 10px; left: 10px; z-index: 15; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 10px; font-size: 0.8em; }
        
        /* Chat integrado WoW */
        .chat-container { position: absolute; bottom: 10px; left: 10px; width: 80%; z-index: 20; }
        .chat-log { background: rgba(0,0,0,0.7); height: 70px; overflow-y: auto; padding: 5px; font-size: 0.85em; border: 1px solid #444; }
        .chat-input { width: 100%; background: #111; border: 1px solid #555; color: #ffd100; padding: 5px; margin-top: 2px; }
        
        .controls { height: 50px; display: flex; justify-content: space-around; align-items: center; background: #111; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="video-box">
            <div class="status" id="statusLocal">● Local</div>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-box">
            <div class="status" id="statusRemote">● Remoto</div>
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="chat-container">
                <div id="chatLog" class="chat-log"></div>
                <input type="text" id="chatInput" class="chat-input" placeholder="Susurrar..." onkeypress="enviarMensaje(event)">
            </div>
        </div>
    </div>
    <div class="controls">
        <button onclick="cambiarCamara()">📷 Cambiar</button>
        <button onclick="colgar()" style="background:red; color:white;">❌ Colgar</button>
    </div>

    <script>
        const peer = new Peer();
        let conn, currentStream, useFront = true;

        peer.on('connection', c => { conn = c; conn.on('data', d => log(d)); });
        peer.on('call', call => {
            navigator.mediaDevices.getUserMedia({video: {facingMode: useFront ? "user" : "environment"}, audio: true})
            .then(s => {
                call.answer(s);
                currentStream = s;
                document.getElementById('localVideo').srcObject = s;
                call.on('stream', remoteS => document.getElementById('remoteVideo').srcObject = remoteS);
            });
        });

        function enviarMensaje(e) {
            if (e.key === 'Enter') {
                const msg = e.target.value;
                if (conn && conn.open) {
                    conn.send(msg);
                    log("Tú: " + msg);
                    e.target.value = '';
                }
            }
        }

        function log(msg) {
            const log = document.getElementById('chatLog');
            log.innerHTML += `<div>${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        function cambiarCamara() { 
            useFront = !useFront; 
            if(currentStream) currentStream.getTracks().forEach(t => t.stop());
            // Reiniciar con nueva cámara...
        }
        
        function colgar() { window.location.reload(); }
    </script>
</body>
</html>
