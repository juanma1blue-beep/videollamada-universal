<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA V113.0 [EL UNIVERSO]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* PANEL INICIAL CON GRADIENTE DE PROFUNDIDAD (Base estable) */
        #panel { 
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle at bottom, #1a1f33 0%, #050a1a 70%); 
            z-index: 10; 
        }
        .box { background: #0a1122; padding: 25px; width: 90%; max-width: 400px; border: 2px solid #a50044; border-radius: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #004d98; color: #fff; border-radius: 8px; }

        /* ÁREA DE VIDEO CON GRADIENTE DE PROFUNDIDAD (Base estable) */
        #videoArea { 
            display: none; width: 100vw; height: 100vh; 
            background: radial-gradient(circle at bottom, #1a1f33 0%, #050a1a 70%); 
        }
        .v-container { width: 100%; height: 50%; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* --- LA JOYA DE LA CORONA: BARRA DE MANDO TÁCTICA CON EL UNIVERSO AZULGRANA --- */
        .control-bar {
            position: fixed; bottom: 20px; left: 5%; width: 90%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; border-radius: 40px;
            border: 2px solid #a50044; z-index: 999;

            /* FONDO DEL UNIVERSO AZULGRANA - CSS PURO */
            /* Capa 1: Nebulosa Azulgrana */
            background-color: #02040a; /* Fondo base negro espacial profundo */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 77, 152, 0.6) 0%, rgba(0,0,0,0) 40%), /* Gas Azul */
                radial-gradient(circle at 80% 70%, rgba(165, 0, 68, 0.5) 0%, rgba(0,0,0,0) 40%), /* Gas Grana */
                radial-gradient(circle at 50% 50%, rgba(0, 77, 152, 0.4) 0%, rgba(0,0,0,0) 50%), /* Mezcla Azul */
                radial-gradient(circle at 60% 40%, rgba(165, 0, 68, 0.3) 0%, rgba(0,0,0,0) 50%); /* Mezcla Grana */
            
            /* Capa 2: Estrellas en el firmamento (Gradientes de puntos) */
            /* Añadimos estrellas simuladas con gradientes radiales muy pequeños y opacos */
            background-image: 
                /* Nebulosas (igual que arriba) */
                radial-gradient(circle at 20% 30%, rgba(0, 77, 152, 0.6) 0%, rgba(0,0,0,0) 40%),
                radial-gradient(circle at 80% 70%, rgba(165, 0, 68, 0.5) 0%, rgba(0,0,0,0) 40%),
                radial-gradient(circle at 50% 50%, rgba(0, 77, 152, 0.4) 0%, rgba(0,0,0,0) 50%),
                radial-gradient(circle at 60% 40%, rgba(165, 0, 68, 0.3) 0%, rgba(0,0,0,0) 50%),
                /* Estrellas */
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 2px),
                radial-gradient(rgba(255,255,255,1), rgba(255,255,255,.1) 2px, transparent 3px);
            
            background-size: 
                /* Nebulosas */
                100% 100%, 100% 100%, 100% 100%, 100% 100%,
                /* Estrellas (Repetimos los patrones a distintos tamaños para variedad) */
                50px 50px, 100px 100px, 150px 150px, 200px 200px;
            background-position: 
                /* Nebulosas */
                0 0, 0 0, 0 0, 0 0,
                /* Estrellas (Desplazamos los patrones para que no se alineen) */
                0 0, 30px 60px, 130px 200px, 70px 150px;
            background-repeat: repeat; /* Para que las estrellas cubran todo */

            /* Potenciar el borde neón grana para que contraste con el universo */
            box-shadow: 0 0 15px rgba(165, 0, 68, 0.6);
        }
        
        .btn-end { 
            background: none; border: none; cursor: pointer; 
            font-weight: 900; font-size: 20px; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-end span { display: inline-block; padding: 0 4px; text-align: center; min-width: 18px; }
        .azul { color: #004d98; }
        .grana { color: #a50044; }
        
        .btn-paypal { 
            text-decoration: none; display: flex; flex-direction: column; align-items: center; 
            padding: 5px;
        }
        .btn-paypal img { width: 40px; margin-bottom: 4px; }
        .paypal-text { 
            font-weight: bold; font-size: 10px;
            background: linear-gradient(to right, #004d98, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div id="panel">
        <div class="box">
            <h3 style="color:#004d98;">ID CONEXIÓN</h3>
            <input x="text" id="myID" readonly>
            <input type="text" id="targetID" placeholder="ID DEL SOCIO...">
            <button onclick="iniciarConexion()" style="width:100%; padding:15px; background:#a50044; color:#fff; border:none; border-radius:8px; font-weight:bold;">INICIAR</button>
        </div>
    </div>

    <div id="videoArea">
        <div class="v-container"><video id="remoteVideo" autoplay playsinline></video></div>
        <div class="v-container"><video id="localVideo" autoplay playsinline muted></video></div>
        <div class="control-bar">
            <button class="btn-end" onclick="finalizarConexion()">
                <span class="azul">F</span><span class="grana">I</span><span class="azul">N</span>
                <span class="grana">A</span><span class="azul">L</span><span class="grana">I</span>
                <span class="azul">Z</span><span class="grana">A</span><span class="azul">R</span>
            </button>
            <a href="https://paypal.me/MarketEvolution" target="_blank" class="btn-paypal">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
                <span class="paypal-text">PAYPAL</span>
            </a>
        </div>
    </div>
    
    <script>
        const randomID = Math.random().toString(36).substring(2, 10);
        document.getElementById('myID').value = randomID;
        const peer = new Peer(randomID);
        let localStream;

        async function iniciarConexion() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('panel').style.display = 'none';
                document.getElementById('videoArea').style.display = 'block';

                const targetID = document.getElementById('targetID').value;
                if (targetID) {
                    const call = peer.call(targetID, localStream);
                    call.on('stream', (stream) => { document.getElementById('remoteVideo').srcObject = stream; });
                }
            } catch (err) { alert("Error de cámara: " + err); }
        }

        peer.on('call', (call) => {
            call.answer(localStream);
            call.on('stream', (stream) => { document.getElementById('remoteVideo').srcObject = stream; });
        });

        function finalizarConexion() { window.location.reload(); }
    </script>
</body>
</html>
