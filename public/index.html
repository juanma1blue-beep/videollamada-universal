<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA V132.0 [TRANSPARENCIA]</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* PANEL PRINCIPAL */
        #panel { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: #050a1a; z-index: 10; }
        .box { background: #0a1122; padding: 40px; width: 95%; max-width: 500px; border: 3px solid #a50044; border-radius: 25px; text-align: center; }
        
        /* MODAL DE CORTESÍA (El cartelito) */
        #modalPermiso { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #0a1122; padding: 30px; border: 2px solid #00d2ff; border-radius: 20px; text-align: center; max-width: 400px; }
        .btn-modal { padding: 15px 30px; margin: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        input { width: 100%; padding: 20px; margin: 10px 0; background: #000; border: 2px solid #004d98; color: #fff; border-radius: 12px; text-align: center; font-size: 18px; font-weight: bold; }
        #videoArea { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        .v-container { width: 100%; flex: 1; position: relative; border-bottom: 2px solid #004d98; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .weather-widget { position: absolute; top: 15px; right: 15px; z-index: 999; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 20px; display: flex; align-items: center; gap: 8px; color: #fff; font-weight: bold; font-size: 14px; }
        .control-bar { height: 120px; width: 100%; display: flex; justify-content: space-around; align-items: center; background: linear-gradient(180deg, #a50044 0%, #004d98 100%); border-top: 3px solid #fff; padding: 10px; }
        .btn-end { background: rgba(0,0,0,0.3); border: 2px solid #fff; border-radius: 20px; padding: 20px 40px; cursor: pointer; font-weight: 900; font-size: 24px; color: #fff; text-transform: uppercase; }
        .btn-paypal { text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .btn-paypal img { width: 60px; }
        .paypal-text { font-size: 14px; color: #fff; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="modalPermiso">
        <div class="modal-content">
            <h3 style="color:#00d2ff;">¿ACTIVAR TIEMPO LOCAL?</h3>
            <p style="margin:20px 0;">Para mostrarte el tiempo real de tu ciudad, necesitamos acceder a tu ubicación. ¿Deseas activarlo?</p>
            <button class="btn-modal" style="background:#00d2ff;" onclick="aceptarUbicacion()">SÍ, ACTIVAR</button>
            <button class="btn-modal" style="background:#555;" onclick="denegarUbicacion()">NO, GRACIAS</button>
        </div>
    </div>

    <div id="panel">
        <div class="box">
            <h3>ID CONEXIÓN</h3>
            <input type="text" id="myID" readonly>
            <h3>ID SOCIO</h3>
            <input type="text" id="targetID" placeholder="Introduce ID socio...">
            <button id="btnIniciar" style="width:100%; padding:25px; background:#a50044; color:#fff; border:none; border-radius:15px; font-weight:bold; font-size:20px; cursor:pointer;">INICIAR TRANSMISIÓN</button>
        </div>
    </div>

    <div id="videoArea">
        <div class="v-container">
            <div class="weather-widget" id="w1"><span class="temp-text">Cargando...</span></div>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
        <div class="v-container">
            <div class="weather-widget" id="w2"><span class="temp-text">Cargando...</span></div>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="control-bar">
            <button class="btn-end" onclick="window.location.reload()">FINALIZAR</button>
            <a href="https://paypal.me/MarketEvolution" target="_blank" class="btn-paypal">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
                <span class="paypal-text">PROPINAS</span>
            </a>
        </div>
    </div>
    
    <script>
        const peer = new Peer();
        peer.on('open', id => document.getElementById('myID').value = id);

        function iniciarProceso() {
            document.getElementById('modalPermiso').style.display = 'flex';
        }

        async function aceptarUbicacion() {
            document.getElementById('modalPermiso').style.display = 'none';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m`);
                    const data = await res.json();
                    document.querySelectorAll('.temp-text').forEach(el => el.textContent = Math.round(data.current.temperature_2m) + "°C");
                });
            }
        }

        function denegarUbicacion() {
            document.getElementById('modalPermiso').style.display = 'none';
            document.querySelectorAll('.temp-text').forEach(el => el.textContent = "28°C");
        }

        document.getElementById('btnIniciar').addEventListener('click', async () => {
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('localVideo').srcObject = stream;
            document.getElementById('panel').style.display = 'none';
            document.getElementById('videoArea').style.display = 'flex';
            iniciarProceso();
        });
    </script>
</body>
</html>
